<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원가분석사 기출문제 풀이</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f5f0;--surf:#fff;--brd:#e2dfd8;
  --acc:#1a56db;--acc2:#6d28d9;--ok:#057a55;--ng:#c81e1e;
  --txt:#111827;--muted:#6b7280;
  --sw:50px;--aiw:340px;--hh:52px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

#hdr{height:var(--hh);background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:40;}
.logo{font-size:14px;font-weight:700;white-space:nowrap;}.logo em{color:var(--acc);font-style:normal;}
.rtabs{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none;padding:4px 0;}
.rtabs::-webkit-scrollbar{display:none;}
.rtab{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--brd);color:var(--muted);background:transparent;transition:all .15s;font-family:inherit;}
.rtab.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.rtab:hover:not(.on){background:#f0f0f0;}
#aibtn{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--brd);background:var(--surf);color:var(--txt);white-space:nowrap;font-family:inherit;transition:all .15s;}
#aibtn.on{background:var(--acc2);color:#fff;border-color:var(--acc2);}

#body{display:flex;flex:1;overflow:hidden;}

#ltool{width:var(--sw);background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:5px;flex-shrink:0;}
.tb{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;font-size:15px;transition:all .1s;color:var(--muted);background:transparent;font-family:inherit;}
.tb:hover{background:#f0f0f0;color:var(--txt);}
.tb.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.tb.hl{background:#fef08a;color:#92400e;border-color:#fde047;}
.sep{width:26px;height:1px;background:var(--brd);}
.cd{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0;}
.cd:hover{transform:scale(1.2);}
.cd.sel{border-color:var(--txt);}
#szr{writing-mode:vertical-lr;direction:rtl;width:4px;height:56px;accent-color:var(--acc);cursor:pointer;}
#szl{font-size:10px;color:var(--muted);}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px;padding:0 12px;height:46px;flex-shrink:0;}
.qnav{display:flex;align-items:center;gap:3px;}
.qb{width:26px;height:26px;border-radius:6px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;background:transparent;color:var(--txt);font-family:inherit;}
.qb:hover{background:#f0f0f0;}
#qcnt{font-size:12px;color:var(--muted);min-width:48px;text-align:center;}
.stabs{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none;padding:2px 0;}
.stabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:3px 8px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--brd);color:var(--muted);background:transparent;transition:all .12s;white-space:nowrap;font-family:inherit;}
.stab.on{background:#eef2ff;color:var(--acc);border-color:#c7d2fe;}
.stab:hover:not(.on){background:#f0f0f0;}
.dots{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;max-width:180px;}
.dots::-webkit-scrollbar{display:none;}
.dot{width:22px;height:22px;border-radius:50%;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;flex-shrink:0;background:transparent;color:var(--muted);font-family:inherit;}
.dot:hover{background:#f0f0f0;}
.dot.cur{background:var(--acc);color:#fff;border-color:var(--acc);}
.dot.ok{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.dot.ng{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.dot.ans{background:#eff6ff;color:var(--acc);border-color:#93c5fd;}
#scorebox{margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0;}
#sbg{padding:4px 10px;border-radius:14px;font-size:13px;font-weight:700;background:#f0f0f0;color:var(--txt);white-space:nowrap;}
#spct{font-size:11px;color:var(--muted);white-space:nowrap;}
#gbtn{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;background:var(--acc);color:#fff;border:none;font-family:inherit;flex-shrink:0;}
#gbtn:hover{opacity:.85;}
#agbtn{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;background:#059669;color:#fff;border:none;font-family:inherit;flex-shrink:0;}
#agbtn:hover{opacity:.85;}
#cbtn{padding:5px 8px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--muted);font-family:inherit;flex-shrink:0;}
#resetbtn{padding:6px 11px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;font-family:inherit;flex-shrink:0;transition:all .15s;}
#resetbtn:hover{background:#ffedd5;}
#resetallbtn{padding:6px 11px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;background:#fef2f2;color:var(--ng);border:1px solid #fecaca;font-family:inherit;flex-shrink:0;transition:all .15s;}
#resetallbtn:hover{background:#fee2e2;}

#cont{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;}
#qwrap{padding:20px 18px 48px;max-width:740px;margin:0 auto;position:relative;z-index:1;}
#qrnd{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:.06em;margin-bottom:2px;}
#qsbj{font-size:11px;color:var(--muted);margin-bottom:12px;}
#qtxt{font-size:14px;color:var(--txt);line-height:1.8;margin-bottom:14px;}
#qbox{font-size:13px;color:#374151;background:#f9fafb;border:1px solid var(--brd);border-radius:8px;padding:12px 14px;margin-bottom:14px;line-height:1.75;white-space:pre-wrap;display:none;}
#choices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.ci{padding:11px 14px;border-radius:10px;border:1px solid var(--brd);cursor:pointer;display:flex;align-items:flex-start;gap:9px;transition:all .12s;background:var(--surf);font-size:13px;color:var(--txt);line-height:1.65;}
.ci:hover:not(.lk){border-color:var(--acc);background:#eff6ff;}
.ci.sel{border-color:var(--acc);background:#eff6ff;}
.ci.ok{border-color:var(--ok);background:#f0fdf4;}
.ci.ng{border-color:var(--ng);background:#fff5f5;}
.ci.shok{border-color:var(--ok);background:#f0fdf4;}
.cn{font-weight:700;color:var(--acc);min-width:18px;flex-shrink:0;}
.ci.ok .cn,.ci.shok .cn{color:var(--ok);}
.ci.ng .cn{color:var(--ng);}
#rb{padding:14px 16px;border-radius:10px;margin-top:6px;display:none;}
#rb.ok{background:#f0fdf4;border:1px solid #86efac;}
#rb.ng{background:#fff5f5;border:1px solid #fca5a5;}
#rt{font-size:14px;font-weight:700;margin-bottom:5px;}
#rt.ok{color:var(--ok);}#rt.ng{color:var(--ng);}
#rm{font-size:13px;color:var(--muted);line-height:1.75;}
#rm strong{font-size:14px;}
.exp-loading{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px;}
.exp-loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--brd);border-top-color:var(--acc2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-hint{margin-top:10px;padding:8px 12px;background:#f3f4f6;border-radius:8px;font-size:12px;color:var(--muted);}

/* 정답 없는 문제 안내 */
#no-ans-note{display:none;padding:10px 14px;background:#fefce8;border:1px solid #fde047;border-radius:8px;font-size:12px;color:#92400e;margin-top:6px;}

#cvw{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
#cvs{position:absolute;top:0;left:0;width:100%;height:100%;}

#aip{width:0;overflow:hidden;transition:width .25s ease;background:var(--surf);border-left:1px solid var(--brd);flex-shrink:0;display:flex;flex-direction:column;}
#aip.open{width:var(--aiw);}
#aii{width:var(--aiw);height:100%;display:flex;flex-direction:column;}
#aihd{padding:11px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#aiic{width:28px;height:28px;border-radius:50%;background:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
#aitl{font-size:13px;font-weight:700;}
#aisb{font-size:11px;color:var(--muted);}
#aims{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
.ab{padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.7;max-width:100%;word-break:break-word;}
.ab.u{background:var(--acc);color:#fff;align-self:flex-end;border-radius:10px 10px 2px 10px;}
.ab.a{background:#f3f4f6;color:var(--txt);align-self:flex-start;border:1px solid var(--brd);}
#qkb{display:flex;flex-wrap:wrap;gap:5px;padding:0 11px 8px;}
.qk{padding:4px 9px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--muted);font-family:inherit;}
.qk:hover{background:#f0f0f0;color:var(--txt);}
#aia{padding:9px;border-top:1px solid var(--brd);display:flex;gap:5px;flex-shrink:0;}
#ain{flex:1;padding:7px 9px;border-radius:7px;border:1px solid var(--brd);font-size:12px;background:#f9fafb;color:var(--txt);resize:none;height:36px;font-family:inherit;}
#ais{width:36px;height:36px;border-radius:7px;background:var(--acc2);color:#fff;border:none;cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
#ais:hover{opacity:.85;}

/* empty state */
#empty{display:none;padding:40px 20px;text-align:center;color:var(--muted);}
#empty p{font-size:14px;margin-bottom:8px;}
#empty small{font-size:12px;}

@media(max-width:768px){:root{--aiw:260px;}#qwrap{padding:16px 14px 40px;}}
#undoredo{display:flex;gap:3px;}
.urbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;background:transparent;color:var(--txt);font-family:inherit;transition:all .1s;}
.urbtn:hover{background:#f0f0f0;}
.urbtn:disabled{opacity:.3;cursor:default;}
#paste-hint{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;padding:5px 10px;border-radius:8px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20;}
#paste-hint.show{opacity:1;}
.pasted-img{position:absolute;cursor:move;border:2px solid var(--acc);border-radius:4px;z-index:15;}
.pasted-img .del-img{position:absolute;top:-10px;right:-10px;width:20px;height:20px;border-radius:50%;background:var(--ng);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1;}
#save-badge{padding:4px 9px;border-radius:14px;font-size:11px;background:#f0f0f0;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all .3s;}
#save-badge.saved{background:#d1fae5;color:#065f46;}
@media(max-width:520px){:root{--aiw:100vw;}#aip.open{position:fixed;right:0;top:0;bottom:0;z-index:200;}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">원가분석사 <em>기출</em></div>
    <div class="rtabs" id="rtabs"></div>
    <button id="aibtn" onclick="toggleAI()">🤖 AI비서</button>
  </div>
  <div id="body">
    <div id="ltool">
      <button class="tb on" id="t-c" title="선택" onclick="setTool('c')">↖</button>
      <div class="sep"></div>
      <button class="tb" id="t-p" title="펜" onclick="setTool('p')">✏️</button>
      <button class="tb" id="t-h" title="형광펜" onclick="setTool('h')">🖊️</button>
      <button class="tb" id="t-e" title="지우개" onclick="setTool('e')">◻</button>
      <div class="sep"></div>
      <div class="cd sel" style="background:#1a56db" onclick="setCol('#1a56db',this)"></div>
      <div class="cd" style="background:#c81e1e" onclick="setCol('#c81e1e',this)"></div>
      <div class="cd" style="background:#057a55" onclick="setCol('#057a55',this)"></div>
      <div class="cd" style="background:#d97706" onclick="setCol('#d97706',this)"></div>
      <div class="cd" style="background:#6d28d9" onclick="setCol('#6d28d9',this)"></div>
      <div class="sep"></div>
      <input type="range" id="szr" min="1" max="18" value="3" oninput="setSz(this.value)">
      <span id="szl">3</span>
    </div>
    <div id="main">
      <div id="topbar">
        <div class="qnav">
          <button class="qb" onclick="prevQ()">‹</button>
          <span id="qcnt">1/0</span>
          <button class="qb" onclick="nextQ()">›</button>
        </div>
        <div class="stabs" id="stabs"></div>
        <div class="dots" id="dots"></div>
        <div id="undoredo">
  <button class="urbtn" id="undobtn" title="실행취소" onclick="undoDraw()" disabled>↩</button>
  <button class="urbtn" id="redobtn" title="다시실행" onclick="redoDraw()" disabled>↪</button>
</div>
<button id="cbtn" onclick="clearDraw()">전체지우기</button>
<span id="save-badge">💾 저장중...</span>
        <div id="scorebox"><span id="sbg">0 / 0</span><span id="spct"></span></div>
        <button id="gbtn" onclick="doGrade()">이 문제 채점</button>
        <button id="agbtn" onclick="gradeAll()">전체 채점</button>
        <button id="resetbtn" onclick="resetThisQ()" title="이 문제 답변·채점 초기화">↺ 다시풀기</button>
        <button id="resetallbtn" onclick="resetAllQ()" title="전체 답변·채점 초기화">↺ 전체초기화</button>
      </div>
      <div id="cont">
        <div id="qwrap">
          <div id="qrnd"></div>
          <div id="qsbj"></div>
          <div id="qtxt"></div>
          <div id="qbox"></div>
          <div id="choices"></div>
          <div id="no-ans-note">⚠️ 이 문제는 정답 데이터가 없어 채점이 불가합니다. AI 비서에게 해설을 요청해보세요.</div>
          <div id="rb"><div id="rt"></div><div id="rm"></div></div>
        </div>
        <div id="cvw"><canvas id="cvs"></canvas><div id="paste-hint">📋 Ctrl+V 또는 길게 눌러 이미지 붙여넣기</div></div>
        <div id="empty"><p>이 과목의 문제가 없습니다.</p><small>다른 과목을 선택해 주세요.</small></div>
      </div>
    </div>
    <div id="aip">
      <div id="aii">
        <div id="aihd">
          <div id="aiic">🤖</div>
          <div><div id="aitl">AI 비서</div><div id="aisb">오답해설 · 개념설명 · 풀이도움</div></div>
        </div>
        <div id="aims">
          <div class="ab a">안녕하세요! 원가분석사 AI 비서입니다 😊<br><br>버튼을 누르거나 질문 입력 시 <b>이 채팅창</b>에서 Claude가 직접 답변합니다!<br>오답 채점 시 해설이 자동 제공됩니다.</div>
        </div>
        <div id="qkb">
          <button class="qk" onclick="ask('지금 이 문제의 풀이과정을 단계별로 설명해줘')">풀이 과정</button>
          <button class="qk" onclick="ask('이 문제와 관련된 핵심 개념을 설명해줘')">핵심 개념</button>
          <button class="qk" onclick="ask('이 문제의 오답 선지들이 왜 틀렸는지 설명해줘')">오답 분석</button>
          <button class="qk" onclick="ask('이 유형에서 자주 쓰이는 공식과 계산방법 알려줘')">핵심 공식</button>
          <button class="qk" onclick="ask('이 유형이 시험에서 자주 출제되는 패턴과 함정은?')">출제 패턴</button>
        </div>
        <div id="aia">
          <textarea id="ain" placeholder="질문 입력... (Enter 전송)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"></textarea>
          <button id="ais" onclick="sendAI()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// ===== QUESTION DATA (array format: [n, q, [c1,c2,c3,c4], a]) =====

<script>

1,000원","1,500원","2,000원","3,000원"],2],[16,"건설부문 시중노임은 누가 조사하여 발표하는가?",["대한건설협회","중소기업중앙회","한국원가관리협회","안전행정부"],2],[17,"공사원가 계산시 사용하는 건설직종의 노임단가는 1년에 2회 발표하는데 통상 그 시기는?",["1월, 7월","1월, 8월","1월, 9월","1월, 10월"],4],[18,"노임단가는 제조노임, 공사노임, 엔지니어링노임, 측량노임, S/W노임 등이 있는데, 공사원가를 산 정할 때 적용 가능한 노임단가는?",["공사노임+제조노임","공사노임+제조노임+엔지니어링노임","공사노임+제조노임+엔지니어링노임+S/W노임","모든 노임"],2],[19,"공사원가계산에서 이윤은 최대 몇 퍼센트까지 적용 가능한가?",["5%","10%","15%","20%"],2],[21,"장비의 사용료는 감가상각비 또는 기계경비로 산정을 하는데 내용연수가 1년 미만인 공구의 사용료 는 어떤 비목인가?",["직접재료비","간접재료비","감가상각비","기계경비"],2],[22,"회사의 임원 월급은 원가계산서의 어느 비목에서 지급하는가?",["재료비","노무비","경비","일반관리비"],2],[23,"공사원가산정시 부가가치세를 적용하지 않는 공사는?",["군부대공사","항만공사","도시철도공사","농로공사"],1]]},"4회":{"제조원가실무":[[1,"다음은 원가추정방법에 대한 설명이다. 옳지 않은 것은?",["고저점법은 원가자료 중 최고조업도와 최저조업도를 이용하여 원가함수를","회귀분석법은 결정계수(","계정분석법은 변동원가와 고정원가를 구분하는데 자의적이지 않고 객관적인 구분이 가능하다.","산업공학분석법은 과거자료 없이 미래원가를 추정하는 데 사용되는 방법이다."],4],[2,"다음은 변동원가계산에 관한 설명이다. 옳지 않은 것은?",["원가-조업도-이익분석(CVP분석)과 같은 단기적 의사결정에 유용하다.","전부원가계산에 비해 기말재고가 과소평가된다.","순이익은 생산량과 판매량에 영향을 받는다.","조업도 차이가 발생하지 않는다."],3],[3,"다음 자료를 이용하여 직접재료원가를 구하면 얼마인가? ㆍ기초재공품원가 : 100,000원 ㆍ매 출 ㆍ기말재공품원가 : 80,000원 ㆍ기초제품재고액 : 50,000원 ㆍ기말제품재고액 : 40,000원 ㆍ가 80,000원 공",["70,000원","80,000원","150,000원","170,000원"],1],[4,"보조부문간의 용역수수관계를 완전히 인식하는 배부 방법은?",["상호배부법","단계배부법","직접배부법","무배부법"],1],[5,"종합원가계산과 관련한 다음 설명 중 잘못된 것은?",["소품종을 대량생산하는 업종의 원가계산에 적합하다.","종합원가계산을 위해서는 물량(수량)흐름 파악이 중요하다.","작업폐물과 같은 비정상공손원가는 영업외비용으로 처리한다.","전공정원가는 물량의 흐름상 완성도가 항상 100%이다."],3],[6,"개별원가계산과 종합원가계산에 대한 설명 중에서 틀린 것은?",["개별원가는 제조원가보고서에 원가를 집계하나, 종합원가는 작업원가계산표에 원가를 집계하여 통제한","개별원가는 원가를 개별 작업별로 집계하나, 종합원가는 공정별로 집계한다.","개별원가는 원가를 직접비와 간접비로 구분하나, 종합원가는 재료비와","개별원가는 이종제품을 소량으로 생산하는 기업에 적합하며, 종합원가는"],1],[7,"종합원가계산에 대한 다음의 설명 중에서 틀린 것은?",["평균법은 전기에 이미 착수된 기초재공품의 기완성도를 무시하고 기초재공품이 당기에 착수된 것처럼","선입선출법에 비해 평균법은 당기의 성과를 이전의 기간과 독립적으로 평가할 수 있는 보다 적절한 기회","기초재공품이 없다면 평균법이든 선입선출법이든 기말재공품원가는 동일하다.","선입선출법에서는 공손품은 모두 당기에 착수된 물량에서 발생한 것으로 보고 원가계산을 한다."],2],[8,"평균법으로 완성품환산량 단위당 원가를 계산할 때, 필요하지 않은 자료는 무엇인가?",["기말재공품의 완성도","기초재공품의 물량","완성품의 물량","당기제조원가"],2],[9,"다음 중 제조원가명세서에서 확인할 수 없는 내용은?",["기말 원재료 재고액","재공품에 투입된 가공비","기말 재공품 재고액","기말 제품 재고액"],4],[10,"종합원가계산방식에는 평균법과 선입선출법의 방법이 있다. 양 방법으로 제품 및 재공품의 원가를 계산하는 경우에 다음 중 그 결과치가 일치하는 경우는?",["기초재공품이 없는 경우","기말재공품이 없는 경우","가공비가 공정 중에 균등하게 투입되는 경우","가공비가 공정 초에 전량 투입되는 경우"],1],[11,"기말재공품이 기초재공품보다 더 큰 경우 가장 적절한 것은?",["당기제조원가가 당기제품제조원가보다 더 클 것이다.","당기제품제조원가가 당기제조원가보다 더 클 것이다.","제조원가가 매출원가보다 더 클 것이다.","당기제조원가가 당기제품제조원가와 같다."],1],[12,"보조부문비의 제조부문 배부에 대한 설명 중 틀린 것은?",["단계배분법은 보조부문간에 일정한 배부순서를 정하여 그에 따라 제조","상호배부법은 보조부문간의 용역수수관계를 완전히 인식하는 배부방법이다.","보조부문비의 배부방법에 따라 회사의 총이익이 달라진다.","어떠한 배부방법을 적용하는 경우에도 보조부문비 총액이 모두 제조부문에"],3],[13,"개별원가계산의 설명으로 타당하지 않은 것은? - 18 -",["이질적인 제품을 주문생산 하는 경우에 적합하다.","핵심과제가 제조간접비의 배부에 있다.","공정별원가 통제가 용이하므로 책임회계에 적합하다.","원가계산시 개별원가표에 의해 간접비를 직접부과, 간접배부한다."],3],[14,"제조간접비를 각 작업에 배부하는 경우 배부기준으로서 가장 적절하지 않는 것은?",["직접노무비 기준","가공비 기준","직접노동시간 기준","기계시간 기준"],2],[15,"실제개별원가계산의 특징에 대한 설명 중에서 잘못된 것은?",["실제개별원가계산은 실제직접재료비, 실제직접노무비는 인과관계에 따라 발생과 동시에 제품별로 직","실제개별원가계산은 적시성 있는 원가정보를 제공하므로 원가관리를 신속하게 할 수 있어 기업의","실제제조간접비와 실제조업도는 매월 변동되므로 제조간접비 실제배부율이","실제개별원가계산에서 매월 조업도의 변동으로 인해 실제 제조간접비가"],2],[16,"당기의 기초원가가 25,000원이고, 가공원가가 27,000원이었다. 제조간접원가가 12,000원일 때 당 기총제조원가는 얼마인가?",["30,000원","35,000원","37,000원","40,000원"],3],[17,"기초재고액이 기말재고액보다 많은 경우 변동원가계산과 전부원가계산에 의한 순이익과의 차이는?",["변동원가 계산에 의한 순이익이 더 작다.","순이익은 같다.","생산량이 판매량보다 많으므로 순이익이 더 크다.","전부원가계산에 의한 순이익이 더 작다."],4],[19,"공정별원가계산에서 제2공정에서 재료는 50% 진행시점에 투입되고, 가공비는 공정 전체에 걸쳐 일정하게 투입되어서 기말재공품의 완성도가 40%가 되었을 때 기말재공품의 완성품환산량에 포함되는 원가에 대한 설명으로 올바른 것은? - 19 -",["기말재공품에 재료원가는 포함된다.","기말재공품에 가공원가는 포함되지 않는다.","기말재공품에 재료원가는 포함되지 않는다.","기말재공품에 재료원가와 가공원가는 포함된다."],3],[20,"원가를 분류함에 있어서 추적가능성에 따른 분류 설명 중 적절하지 않는 것은?",["직접원가는 특정원가대상에 추적이 용이한 원가이다.","직접재료비, 직접노무비, 직접경비 등을 말한다.","제조간접비는 인위적으로 원가배분이 필요한 원가이다.","완료된 시점에 대하여 실적을 조사한 원가를 말한다."],4],[21,"직접재료는 “소요량×단가”의 원단위계산방법에 의해 계산된다. 원가계산대상품은 아래의 조건에 서와 같이 부품A와 부품B로 구성되어 있다. 정부회계기준으로 원가계산을 실시하는데 있어 적용할 총 재료소요량을 계산하면(소수점 이하 둘째자리 절사) 몇 kg인가? ○ 제품규격 . 부품A 규격 : 두께 3㎜ × 폭500㎜ × 길 ,[12,"자산의 본질에 대한 설명이다. 틀린 것은?",["자산은 미래의 경제적인 효익이 있어야 하는 것은","특정 실체가 배타적으로 통제할 수 있어야 한다.","경제적 효익은 과거의 거래나 사건의 결과로서 발생될 수 있는 것이어야 한다.","자산의 효익은 회계단위로 계량화 또는 측정될 수 있는 것이어야 한다."],1],[13,"현금 및 현금등가물에 대한 설명으로 잘못된 것은?",["큰 거래 비용 없이 현금으로 전환이 용이한 것","이자율 변동에 따른 가치변동 위험이 적은 것","취득당시 만기가 1년 이내 도래하는 모든 자산","당좌자산에 속한다."],3],[14,"다음 중 현금과부족계정(cash over and short account) 의 설명 중 잘못된 것은?",["현금의 장부잔액과 실제금액이 일치하지 않을 때 그","현금잔액이 장부잔액보다 부족한 경우에는 차변에 기록한다.","현금잔액이 장부잔액보다 많은 경우에는 대변에 기록한다.","현금잔액이 장부잔액보다 많은 경우에는 주주에게 우선적으로 배당한다."],4],[15,"유동성이 가장 높은 자산은?",["유형자산","투자자산","재고자산","당좌자산"],4],[16,"다음 설명 중 틀린 것은?",["매출채권이란 일반적 상거래에서 발생한 채권으로서 외상매출금, 받을어음, 미수수익 등이다.","비매출채권이란 기타 영업활동에서 발생한 채권으로서 단기대여금, 미수금 등이다.","매입채무란 일반적 상거래에서 발생한 채무로서 외상매입금, 지급어음이다.","비 매입 채 무란 상 거래 이 외에 서 발생 한 채무 로 서"],1],[17,"2014년12월31일 현재 외상매출금 잔액은 2,000,000원 이고 수정 전 잔액시산표의 대손충당금은 86,000원이다. 이 회사가 작성한 경과일수 표와 경과일수별 대손예상률은 다음과 같다. 올바르게 분개한 것은? 경과 일수 50일 이하 ～80일 81일～100일 101일～130일 외상매출금 잔액 대손 예상률 1,100,000 1% 500,000 5% 20",["대손충당금 106,000","대손상각비","대손충당금","대손상각비 106,000"],2],[18,"다음 중 순매출액을 계산하는 요소가 아닌 것은?",["매입할인","총매출액","매출에누리 및 환입","매출할인"],1],[19,"대손과 관련된 설명이다. 잘못된 것은?",["미수금에 대한 대손상각비는 판매비와 관리비로 처리한다.","외상매출금에 대한 대손상각비는 판매비와 관리비로 처리한다.","대손발생시 이미 설정된 대손충당금 잔액이 있으면 우선 그것으로 충당하고 부족하면 대손상각비","기업회계기준에서 인정하는 대손 충당금 추정방법은 재무상태표 접근법이다."],1],[20,"매출채권에 대한 설명으로 틀린 것은?",["기업의 일반상거래에서 발생한 외상매출금과 받을어음을 말한다.","재화나 용역을 인도 또는 제공한 시점에서 발생한다.","현금으로 대금결제를 하는 경우 할인하는 것을 매출에누리라고 한다.","현금으로 대금결제를 하는 경우 할인하는 것을 매출할인이라고 한다."],3]],"원가관리회계":[[1,"다음에서 제조원가로 분류할 수 없는 것을 고르시오.",["공장건물의 재산세","제품에 대한 광고선전비","공장기계의 감가상각비","공장근로자 회사부담분 국민연금"],2],[2,"다음은 제조간접비에 대한 설명이다. 맞는 것은?",["가공비가 된다.","고정비만 포함된다.","변동비만 포함된다.","모든 노무비를 포함한다."],1],[3,"다음 자료에서 기초원가와 가공비 두 가지 모두에 해당하는 금액은 얼마인가? ▪ 직 접 재 료 비 : ￦300,000 ▪ 직 접 노 무 비 : ￦400,000 ▪ 변동제조간접비 : ￦200,000 ▪ 고정제조간접비 : ￦150,000",["￦400,000","￦450,000","￦650,000","￦700,000"],1],[4,"다음의 공장 전기요금고지서의 내용에 대한 원가 행태상의 분류로 맞는 것을 고르시오. • 기본요금: ￦1,000,000(사용량과 무관) • 사용요금: ￦3,120,000(사용량: 48,000kw, kw당￦65) • 전기요금합계: ￦4,120,000",["준변동원가","준고정원가","변동원가","고정원가"],1],[5,"당기제품제조원가에 대한 설명으로 올바른 것을 고르시오.",["기초재공품재고액+당기총제조원가-기말재공품재고액","직접재료비+직접노무비+제조간접비","당기총제조원가-기말재공품재고액","기초재공품재고액+당기총제조원가"],1],[6,"아래는 제조원가명세서를 작성하기 위한 자료들이다. 이 중 제조원가명세서에 오.",["당기직접재료비 사용액","당기직접노무비 발생액","당기기말제품 재고액","당기제조간접비 발생액"],3],[7,"다음 중 제조원가명세서로부터 확인 가능한 사항이 아닌 것을 고르시오. - 7 - 포함되지 않는 것을 고르시",["기말 직접재료재고액","당기 제품제조원가","기말 재공품재고액","당기 매출원가"],4],[8,"다음 중 제조원가명세서에서 확인할 수 없는 내용은 무엇인가?",["기말 제품 재고액","재공품에 투입된 가공비","기말 재공품 재고액","기말 원재료 재고액"],1],[9,"다음 자료를 활용하여 제품단위당 변동제조원가를 산출하면 얼마인가 고르시오. 단위당 판매가격 ￦900 단위당 직접재료비 ￦300 단위당 직접노무비 ￦220(시간당 임률은 ￦110) 변동제조간접비는 시간당 ￦20 이 발생되는 것으로 추정",["￦340","￦560","￦940","￦1240"],2],[10,"원가행태에 따라 원가를 구분한 것을 다음 중 고르시오.",["사전원가와 사후원가","직접원가와 간접원가","제품원가와 기간원가","변동원가와 고정원가"],4],[11,"다음 중 원가배분의 목적으로서 옳지 않은 것은?",["회사의 미래계획수립 또는 자원배분과 관련된 의사결정을 하기 위해서이다.","책임원가계산제도의 형성에 따른 조직구성원에 대한 동기부여와는 관련이 없다.","재고자산, 매출원가를 정확히 산출하여 주주, 채권자 등 이해관계자들에게 합리적인 정보를 제공하기 위해 원","계약금액 등을 결정함에 있어서 발생한 원가를 정당화 할 수 있다."],2],[12,"원가계산을 할 때 보조부문은 제조부문의 제조활동에 필요한 용역을 제공하기 때문에 보조부문의 원가는 제 조부문에 배부되어야 한다. 이때 이상적인 배부기준은 논리적이고, 보조부문원가 발생과 높은 상관관계가 있으 며, 쉽게 배분될 수 있어야 한다. 일반적으로 널리 사용되는 배부기준으로서 다음 중 연결이 가장 적당하지 않는 것은?",["건물관리부문 - 면적(㎡)","동력부문 - 종업원 인원수","수선유지부문 - 작업시간","공장인사관리부문 - 종업원 인원수"],2],[13,"다음 중 보조부문간의 용역수수관계를 완전히 인식하는 배부법은 어느 것인가? - 8 -",["직접배부법","단계배부법","상호배부법","무배부법"],3],[14,"다음 중 제조간접비의 배부차액을 처리하는 방법에 해당하는 것은 어느 것인가?",["직접배부법","단계배부법","상호배부법","비례배분법"],4],[15,"다음 중 개별원가계산의 설명으로 타당하지 않은 것은 어느 것인가?",["이질적인 제품을 주문생산 하는 경우에 적합하다.","핵심과제가 제조간접비의 배부에 있다.","공정별원가 통제가 용이하므로 원가책임을 파악할 수 있는 책임회계에 적합하다.","원가계산시 개별원가표에 의해 제조간접비를 직접부과 또는 간접부과 한다."],3],[16,"다음 중 제품원가계산을 정확하게 할 수 있는 방법이라고 보기 어려운 것은?",["노무비 중 직접노무비의 비중을 증가시킨다.","제조간접비 배부기준은 인과관계가 큰 것을 적용한다.","직접재료원가의 비중을 감소시킨다.","제조간접비 배부기준을 다양하게 적용시킨다."],3],[17,"개별원가계산제도에 있어 각 작업별 직접재료원가, 직접노무원가, 제조간접원가 등이 집계․기록되는 장소 (서류)는 어느 것인가?",["송장","거래명세표","매입주문서","작업원가표"],4],[18,"다음은 개별원가계산에 대한 설명이다. 잘못된 것은 어느 것인가?",["평균화 과정으로 원가계산을 단순화시킬 수 있다.","실제배부율과 예정배부율의 구분은 제조간접비와 관련된 문제이다.","부문별 제조간접비 배분율을 사용하는 것이 공장전체 제조간접비 배분율 적용보다 더 정확하다.","고객의 주문에 따라 제품을 생산하는 주문생산형태에 적합한 원가계산이다."],1],[19,"다음은 개별원가계산에서 적용되는 제조간접원가와 예정배부에 대한 설명이다. 적합하지 않은 것은 어느 것인가?",["제조간접비 배부율은 공장전체의 제조간접비 배부율을 적용할 수도 있고, 부문별 제조간접비 배부율을 적","재료원가는 직접 재료원가이므로 제조간접원가를 구성하지 않는다.","제조간접원가 배부율 계산에서 배부기준은 기계시간 또는 직접노동시간 등을 적용할 수 있다.","제조간접원가 예정배부액이 제조간접원가 실제발생액보다 많은 경우에는 과다배부가 발생한다."],2],[20,"다음은 개별원가계산의 제조간접비와 관련한 설명이다. 가장 옳지 않은 것은 어느 것인가?",["재료비는 직접 추적 가능한 원가이므로 제조간접비 배부대상이 되지 아니 한다.","제조간접비 배부방법 중 실제배부법은 제조간접비 실제발생 총액이 집계되어야 하므로 원가계산시점이 지","제조간접비 배부차이는 처리방법에 따라 영업외손익으로도 반영이 가능하다.","제조간접비의 예정배부액이 실제발생액보다 큰 경우에는 과다배부로 유리한 차이를 가져온다."],1]],"제조원가실무":[[3,"정부원가계산기준의 제조원가계산에서 철판 재료에 대한 작업설을 평가할 때 작업설물 회수량은 아래에서 어떤 기준이 합리적인가?",["100%","70%","80%","cutting plan에 의한 설물발생량"],3],[11,"다음은 재무회계와 관리회계의 특성을 열거하였다. 틀린 것을 고르시오. 재무회계 관리회계",["외부 이해관계자 위주","일반목적용 재무제표","객관성과 주관성 공존","일반적으로 인정된 회계기준(K-IFRS)"],1],[12,"원가계산의 발전 단계를 순서에 따라 표시한 것이다. 가장 알맞게 표시하고 있는 것은?",["제품원가의 파악－원가관리－원가분석 및 경영계획에의 활용","제품원가의 파악－원가분석 및 경영계획에의 활용－원가관리","원가분석 및 경영계획에의 활용－원가관리－제품원가의 파악","원가관리－제품원가의 파악－원가분석 및 경영계획에의 활용"],4],[13,"다음의 설명 중 적당하지 못한 것을 고르시오.",["재무회계는 외부정보이용자에게 정보를 제공한다.","관리회계는 내부정보이용자에게 정보를 제공한다.","원가회계는 재무회계뿐만 아니라 관리회계에 필요한 기초 정보를 제공한다.","원가회계는 관리회계 분야만을 위한 기초 정보를 제공한다."],4],[14,"다음의 산식 중 틀린 것을 고르시오.",["제조원가＝기초원가＋제조간접비","총원가＝판매가격－이익－판매비와 관리비","총원가＝제조원가＋판매비와 관리비","가공비＝제조원가－직접재료비"],4],[18,"원가를 고정비와 변동비로 구분하고 제품원가에 변동비만을 포함시키는 원가계산방법을 무엇이라고 하는가?",["전부원가계산","변동원가계산","실제원가계산","표준원가계산"],4],[19,"원가계산방법 중 제조간접비를 계산할 때 정상조업도를 기준으로 한 예정제조간접비율로 계산하여 제조간접비 를 계산하는 원가계산을 무엇이라 하는가?",["실제원가계산","직접원가계산","표준원가계산","정상원가계산"],2],[20,"다음 중 개별원가계산에 대한 설명으로 올바르지 못한 것은?",["주문식 생산방식","소품종개별생산방식","개별작업별 원가집계","공정별 원가집계"],1],[21,"다음 내용 중 변동비에 대한 설명 중 틀린 것은?",["생산량의 증감에 관계없이 단위당 원가는 일정하다.","생산량이 증가하면 단위당 원가는 감소한다.","생산량의 증감에 따라 원가총액이 비례적으로 증감한다.","직접재료비, 직접노무비는 변동비이다."],1],[22,"제조원가로 구분하는 계정과목만을 표시한 것을 고르시오.",["공장장급료, 광고비, 간접노무비","공장소모품비, 영업부사원급료, 공원피복비","공장수도광열비, 직접재료비, 기획이사퇴직금","공장기계수선비, 작업감독자급료, 공장감가상각비"],1],[23,"다음에서 경비에 대한 설명이 맞는 것은?",["전력비는 지급경비이다.","공장건물 임차료는 측정경비이다.","공장건물의 감가상각비는 판매비와 관리비이다.","정상적인 재료감모손실은 제조간접비로, 비정상적인 재료감모손실은 집합손익으로 처리한다."],2],[25,"건물감가상각비의 배부기준으로 합리적인 기준을 고르시오.",["각 제조부문과 보조부문의 전력사용량","각 제조부문과 보조부문의 인원수","각 제조부문과 보조부문의 작업시간","각 제조부문과 보조부문의 면적"],3]],"공사기타원가":[[1,"공공 건설공사에서 예정가격 작성대상이 아닌 것은?",["설계․시공분리방식으로 발주하는 공사","대안입찰에 부치는 공사","설계․시공일괄(턴키)방식으로 발주하는 공사","내역입찰방식으로 발주하는 공사"],3],[2,"다음 중 공사 예정가격에 포함되지 않는 것은?",["관급자재비","일반관리비","부가가치세","이윤"],1],[3,"다음 중 공사비 산정결과의 정확도가 가장 높은 적산방식은?",["개략적산방식(Preliminary Estimate)","부위별적산방식(Elemental Analysis Estimate)","단가적산방식(Unit Price Estimate)","상세적산방식(Detailed Estimate)"],4],[4,"다음 중 실시설계가 완료되는 시점에서 가장 유용한 적산자료는?",["시설부위별 공사비 자료","단위면적당 공사비 자료","세부공종별 시공단가 자료","회귀분석식"],3],[5,"공사예정가격을 작성하는 경우 직접공사비의 성격으로 가장 부적합한 것은?",["본사운영을 위한 관리비","공사목적물 실체를 형성하는 재료비","공사외주비용","특허권 사용료"],3],[11,"다음 중 계약도서에 포함되지 않는 것은?",["계약조건","설계도면","산출내역서","예정가격조서"],4],[12,"공사비 산정을 위하여 필요로 하는 요소로서 가장 부적합한 것은?",["적산에 필요한 코스트 데이터","회귀분석에 의한 가격","적산기법","적산담당자의 기술력과 경험"],2],[14,"다음 중 공사원가 산정에 있어 품할증의 요인으로 가장 부적합 것은?",["계약내용 할증","고소작업 할증","야간 할증","지세별 할증"],1],[15,"다음 중 공사원가를 산정함에 있어 토질분류로 가장 부적합한 것은?",["경질토사","호박돌 섞인 토사","극경암","석회암"],4],[22,"가격정보지에서 인테리어필름, 목재창호 등 일부 단가는 현장설치도로 단가를 발표하였는데 이 단가의 비목은?",["재료비","노무비","경비","업체에 확인하여 재료비, 노무비, 경비로 구분"],1],[23,"가격정보지에서 자재단가 조사 시 알루미늄설(샤시)(작업설·부산물 등)의 단가가 아래와 같이 조사가 되었다면 채택할 단가는?",["1700","1800","1900","2000"],4],[24,"원가계산서를 하나의 회사로 가정했을 때 회사의 임원은 어떤 비목에서 월급을 받아가는가?",["재료비","노무비","경비","일반관리비"],4],[25,"일반건설공사의 총공사비가 50억 원 미만인 경우 적용할 일반관리비율은?",["4.0%이하","5.0%이하","6.0%이하","7.0%이하"],2]],"제도및법규":[[1,"국가계약법령에 따라 체결되는 국가계약의 특성에 대하여 설명한 다음 사항 중 올바르지 못한 것은?",["국가가 당사자가 되는 공공계약은 사경제주체로서 상대방과 대등한 위치에서 체결되는 계약이다.","법률적용에 있어서도 사적자치와 민법상 일반적 법원칙이 기본적으로 적용된다.","국가계약법령은 기본적으로는 입찰, 낙찰, 계약이행 등에 관한 절차법규에 해당한다.","국가계약은 공공기관이 주체이므로 국가계약법령 적용에 있어 분쟁이 발생 시에는 민사소송이 아닌 행정소송"],4],[2,"국가계약형태 중 장기계속계약제도에 대하여 서술한 다음 사항 중 올바르지 못한 것은?",["장기계속공사의 경우 사업의 규모, 내용 등이 확정되었지만 예산확보가 불확실한 경우 주로 활용된다.","총공사금액을 대상으로 입찰이 실시되고, 계약도 총공사금액을 기준으로 하여 체결된다.","장기계속계약제도는 1차년도 확보된 예산의 범위 내에서 계약을 체결하며 총공사금액을 부기하는 제도이다.","장기계속계약의 계약상대자는 1차 계약 시 부기한 총금액에 대한 권리와 의무가 있다."],2],[3,"다음은 국가계약법령상 운영되고 있는 장기계속계약과 계속비 계약제도를 비교하여 설명한 사항들이다. 두 가 지 계약제도 설명 중 타당하지 않은 것은?",["두 가지 계약제도 모두 총 사업내용을 확정한 후 입찰을 실시한다.","장기계속계약이나 계속비계약 모두 총 공사 예산이 확보된 점에서는 동일하다.","장기계속계약은 각 회계연도 예산범위 내에서 계약을 체결하고, 계속비계약은 총공사금액으로 계약을 체결한다.","장기계속계약이나 계속비계약 모두 총공사 금액으로 입찰을 실시한다."],2],[4,"다음의 수의계약제도에 대한 설명 중 옳지 않은 것은?",["천재지변, 기밀행위, 소규모 계약 등 경쟁에 부칠 시간이 없거나 곤란한 경우 등에 체결하는 계약제도이다.","하자불분명, 작업상 혼잡, 마감공사 등 계속공사의 경우 수의계약이 가능하다.","일반건설공사는 추정가격 2억 원 이하, 전문건설공사는 1억 원 이하를 소규모 공사로 보아 수의계약에 의할","수의계약은 국가계약법령에 규정된 사유이외에도 계약담당공무원이 판단하여 체결할 수 있다."],4],[5,"입찰참가자격사전심사(PQ)제도에 대하여 설명한 다음 사항 중 타당하지 않은 것은?",["부실공사 방지를 위한 수단으로 입찰참가자격을 미리 심사하여 일정수준 이상인자 만을 입찰에 참여 할 수 있","가격요소만으로 낙찰자를 결정하는 최저가낙찰제 대상공사는 반드시 실시하도록 의무화하였다.","정부는 입찰참가자격을 사전에 심사하여야 할 대상공사를 국가계약법령에 구체적으로 정하여 운용하고 있다.","심사결과 이의가 있는 경우에는 현장설명일 3일전까지 계약담당공무원에게 재심사를 요청할 수 있다."],3],[6,"입찰참가자격사전심사기준의 세부내용에 대한 다음 설명 중 타당하지 않은 것은?",["발주기관이 심사기준을 정함에 있어서는 이행실적, 기술능력, 재무상태 등 계약수행능력을 평가하는 필요 요소","경영상태 부문의 적격요건을 충족한 자를 대상으로 기술적 공사이행능력 부문을 심사한다.","기술적 공사이행능력 부문은 시공경험, 기술능력, 시공평가결과, 지역업체 참여도, 신인도를 종합적으로 심사하며","경영상태 부문의 평가는 부채비율, 유동비율 등 회사의 재무제표를 이용하여 평가하며 점수를 부여한다."],4],[7,"다음은 국가계약법령상 규정되어진 입찰참가자격과 입찰의 무효사유에 관한 서술 사항이다. 잘 못 서술된 사항 은?",["입찰참가자격의 판단 기준일은 입찰참가등록마감일을 기준으로 한다.","입찰참가자격이 없는 자가 한 입찰은 무효이다.","낙찰자가 계약체결이전 입찰무효 등 부적격자로 판명되어","입찰무효 여부는 계약담당공무원이 재량으로 처리할 수 있다."],4],[8,"다음의 적격심사낙찰제에 대한 설명 중 타당하지 않은 것은?",["최저가낙찰제의 저가수주로 인한 부실공사를 방지하기 위해 도입된 제도이다.","가격보다는 계약이행능력에 중심을 두어 심사하는 낙찰제도이다.","계약이행능력에 대한 평가는 시공경험, 기술능력, 시공평가 결과, 경영상태, 신인도 등 PQ심사항목이 주요 평가","계약이행능력 평가는 업체에 대한 변별력이 작용하고 있다."],4],[9,"정부공사의 턴키 입찰제도에 대한 다음 설명 중 타당하지 않은 것은?",["설계와 시공의 일관성을 확보하기 위해 도입된 제도로서 기술보다는 가격위주의 입찰제도이다.","입찰자는 정부가 제시한 지침에 따라 기본설계서를 작성하여 입찰서와 함께 제출한다.","입찰참가자에 대한 기본설계의 적격여부 및 기본설계점수는 중앙건설기술심의위원회에서 심의 결정한다.","기본설계점수와 입찰가격을 종합적으로 고려하여 실시설계적격자를 선정하여 실시설계서를 제출토록 하고 중앙"],1],[10,"국가계약의 체결과 성립에 대한 다음 서술 중 잘못 된 것은?",["낙찰자는 낙찰통지를 받은 후 10일 이내에 계약을 체결하여야 한다.","계약담당공무원과 계약상대자가 계약서에 기명·날인 또는 서명함으로서 계약이 확정 된다.","장기계속공사는 제1차 공사에 대하여 계약을 체결하되 총공사 낙찰금액을 부기한다.","낙찰된 자의 계약체결 여부는 자유의사이므로 당해 계약을 체결하지 아니하여도 특별한 제재를 받지 아니한다."],4],[11,"다음은 계약보증금의 납부절차, 납부면제, 국고귀속 등에 대한 서술이다. 타당하지 않은 서술은?",["계약상대자는 계약체결 전까지 계약보증금납부서와 함께 납부하여야 한다.","국가기관이나 공공기관등과 계약체결 시는 계약보증금 납부가 면제된다.","계약상대자가 정당한 이유 없이 계약상 의무를 이행하지 않는 경우에는 계약보증금을 국고에 귀속하여야 한다.","계약보증금을 국고에 귀속함에 있어서는 일반적으로 기성부분에 대한 미지급금액과 상계 처리할 수 있다."],4],[12,"선금의 사용 및 정산과 기성대가 지급 등에 관한 다음 사항 중 잘못 서술된 것은?",["선금은 노임지급 및 자재확보에 우선 사용하도록 하여야 한다.","계약상대자가 선금지급 조건을 위배한 경우에는 선금잔액을 반환하도록 청구하여야 한다.","검사에 합격된 자재가 공사현장에 반입된 경우라면 기성부분으로 인정하여 기성대가를 지급할 수 있다.","선금반환 청구 시 기성부분에 대한 미지급금액이 있는 경우에는 선금잔액을 그 미지급금액에 우선적으로 충당"],3],[14,"다음은 국가계약제도 중 특정규격 자재에 대하여 물가를 반영할 수 있는 단품슬라이딩 제도에 대한 설명이다. 이와 관련하여 잘못 기술된 것은?",["특정규격 자재의 가격이 입찰일 기준으로 15%이상 변동한 경우 개별적으로 물가조정을 할 수 있는 제도이다.","특정규격 자재는 산출내역서상 재료비 항목에 포함되어 있는 규격이 있는 모든 자재를 말한다.","특정자재를 납품 설치하는 하도급업체 보호 등을 위한 제도이다.","모든 특정규격 자재에 대해 단품 물가조정이 가능하다."],4],[15,"다음은 정부공사의 설계변경으로 인한 계약금액조정 제도의 개념에 관한 설명이다. 타당하지 않은 사항은?",["설계서의 오류, 사업계획 변경 등에 따라 원만한 계약이행을 위하여 설계변경은 불가피한 조치라고 할 수 있다.","일반사법상 사정변경의 원칙을 원용한 제도라고 할 수 있다.","설계서를 변경하는 것을 의미하는 것이나 공사물량 증감이 발생하지 않는다.","설계변경은 설계서 내용이 지질조사 등의 한계로 공사현장 상태와 상이한 경우에도 발생한다."],3],[16,"다음은 국가계약제도 중 소요자재의 수급방법 변경에 관하여 설명한 사항이다. 타당하지 않은 것은?",["발주기관의 사정으로 인하여 당초 관급자재로 정한 품목을 사급자재로 변경하고자 할 경우에는 서면으로 계약상","관급자재를 사급자재로 수급방법을 변경할 경우에는 통보당시 가격에 의하여 그 대가를 지급하여야 한다.","계약담당공무원은 임의로 당초의 사급자재를 관급자재로 변경조치 할 수 있다.","설계변경 등으로 인하여 당초 관급자재의 수량이 증가되는 경우에도 계약상대자가 직접 구입하여 투입할 수 있"],3],[17,"다음은 설계변경 사유로 볼 수 없는 경우를 설명한 사항이다. 올바르게 설명되지 않은 것은?",["산출내역서상 단가의 과다·과소 산정은 계약금액 조정사유에 해당되지 않는다.","발주기관이 예정가격 작성 시 원가계산의 착오로 과다 계상된 사실이 계약체결 후 발견된 경우 설계변경 사유에 해","계약체결 후 품셈이 인상 또는 인하 조정은 설계변경사유에 해당되지 않는다.","입찰참가자가 직접 물량을 작성하는 순수내역입찰제에 있어 물량내역 누락은 설계변경 사유에 해당하지 않는다."],2],[18,"정부가 실시하는 입찰에 일정기간 배제시키는 부정당업자 제재 제도에 관한 설명이다. 잘못 서술된 것은?",["제재 대상자가 법인인 경우 해당 법인은 물론 대표자에 대하여도 제재 조치를 한다.","공동계약의 경우 구성원 전원에 대하여 제재조치를 한다.","입찰참가자격을 제한한 때에는 전자조달시스템에 게재하여야 한다.","제재조치는 행정처분에 해당하는 것으로 행정절차법과 행정소송법이 적용된다."],2],[19,"정부가 물품·공사·용역 등 조달계약을 체결함에 있어 국제입찰 대상여부, 최저가낙찰제 대상여부 등을 판단하는 기준으로 삼기 위하여 국가계약법령에 도입하여 운영하고 있는 용어는 다음 중 어느 것인가?",["예정가격","추정가격","추정금액","예정금액"],2],[21,"원가계산을 할 때 단위당 가격은 일정한 기준에 따라 적용하여야 한다. 국가계약법령상 규정되어진 단위당 가격 기준에 대한 다음 설명 중 잘못 기술된 것은?",["거래실례가격 또는 통계법에 따른 지정기관이 조사 공표한 가격이 감정가격 또는 견적가격보다 우선적으로 적","노임단가는 통계법에 따라 지정된 기관이 조사하여 공표한 가격을 적용한다.","단위당 가격 적용에는 우선순위가 없다.","제주도를 포함한 도서지역은 조사·공표된 노임단가의 15%범위 내에서 가산 적용할 수 있다."],3],[22,"다음은 국가계약법령상 예정가격 결정기준 또는 원가계산을 할 때 단위당 가격의 기준이 되는 거래실례가격에 대 한 설명이다. 타당하지 않은 것은?",["거래실례가격은 3가지 유형이 있으며 적용에는 우선순위가 없다.","조달청 가격정보지가 기획재정부장관에 등록한 전문가격조사기관이 조사 공표한 가격보다 우선 적용된다.","계약담당공무원이 2이상의 사업자에 대하여 물품의 거래를 직접 조사하여 확인한 가격도 거래실례가격의 일종","거래실례가격으로 예정가격을 결정시에 일반관리비 및 이윤을 따로 가산하여서는 아니 된다."],2]]},"6회":{"제조원가실무":[[1,"제품제조활동은 소재구입에서 가공조립에 이르는 공정을 거쳐 완제품이 생산된다. 정부원가계산기준에 의해 재 료소요량을 산출할 때 포함되지 않는 것은?",["정미량","손실률","불량률(보수가능품)","시료율"],4],[10,"예정가격작성기준에서는 제비율에 대한 상한선을 규정하고 있는데, 다음의 비목 중에서 상한선이 규정되지 않는 것은 어떤 것인가?",["간접노무비","일반관리비","간접재료비","이윤"],3],[11,"원가계산의 발전 단계를 순서에 따라 표시한 것이다. 가장 알맞게 표시하고 있는 것은?",["제품원가의 파악－원가관리－원가분석 및 경영계획에의 활용","제품원가의 파악－원가분석 및 경영계획에의 활용－원가관리","원가분석 및 경영계획에의 활용－원가관리－제품원가의 파악","원가관리－제품원가의 파악－원가분석 및 경영계획에의 활용"],1],[12,"다음의 설명 중 적당하지 못한 것을 고르시오.",["재무회계는 외부정보이용자에게 정보를 제공한다.","관리회계는 내부정보이용자에게 정보를 제공한다.","원가회계는 재무회계뿐만 아니라 관리회계에 필요한 기초 정보를 제공한다.","원가회계는 관리회계 분야만을 위한 기초 정보를 제공한다."],4],[13,"다음의 산식 중 틀린 것을 고르시오.",["제조원가＝기초원가＋제조간접비","총원가＝판매가격－이익－판매비와 관리비","총원가＝제조원가＋판매비와 관리비","가공비＝제조원가－직접재료비"],2],[16,"원가계산방법 중 제조간접비를 계산할 때 정상조업도를 기준으로 한 예정제조간접비율로 계산하여 제조간접비 를 계산하는 원가계산을 무엇이라 하는가?",["실제원가계산","직접원가계산","표준원가계산","정상원가계산"],2],[17,"다음 중 개별원가계산에 대한 설명으로 올바르지 못한 것은?",["주문식 생산방식","소품종개별생산방식","개별작업별 원가집계","공정별 원가집계"],4],[18,"제조원가로 구분하는 계정과목만을 표시한 것을 고르시오. - 28 -",["공장장급료, 광고비, 간접노무비","공장소모품비, 영업부사원급료, 공원피복비","공장수도광열비, 직접재료비, 기획이사퇴직금","공장기계수선비, 작업감독자급료, 공장감가상각비"],4],[19,"다음에서 경비의 분류가 틀린 것을 고르시오.",["보험료, 특허권사용료, 임차료 --- 월할경비","전력비, 가스비, 수도비 --- 측정경비","외주가공비, 임차료, 감가상각비 ---지급경비","재료감모손실--- 발생경비"],3],[20,"건물감가상각비의 배부기준으로 합리적인 기준을 고르시오.",["각 제조부문과 보조부문의 전력사용량","각 제조부문과 보조부문의 인원수","각 제조부문과 보조부문의 작업시간","각 제조부문과 보조부문의 면적"],4],[21,"다음은 부문별 원가계산시 보조부문원가를 제조부문에 배부하는 기준을 제시하였다. 잘못 된 것은?",["전력부문비：측정된 전력량","복리후생부문비：종업원 수","감가상각비：매출액","수선부문비：수선횟수"],1],[22,"부문공통비 중 연구개발비의 배부기준으로 적합한 것은?",["각 부문의 점유면적","각 부문의 종업원 수","각 부문의 출고액","각 부문의 직접작업시간"],3],[23,"개별원가계산에 대한 설명으로 틀린 것은?",["특정제조지시서에 따라 원가계산표가 작성된다.","제품의 규격, 종류가 다른 다품종 소량생산의 주문생산 기업","정확한 원가계산 여부는 제조간접비 배부가 좌우한다.","제조직접비와 제조간접비를 구분할 필요가 없다."],1],[24,"부문공통비가 될 수 없는 것은?",["직접재료비","동력비","보험료","전화료"],3]],"공사기타원가":[[1,"공공 건설공사에서 예정가격 작성대상이 아닌 것은?",["설계․시공분리방식으로 발주하는 공사","대안입찰에 부치는 공사","설계․시공일괄(턴키)방식으로 발주하는 공사","내역입찰방식으로 발주하는 공사"],3],[2,"다음 중 공사 예정가격에 포함되지 않는 것은?",["관급자재비","일반관리비","부가가치세","이윤"],1],[3,"다음 중 공사비 산정결과의 정확도가 가장 높은 적산방식은?",["개략적산방식(Preliminary Estimate)","부위별적산방식(Elemental Analysis Estimate)","단가적산방식(Unit Price Estimate)","상세적산방식(Detailed Estimate)"],4],[4,"다음 중 실시설계가 완료되는 시점에서 가장 유용한 적산자료는?",["시설부위별 공사비 자료","단위면적당 공사비 자료","세부공종별 시공단가 자료","회귀분석식"],3],[5,"공사예정가격을 작성하는 경우 직접공사비의 성격으로 가장 부적합한 것은?",["본사운영을 위한 관리비","공사목적물 실체를 형성하는 재료비","공사외주비용","특허권 사용료"],1],[6,"공사원가계산에서 표준품셈에 의하여 산출되지 않는 비목은?",["산재보험료","직접재료비","기계경비","가설비"],1],[8,"다음 중 정부제정 “수량산출기준”에 포함되어 있지 않은 항목은?",["표준품셈과 유사한 자재‧인력 등의 소요량","내역서의 공종분류체계","내역서의 세부 공종별 수량산출 단위결정의 기준","내역서의 세부 공종별 공종코드결정의 기준"],1],[9,"다음 중 표준품셈의 설명으로 부적합한 것은?",["표준품셈은 건설공사의 대표적이고 보편적 공종 및 공법을 기준으로 자원의 소요량을 표시한 적산기준이다.","표준품셈은 공사 예정가격을 산정하기 위한 공종별 단가이다.","표준품셈은 원가계산에 의하여 예정가격산정 작성 시 기초자료로 활용할 수 있다.","표준품셈은 현장여건, 기후의 특성 및 조건에 따라 조정하여 적용할 수 있다."],2],[10,"다음 중 계약도서에 포함되지 않는 것은?",["계약조건","설계도면","산출내역서","예정가격조서"],4],[11,"공사비 산정을 위하여 필요로 하는 요소로서 가장 부적합한 것은?",["적산에 필요한 코스트 데이터","회귀분석에 의한 가격","적산기법","적산담당자의 기술력과 경험"],2],[12,"다음 중 간접노무비 산정방식으로 가장 부적합 것은?",["직접반영방법","비율분석방법","전문가의 경험과 판단에 의한 방법","보완적 계산방법"],3],[13,"다음 중 공사원가 산정에 있어 품할증의 요인으로 가장 부적합 것은?",["계약내용 할증","고소작업 할증","야간 할증","지세별 할증"],1],[14,"다음 중 공사원가를 산정함에 있어 토질분류로 가장 부적합한 것은?",["경질토사","호박돌 섞인 토사","극경암","석회암"],4],[15,"다음 중 건설기계의 손료에 포함되지 않는 것은?",["운전경비","상각비","정비비","관리비"],1],[16,"다음 중 건설기계 시공능력(Q) 산정에 영향을 미치지 않는 것은?",["시간당 작업싸이클 수","체적환산계수","작업효율","경제적 내용년수"],4],[17,"개발이익 환수에 관한 법률에 따른 개발비용 산정 시 인정대상이 아닌 것은?",["순공사비, 조사비, 설계비, 일반관리비","개발부담금 납부의무자가 공공시설이나 토지 등을 국가·지방자치단체에 기부채납 한 경우 그 가액","개발부담금 납부의무자가 공공시설이나 토지 등을 국가·지방자치단체에 제공한 경우 그 가액","해당토지의 개량비 및 제세공과금 등"],3],[18,"다음의 개발부담금 부과와 징수에 대한 설명사항 중 타당하지 않은 것은?",["국토교통부장관은 부과종료시점부터 3개월 이내에 개발부담금을 결정·부과하여야 한다.","국토교통부장관은 비용내역서가 제출된 날부터 60일 이내에 부과기준 및 부과금액을 통지하여야 한다.","예정통지를 받은 납부의무자는 30일 이내에 심사를 청구할 수 있다.","개발부담금은 이를 부과할 수 있는 날부터 5년이 경과한 후에는 부과할 수 없다."],1],[20,"가격정보지에서 인테리어필름, 목재창호 등 일부 단가는 현장설치도로 단가를 발표하였는데 이 단가의 비목은?",["재료비","노무비","경비","업체에 확인하여 재료비, 노무비, 경비로 구분"],1],[22,"물가변동으로 인한 계약금액조정이 가능한 경우(기간의 경우)는?",["일찰일로부터 90일일째","일찰일로부터 91일일째","계약일로부터 90일일째","계약일로부터 91일일째"],4]],"제도및법규":[[5,"다음은 국가계약법령상 규정되어진 입찰참가자격과 입찰의 무효사유에 관한 서술 사항이다. 잘 못 서술된 사항 은?",["입찰참가자격의 판단 기준일은 입찰참가등록마감일을 기준으로 한다.","입찰참가자격이 없는 자가 한 입찰은 무효이다.","낙찰자가 계약체결이전 입찰무효 등 부적격자로 판명되어 낙찰결정이 취소된 경우에는 나머지 입찰자들로서 2인","입찰무효 여부는 계약담당공무원이 재량으로 처리할 수 있다."],2],[14,"정부가 실시하는 입찰에 일정기간 배제시키는 부정당업자 제재 제도에 관한 설명이다. 잘못 서술된 것은?",["제재 대상자가 법인인 경우 해당 법인은 물론 대표자에 대하여도 제재 조치를 한다.","공동계약의 경우 구성원 전원에 대하여 제재조치를 한다.","입찰참가자격을 제한한 때에는 전자조달시스템에 게재하여야 한다.","제재조치는 행정처분에 해당하는 것으로 행정절차법과 행정소송법이 적용된다."],4],[15,"정부가 물품·공사·용역 등 조달계약을 체결함에 있어 국제입찰 대상여부, 최저가낙찰제 대상여부 등을 판단하는 기준으로 삼기 위하여 국가계약법령에 도입하여 운영하고 있는 용어는 다음 중 어느 것인가?",["예정가격","추정가격","추정금액","예정금액"],1],[16,"계약담당공무원이 국가가 일방 당사자가 되는 계약을 체결하기 위하여 입찰 전에 미리 낙찰자 결정기준이 되는 예정가격을 작성하여야 하는바, 다음의 예정가격 결정 기준에 대하여 잘못 설명된 것은?",["거래실례가격 보다는 감정가격이나 견적가격 등을 제일 우선순위로 삼아야 한다.","적정한 거래가 형성된 경우에는 거래실례가격이 기준이 된다.","신규개발품등 적정한 거래실례가격이 없는 경우에는 원가계산에 의한 가격을 기준으로 한다.","거래실례가격, 원가계산에 의한 가격이 곤란한 경우에는 감정가격이나 견적가격 등을 기준으로 한다."],2],[17,"원가계산을 할 때 단위당 가격은 일정한 기준에 따라 적용하여야 한다. 국가계약법령상 규정되어진 단위당 가격 기준에 대한 다음 설명 중 잘못 기술된 것은?",["거래실례가격 또는 통계법에 따른 지정기관이 조사 공표한 가격이 감정가격 또는 견적가격보다 우선적으로 적","노임단가는 통계법에 따라 지정된 기관이 조사하여 공표한 가격을 적용한다.","단위당 가격 적용에는 우선순위가 없다.","제주도를 포함한 도서지역은 조사·공표된 노임단가의 15%범위 내에서 가산 적용할 수 있다."],4],[18,"다음은 국가계약법령상 예정가격 결정기준 또는 원가계산을 할 때 단위당 가격의 기준이 되는 거래실례가격에 대 한 설명이다. 타당하지 않은 것은?",["거래실례가격은 3가지 유형이 있으며 적용에는 우선순위가 없다.","조달청 가격정보지가 기획재정부장관에 등록한 전문가격조사기관이 조사 공표한 가격보다 우선 적용된다.","계약담당공무원이 2이상의 사업자에 대하여 물품의 거래를 직접 조사하여 확인한 가격도 거래실례가격의 일종","거래실례가격으로 예정가격을 결정시에 일반관리비 및 이윤을 따로 가산하여서는 아니 된다."],3],[19,"원가계산에 의한 예정가격에 관하여 설명한 것 중 틀리게 설명한 것은?",["원가계산에 의한 예정가격 체계는 재료비, 노무비, 경비, 일반관리비 및 이윤 등으로 구성되어 있다.","재료비는 직접재료비와 간접재료비로 구성되며, 노무비도 직접노무비와 간접노무비로 구성된다.","원가계산에 의한 예정가격 작성 시에도 계약담당 공무원은 부당하게 감액하거나 과잉계산 되지 않도록 하여야","원가계산에 의한 예정가격 작성 시 부가가치세를 포함하지 않는다."],4],[21,"국가계약법령상 운영되고 있는 계약방법에 대하여 서술한 다음 사항 중 옳지 않게 기술된 것은?",["정부계약은 공정, 경제성 확보, 참가자의 기회균등을 도모하기 위하여 일반경쟁 입찰에 부치는 것이 원칙이다.","계약담당공무원은 일반경쟁 입찰에 부쳐야 할 대상을 제한경쟁 등 다른 방법으로 부쳐도 무방하다.","일반경쟁계약을 원칙으로 하고, 제한, 지명경쟁이나 수의계약을 예외적으로 규정하고 있다.","수의계약은 계약담당공무원의 자의성이 개입될 소지가 있어 수의계약사유를 엄격히 제한하고 있다."],4],[22,"선금과 기성대가 또는 기납대가 지급에 관하여 설명한 것 중 옳지 않는 것은?",["입찰참가자격제한조치 중에 있는 자에 대해서는 선금을 지급하지 아니한다.","기성대가지급 시에는 확정급으로만 지급하여야 한다.","선금을 지급한 후에는 기성부분 또는 기납부분 대가 지급 시 선금정산을 하게 된다.","기성부분에 대한 대가를 지급할 경우에는 약식기성검사를 실시할 수 있다."],3],[23,"정부계약에서 계약의 이행지체에 대하여 설명해 놓은 것 중 틀리게 설명한 것은?",["지체일수를 산정할 때에는 계약이행기한의 다음 날부터 기산하되, 준공 또는 납품기한이 공휴일인 경우에는 공휴","지체일수 산정 시 불가항력의 사유가 계약기간 내에 발생한 경우에는 지체일수 산정 시 그에 해당하는 기간은","계속비계약의 경우 지체상금은 총 공사의 이행이 지연된 경우 총 공사금액을 대상으로 산정한다.","장기계속계약의 경우 지체상금은 제1차 계약 시 부기한 총 계약금액에 대하여 산정한다."],4],[24,"다음은 계약이행 중 공사기간이 연장되는 경우 등에 계약금액을 조정해 주는 실비산정 기준에 대한 설명이다. 타당하지 않은 것은?",["실제 사용된 비용 등 객관적으로 인정될 수 있는 자료를 활용하여 실비를 산출한다.","간접노무비와 경비산출을 위하여 계약상대자로부터 임금 지급대장, 영수증 등 객관적인 자료를 제출하게 할 수","발주처 사정으로 공사이행기간이 연장됨에 따라 실비를 산정 시 계약상대자는 건설장비의 유휴가 발생되어","공사이행보증서 등의 보증기간 연장에 따른 비용은 보증수수료 영수증 등을 기준으로 하여 산출한다."],3],[25,"공동계약에 관하여 설명한 것 중 올바르게 설명한 것은?",["공동계약이 허용된 경우에는 반드시 공동수급체를 구성하여 입찰에 참가하여야 한다.","공동수급체 구성원은 일단 계약을 체결한 후 이행 중에는 임의로 탈퇴하거나 구성원을 변경하여도 무방하다.","공동계약을 체결할 때 공동수급체는 그 대표자와 구성원이 모두 연명으로 계약서에 기명하고 날인 또는 서명한","공동수급체 구성원 간에도 하도급이 허용된다."],3]]},"7회":{"재무회계":[[1,"차변의 합계금액과 대변의 합계금액이 항상 일치해야 하는 것은?",["대차평균의 원리","일반적인 거래","거래의 이중성","분개"],3],[2,"차변 또는 대변에 일정한 금액이 기록되면 반드시 반대편에도 동일한 금액이 기록되어야 한다는 논 리는?",["대차평균의 원리","일반적인 거래","거래의 이중성","분개"],1],[3,"일반적인 거래가 아닌 것은?",["대손","도난","매매","약속"],2],[4,"다음 중 매입채무로 분류되는 것은?",["단기차입금","외상매입금","미지급금","선수금"],3],[5,"단식부기와 복식부기에 대한 설명으로 맞지 않는 것은?",["단식부기는 현금주의이다.","단식부기는 발생주의이다.","복식부기는 두 개 이상의 계정과목이 형성된다.","복식부기는 발생주의이다."],2],[6,"재무제표의 종류에 해당하지 않는 것은?",["재무상태표","포괄손익계산서","이익잉여금처분계산서","자본변동표"],4],[7,"회계순환과정에 대한 설명이 올바른 것은?",["거래의 식별→총계정원장 작성→분개장․전표 작성","거래의 식별→분개장․전표 작성→총계정원장 작성","거래의 발생→분개장․전표 작성→거래의 식별","거래의 발생→재무제표 작성→분개장 작성"],2],[8,"재무상태표 계정에 해당하지 않는 것은?",["자산","부채","자본","차익"],3],[10,"차변과 대변으로 구분하여 계정과목과 금액으로 기록하는 것을 무엇이라 하는가?",["전기","분개","전표","계정"],1],[11,"상품 계정의 분할에서 3분법에 의한 계정은?",["상품, 매입, 매출","상품, 매입, 매입운임","상품, 매출, 매입비용","상품, 매출, 매출에누리"],3],[12,"다음 중 재고자산의 성격에 부합되지 않는 것은?",["생산이 완료되어 할부 판매된 제품","생산에 투입되기 위해 대기 중인 자산","수요자로부터 주문을 받아 생산과정 중에 있는 자산","생산이 완료되었으나, 아직 판매되지 않고 보관 중에 있는 자산"],1],[13,"다음 중 재고자산으로 보고되는 항목은?",["건설회사의 업무용 부동산","부동산개발회사가 임대용으로 보유하고 있는 건물","판매를 목적으로 보유 중인 부산물 또는 작업폐물","제조업체가 공장설비의 신축을 목적으로 보유 중인 공장부지"],4],[14,"위탁판매 시 적송품은 다음 중 누구의 재고자산인가?",["위탁자와 수탁자","위탁자","수탁자","모두 아니다."],3],[15,"다음 중 비상각 자산에 속하는 것은?",["선박","구축물","산업재산권","토지"],2],[16,"다음 항목 중 유형자산의 원가에 포함되지 않는 것은?",["기존설비의 주요부분을 새로운 부분으로 대체하기","자산의 용역잠재력을 증가시키기 위한 비경상적인","자산의 효율적인 운전조건을 유지하기 위한 수선비","자산의 내용년수를 증가시키기 위한 지출"],1],[17,"새 사옥을 신축할 목적으로 건물이 있는 토지를 구입하였다. 이 경우 철거될 건물의 취득원가가 있다 면, 다음 중 어느 방법으로 회계처리 해야 하는가?",["토지의 취득원가로 계상하여 자본화한다.","철거하는 회계연도의 특별손실로 처리한다.","취득시점과 철거시점 간에 걸쳐 감가상각한다.","신축될 건물의 취득원가로 계상하여 자본화한다."],1],[18,"자산의 취득원가에 산입하지 아니하는 항목은?",["특별소비세","수입관세","운임과 보험료","법인세의 원천납부액"],4],[19,"감가대상 자산을 처분함으로써 손실이 발생된 경우는 처분가액은 어디에 해당되는가?",["원가보다 높게 처분한 경우","장부가액보다 높게 처분한 경우","장부가액보다 낮게 처분한 경우","현행 시장가치보다 낮게 처분한 경우"],1],[20,"유형자산에 관련된 지출 중 수익적 지출로 처리되어야 할 것은?",["개량을 위한 수선비","수명연장을 위한 수선비","성능향상을 위한 수선비","성능유지를 위한 수선비"],3],[21,"수익적 지출을 자본적 지출로 처리하는 경우는?",["이익의 이연이다.","이익의 은익이다.","가공자산이 계상된다.","비밀적립금이 발생한다."],4]],"원가관리회계":[[1,"다음 재무회계와 관리회계의 특성으로 틀린 것은? 재무회계 관리회계",["외부 이해관계자 위주","일반목적용 재무제표","객관성과 주관성 공존","일반적으로 인정된 회계기준(K-IFRS) 준거기준 없음"],3],[2,"판매가격 1,014,000원에는 총원가의 30%에 해당하는 판매이익이 포함되어 있고, 판매비와 관리비는 제조원가 의 20%이다. 제조원가는 얼마인가?",["650,000원","550,000원","450,000원","600,000원"],1],[3,"자본예산분석방법에 대한 다음 설명 중 틀린 것은?",["회수기간법은 투자액 회수시점 이후의 현금유입을 고려하지 못한다.","회계적 이익률법은 화폐의 시간적 가치를 고려한다.","순현가법에서는 투자안의 순현가가 0보다 작은 경우에 투자안을 기각한다.","내부이익률은 투자액과 투자의 현금유입액의 현가를 동일하게 하는 할인율이다."],3],[4,"다음은 전부원가계산과 변동원가계산에 대한 내용이다. 잘못된 것은?",["고정제조간접비는 변동원가계산에서는 발생된 시점에 비용처리하고 전부원가계산에서는 판매된 시점에 비용","전부원가계산은 외부보고용 재무제표작성에 적합한 원가계산방법이다.","변동원가계산에서는 변동판매관리비가 매출원가에 포함된다.","변동원가계산에서 공헌이익은 매출액에서 변동비를 차감한 개념이다."],4],[5,"(주)서울은 커피를 생산하여 판매하고 있다. 판매량은 2,000개, 판매단가는 \\3,000, 단위당 변동원가 \\1,800, 고정원가는 \\1,200,000이다. 손익분기점 매출액은 얼마인가? 단, 세금은 고려하지 않는다.",["\\2,000,000","\\3,000,000","\\2,500,000","\\3,500,000"],1],[6,"고정비가 일정하다고 가정할 때, 공헌이익률이 증가되는 것은 다음 중 어느 경우인가?",["손익분기점 매출액이 증가하는 경우","단위당 변동비가 증가하는 경우","매출액에 대한 변동비 비율이 증가하는 경우","매출액에 대한 변동비 비율이 감소되는 경우"],2],[7,"(주)서초의 표준원가 및 생산활동에 관한 정보가 다음과 같다. (주)서초의 직접재료가격차이는 얼마인가? 단, 직 접재료와 재공품, 제품의 기초 및 기말재고는 없는 것으로 가정한다. - 12 - 완제품 실제생산량 100개 직접재료 표준구매가격 ￦80/kg 직접재료 표준사용량 20kg/완성품 1개 직접재료 실제발생원가 ￦150,000 직접재료 수량차이 ￦8,0",["￦10,000 불리","￦10,000 유리","￦20,000 불리","￦20,000 유리"],3],[8,"다음은 종합예산의 유용성에 관한 것이다. 이 중 옳지 않은 것은?",["종합예산은 기업구성원에게 미래의 계획과 운영절차를 수립하도록 한다.","종합예산은 성과평가의 기준을 제공한다.","종합예산은 각 하위경영자들이 작성하는 운영세부계획의 기준을 제공한다.","종합예산은 의사전달과 조정의 역할을 수행한다."],2],[9,"다음은 원가중심점의 성과평가에 대한 내용이다. 올바르지 않은 것은?",["원가에 대해서만 의사결정을 부여하고 책임을 부담시킨다.","실제조업도에 근거한 변동예산과 실제조업도와의 차이․비교를 통해 성과평가를 한다.","원가중심점별로 최소 원가투입에 대한 최대성과 달성에 주된 관심을 가진다.","단일조업도에 의한 고정예산과 실제조업도 하의 실제원가의 비교도 유용한 원가차이 정보를 제공한다."],1],[10,"다음은 자본예산모형에서 순현재가치법이 내부수익률법에 비교하여 우수한 내용이다. 올바르지 않은 것 은?",["순현재가치법은 투자의 규모가 다른 경우에도 사용이 가능하다.","순현재가치법의 재투자 가정이 합리적이다.","순현재가치법은 할인율의 변동을 쉽게 반영할 수 있다.","순현재가치법은 투자위험을 쉽게 반영할 수 있다."],3],[11,"장기투자안에 대한 의사결정을 할 때에는 미래현금흐름을 추정하는 것이 중요하다. 다음 중 미래현금흐름 을 추정할 때 고려대상으로 적합하지 않는 것은?",["법인세","감가상각비","매몰현금흐름","이자비용"],4],[12,"다음은 특별주문에 의한 의사결정을 할 때, 유휴생산능력이 부족한 경우에 고려할 내용으로 올바르지 않은 것은?",["특별주문관련 변동원가만을 고려한다.","특별주문관련 변동원가 이외에 생산설비 추가에 따른","특별주문관련 변동원가 이외에 정규매출 감소로 인한 공헌이익을 고려한다.","외부 하청으로 인한 외부구입원가도 고려해야 한다."],2],[13,"(주)서초의 원가관련자료는 다음과 같다. 변동제조원가는 ￦700, 변동 판매 및 일반관리비 ￦200, 고정제조 간접원가 ￦300 및 고정 판매 및 일반관리비 ￦150이다. 만약 회사가 전부원가에 의한 원가보상율이 120%라 - 13 - 면 회사가 부가하는 가격은 얼마인가?",["￦650","￦840","￦1,200","￦2,200"],1],[14,"다음 중에서 표준원가를 활용하는 목적으로 볼 수 없는 것은 어느 것인가?",["효과적인 원가관리","의사결정","제조기술의 향상","예산편성"],2],[15,"표준원가에 의한 원가관리에 의하여 원가차이를 관리하는 기법을 무엇이라고 하는가?",["계획기법","예외에 의한 관리","원가기획","적시재고(JIT)관리법"],3],[16,"표준원가의 차이분석에 관한 다음 내용 중에서 잘못된 것은?",["고정제조간접비 예산＝고정제조간접비 예정배부율×표준허용조업도","임률차이＝(실제임률－표준임률)×실제작업시간","능률차이＝(표준허용작업시간－실제작업시간)×변동제조간접비 예정배부율","조업도 차이＝(기준조업도－표준허용조업도)×고정제조간접비 예정배부율"],2],[17,"다음 중에서 올바른 설명이 아닌 것은?",["표준원가 차이분석의 가장 중요한 목적은 재무제표 작성에 있다.","가장 관련성 있는 원가는 역사적 원가가 아니다.","배부된 제조간접비는 “실제 생산된 제품에 허용된 표준작업시간 × 표준제조간접비율”로 표시된다.","원가차이를 공장감독자가 통제하지 못하는 경우도 있다."],4],[18,"표준원가계산의 회계처리에 관한 설명으로 옳은 것은?",["원가차이를 기록할 때 차변은 유리한 차이이고, 대변은 불리한 차이이다.","표준원가회계제도일지라도 모든 재고자산은 실제원가로 기록된다.","원가차이계정은 보통 재무상태표에 표시된다.","표준원가는 업무담당자의 원가발생책임을 명확하게 할 수 있는 관리도구의 하나이다."],4],[19,"다음 중에서 손익분기점에 대한 가정에 해당하지 않는 것은?",["매출수량이 증가하면 단위당 공헌이익이 증가한다.","원가요소의 가격은 일정하다.","제품의 판매가격 및 단위당 변동비는 일정하다.","비용과 수익은 관련범위 내에서 직선이다."],1],[20,"CVP분석의 가정과 거리가 먼 것은?",["변동비는 조업도에 비례한다.","능률과 생산성은 일정하다.","조업도의 변화에 따라 매출배합을 다르게 정한다.","관련범위 내에서 원가함수는 직선형이다."],1]],"제조원가실무":[[1,"보조부문비의 제조부문 배분에 대한 설명 중 틀린 것은?",["단계배부법은 보조부문간에 일정한 배부순서를 정하여 그에 따라 제조부문과 보조부문에 배부하는 방법이","보조부문비의 배분방법에 따라 회사의 총이익이 달라진다.","상호배부법은 보조부문간의 용역수수관계를 완전히 인식하는 배분방법이다.","어떠한 배부방법을 적용하는 경우에도 보조부문비 총액이 모두 제조부문에 배분된다."],2],[2,"(주)한성은 주제품 생산에서 발생한 부산물을 판매하는데 1단위당 판매가격은 50원이고 10원의 판매관리비 가 발생한다. 회사는 부산물의 순실현가치를 주제품의 매출원가에서 차감하는 회계처리를 하고 있는데, 이를 매 출액에 가산하는 것으로 바꾼다면 당기순이익은 어떻게 되는가?",["기존 방법에 비해 당기순이익이 증가한다.","기존 방법에 비해 당기순이익이 감소한다.","기존 방법과 당기순이익은 같다.","회계처리의 변경만으로는 당기순이익의 변화를 알 수 없다."],3],[3,"기초재공품액이 기말재공품액보다 더 큰 경우 가장 적절한 설명은?",["기초재공품액에 당기총제조원가를 더한 금액이 당기제품제조원가가 된다.","당기총제조원가가 당기제품제조원가보다 더 크다.","당기제품제조원가가 매출원가보다 항상 작다.","당기제품제조원가가 당기총제조원가보다 크다."],4],[4,"공정상의 완성품이 되기 위하여 부피나 무게 등이 줄어드는 것과 같이 원재료의 감소가 이루어지는 것을 무엇이라 하는가?",["공손","감손","부산물","작업폐물"],2],[5,"종합원가계산에 의한 노무공수 산출시 고려하여야 할 내용이 아닌 것은?",["원 유에 해당하지 않는 것은?",["지질, 용수 등 공사현장의 상태가 설계서와 다를 경우","공사기간 및 운반거리의 변경이 발생할 경우","새로운 기술·공법사용으로 공사비의 절감 및 시공기간의 단축 등의 효과가 현저할 경우","기타 발주기관이 설계서를 변경할 필요가 있다고 인정할 경우"],2]]},"8회":{"재무회계":[[1,"다음은 회계의 순환과정 중 일부를 기술한 것이다. 회계의 순환과정을 순서대로 기술한 것으로 옳은 것은? A. 전기 B. 분개 C. 수정전시산표 작성 D. 수정분개 E. 재무제표 작성 F. 거래와 사건의 식별",["A, B, C, E, D, F","A, B, D, C, E, F","F, A, B, C, D, E","F, B, A, C, D, E"],4],[2,"다음 자료에 의하여 이우제조(주)의 매출원가를 산출하면 얼마인가? (1) 기초 재고 160,000원 (2) 당기매입액 480,000원 (3) 매입관련 비용: 매입운임 20,000원, 보험료 10,000원, 관세 4,000원 (4) 매입할인액 1,000원 (5) 관세환급금 2,000원 (6) 기말재고 280,000원 다만, 미착상품 20,000원은 선적지 인",["361,000원","371,000원","373,000원","391,000원"],2],[3,"미래제조(주)는 재고자산평가방법의 적용에 대해 고민을 하고 있다. 후입선출법을 적용할 때 기말 재고자산금액은 얼마인가? 다만, 회사는 실지재고조사법을 적용하고 있다. 일 자 입 고 기초(1월 1일) 100개×10원 1,000원 4월 1일 100개×15원 1,500원 7월 1일 10월 1일 출고 150개 100개×20원 2,000원 12월 1일 30개 기말(",["1,200원","1,300원","1,800원","2,300원"],2],[4,"육우(주)는 2014년2월1일 상품을 판매하고 거래처인 미래(주)로부터 1년 뒤 판매대금을 회수하기로 하 였으나, 2014년12월31일 현재 거래처의 자금사정을 고려할 때 판매대금 중 10%는 회수하기 어렵다고 판단하였다. 결산시점에 인식될 수 있는 계정과목으로 옳은 것은? 다만, 회사는 처음으로 외상매출을 한 것으로 간주한다.",["대손상각비, 대손충당금","매출, 대손충당금","매출채권, 매출","대손상각비, 매출"],1],[5,"일진(주)는 2014년5월1일 비품 2,000,000원을 구입하면서 대금지급은 2016년4월1일에 하기로 하였 다. 이러한 거래로 인해 발생될 수 있는 부채계정 과목으로 옳은 것은? 회계기간은 매년1월1일부터 12 월31일까지이다.",["미지급금","미지급비용","장기성미지급비용","장기성미지급금"],4],[6,"다음 자료를 이용하여 하나(주)의 기본 주당순이익을 계산하면 얼마인가? 다만, 소수점 이하는 버림 (1) 당기순이익 100,000원 (2) 기말시점의 보통주식수 3,000주 (3) 가중평균보통주식수 2,500주 (4) 우선주 주주에게 지급한 배당금 10,000원",["23원","28원","30원","36원"],4],[7,"미래설계(주)는 기계장치를 제작하여 1,000,000원에 판매하였다. 판매시점에 400,000원을 받고 잔액은 2년에 걸쳐 매 연도 말에 300,000원씩을 받기로 하였다. 미래설계(주)가 기계장치 판매와 관련하여 인 식하는 매출액은 얼마인가? 다만, 판매대금의 현재가치와 명목금액의 차이는 중요하다고 보며, 해당 명목금 액의 현재가치는 920,650원이다.",["400,000원","700,000원","920,650원","1,000,000원"],3],[8,"다음은 상장회사인 일선(주)의 재무적 자료이다. 법인세비용으로 인식되는 금액은 얼마인가? (1) 법인세와 관련하여 납부한 세금 30,000원 (2) 이연법인세자산 10,000원 (3) 법인세비용차감전 순이익 90,000원 (4) 법인세 세율 20%를 가정한다. - 21 - (5) 법인세 이외의 세금은 없는 것으로 간주한다.",["18,000원","20,000원","30,000원","40,000원"],2],[9,"이선(주)는 외부 판매용 상품 100,000원을 외상으로 구입하면서 분개 시 차변에 상품 100,000원, 대 변에 미지급금 100,000원이라고 기록하였다. 해당 분개의 오류를 올바르게 수정분개한 것으로 옳은 것 은?",["(차변)미지급비용100,000원 (대변)미지급금 100,000원","(차변)미지급금 100,000원 (대변)매출채권 100,000원","(차변)미지급금 100,000원 (대변)매입채무 100,000원","(차변)매입채무 100,000원 (대변)상"],3],[10,"김대리는 기업의 재무제표 분석을 통해 기업의 강점과 약점을 파악하고자 한다. 우선, 당좌비율을 분 석하고자 한다. 당좌비율 분석에 필요한 계정과목으로 옳지 않은 것은?",["현금","재고자산","매출채권","단기매매금융자산"],2],[11,"미래(주)는 단기매매목적으로 주식을 2014년7월10일 1,000,000원에 취득한 후 2014년12월1일 1,300,000원에 처분을 하였다. 유가증권처분이익의 회계처리로 옳은 것은?",["300,000원을 영업외 수익으로 인식한다.","300,000원을 기타포괄이익으로 인식한다.","1,300,000원을 영업외 수익으로 인식한다.","1,300,000원을 기타포괄이익으로 인식한다."],1],[12,"미래(주)는 공장의 화재에 대비하여 2014년10월1일 1년 동안 화재에 대한 위험을 보장하는 보험료 120,000원을 보험회사에 지급하고 전액 비용으로 처리하였다. 결산시점 회사가 인식하는 선급비용은 얼마 인가? 다만, 회계기간은 매년 1월 1일부터 12월 31일까지이며 경과일수는 월수로 계산한다.",["30,000원","40,000원","80,000원","90,000원"],4],[13,"일신제조(주)는 관계회사의 요청에 의하여 2014년12월1일 관계회사에게 10억원을 빌려주었다. 회 수일은 2016년1월10일이며 당기 회계기간은 2014년1월1일부터 2014년12월31일까지이다. 이러한 거래 로 인해 당기에 일신제조(주)가 인식하는 계정과목은 무엇인가?",["단기대여금","장기대여금","단기차입금","장기차입금"],2],[14,"총계정원장의 기록이 정확한지의 여부를 파악하는 검증기능을 갖는 것은?",["시산표","분개장","정산표","전표"],1],[16,"다음 중 자본적 지출에 해당되지 않는 것은?",["건물에 엘리베이터 설치","공장건물에 냉난방기의 설치","건물을 2층에서 5층으로 증축","기계장치의 수리"],4],[17,"다음을 분개하면? 급여 ￦30,000을 현금으로 지급하다.",["<차변> 미지급급여 30,000 <대변> 급","<차변> 급","<차변> 현","<차변> 급"],2],[18,"선입선출법에 대한 설명이 아닌 것은?",["재고자산의 종류가 적고 쉽게 구별될 수 있는 경우에 적용하기가 쉽다.","일반적으로 원가흐름의 가정과 실물흐름이 같다.","타 방법에 비하여 이익을 조작할 가능성이 적다.","기말재고자산 금액은 현행원가의 근사치가 된다."],1],[19,"다음 중 회계변경의 이론적 유형이 아닌 것은?",["회계처리기준의 변경","회계추정의 변경","전기오류의 수정","보고실체의 변경"],3],[20,"다음을 이용하여 매출원가를 계산하면? ∎ 기초상품재고액 : ￦3,000 ∎ 당기상품매입액 : ￦50,000 ∎ 기말상품재고액 : ￦4,000",["￦55,000","￦54,000","￦51,000","￦49,000"],4],[21,"재무비율 분석에서 당기순이익을 매출액으로 나누어 산출하는 비율은?",["매출액순이익률","투자수익률","자기자본이익률","주당순이익"],1]],"원가관리회계":[[1,"다음은 원가-조업도-이익(CVP)분석에 대한 설명이다. 이 중 옳지 않는 것은?",["손익분기점에서 영업이익이 0이므로 법인세가 발생하지 않는다.","손익분기점에서 공헌이익과 고정원가가 일치한다.","손익분기점에서 공헌이익과 변동원가가 일치한다.","손익분기점 판매량은 고정원가를 단위당 공헌이익으로 나눈 값이다."],2],[2,"다음 중 단위당 공헌이익에 관한 설명으로 옳은 것은?",["판매가격-단위당 고정원가","판매가격-단위당 변동원가","판매가격-단위당 제조원가","단위당 고정원가-단위당 변동원가"],3],[3,"다음은 원가구조 및 영업레버지리에 관한 설명이다. 이 중 옳지 않은 것은?",["변동원가의 비중이 큰 기업은 공헌이익률이 낮다.","고정원가의 비중이 큰 기업은 공헌이익률이 높다.","고정원가의 비중이 큰 기업은 매출액의 변화에 민감하다.","고정원가의 비중이 큰 기업은 영업레버리지가 낮다."],2],[4,"(주)서초텔레콤은 다음과 같이 요금제를 운영하고 있다. A요금제와 B요금제의 사용요금이 같아지는 사용시간 은 얼마인가? - A요금제 : 기본요금 ￦200, 1초당 요금이 ￦4 - B요금제 : 기본요금 ￦400, 1초당 요금이 ￦3",["300","250","200","150"],1],[5,"(주)서초전자는 영업이익이 ￦15,000이고 영업레버리지가 2.5이다. 만약 매출액이 40% 증가하였다면 (주) 서초전자의 영업이익은 얼마인가?",["20,000원","25,000원","30,000원","35,000원"],4],[6,"(주)서초는 하나의 제품을 단위당 ￦20에 판매한다. 회사는 가장 최근 손익계산서에서 판매량은 100단위, 변동원가는 ￦800 및 고정원가는 ￦400임을 확인하였다. 만약 판매량을 20%증가시키기 위하여 단위당 ￦4 하락 하였다면, 회사의 이익에 어떠한 영향을 미치는가?",["이익 ￦800 감소","이익 ￦240 감소","이익 ￦800 증가","이익 ￦240 증가"],4],[8,"(주)서초는 TV를 판매하는 회사다. 20x3년 2분기에 TV 10,000단위 판매를 예측하고 있으며, 판매량은 20x3 년 남은 기간 매분기별 20%씩 상승할 것으로 예측되었다. 만약 6월 및 9월의 월말재고량이 각각 500단위, 1,500단위라면 20x3년 3분기의 매입수량은 얼마인가?",["12,000","12,500","13,000","13,500"],1],[9,"다음 중 표준원가의 표준설정에 관한 내용 중 설명이 옳지 못한 것은?",["구매부서는 구매하고자 하는 원재료의 구입 가격에 대한 표준을 설정한다.","생산부서는 생산하는 제품의 완성을 위하여 예상되는 원재료의 손실 등을 고려하여 원재료 소요량을 결정","직접노무비의 임률은 회계담당자가 결정한다.","직접노무비의 노동시간에 대한 표준은 임률과 마찬가지로 회계담당자가 결정한다."],4],[10,"다음 중 표준원가계산에서 차이를 나타내는 것은?",["제조원가와 기간원가","제조원가와 표준원가","실제원가와 표준원가","가격요인과 수량요인"],4],[11,"다음 중 관련원가가 갖추어야 할 속성은?",["미래에 발생될 원가와 수익이며, 의사결정 대안에 따라 다르게 나타나는 원가와 수익이다.","과거에 발생된 원가와 수익이며, 의사결정 대안에 따라 다르게 나타나는 원가와 수익이다.","미래에 발생될 원가와 수익이며, 동일한 의사결정 대안에 따라 나타나는 원가와 수익이다.","과거에 발생된 원가와 수익이며, 동일한 의사결정 대안에 따라 나타나는 원가와 수익이다."],2],[12,"(주)서초전자는 월간 2,000개까지의 단일제품을 생산할 수 있는 설비를 가지고 있다. 20x3년 7월에 단골고객에게 1,500개의 제품을 제조하여 판매할 예정이다. 그런데 신규고객으로부터 7월에 500개의 제품을 1개당 ￦150에 납품해 달라는 추가 주문이 접수되었다. 회사의 변동원가는 ￦120이며, 이 주문을 수락하더라 도 기존의 예상판매량을 달성하는 ",["￦15,000 증가","￦20,000 증가","￦10,000 증가","￦10,000 감소"],3],[13,"(주)서초는 두 가지 공정을 거쳐 제품을 생산하는 회사이며, 관련 자료는 다음과 같다. 제1공정 제2공정 연간 최대생산능력 200단위 100단위 연간 고정원가 ￦2,000 ￦1,000 - 19 - 단위당 변동원가 ￦50 ￦20 제품은 단위당 ￦80에 판매되며. 생산된 제품은 생산량에 관계없이 판매가 가능하다고 가정한다. 제2공정에 연 간 리스료가 ￦500인",["증분이익 ￦500","증분손실 ￦500","증분이익 ￦1,000","증분손실 ￦1,000"],3],[14,"다음 중 자본예산기법에 대한 설명에 해당하는 것은?",["자본예산은 긴급한 상황에 이루어지는 의사결정 기법이다.","자본예산은 장기의사결정이다.","자본예산은 단기의사결정이다.","자본예산은 현재의 현금유출액을 대상으로 한다."],3],[15,"다음은 순현재가치법이 내부수익률법보다 우월한 점이다. 이 중 옳지 않은 것은?",["가치의 가산원칙이 성립한다.","위험에 대한 조정이 용이하다.","내부수익률이 존재하지 않거나 여러 개가 존재할 수 있다.","자본비용이 변하는 경우에는 내부수익률법의 적용이 용이하다."],4],[16,"다음의 투자와 관련된 항목 중 순현재가치법을 적용 시 고려하여야 할 항목은? 1) 투자부터 산출되는 순이익액 2) 투자부터 산출되는 현금유입액 3) 투자부터 산출되는 현금유입 기간",["1)만을 고려","2)만을 고려","1)과 2)를 고려","2)와 3)을 고려"],2],[17,"(주)서초는 취득원가가 ￦5,000인 기계를 구입하여 생산활동에 투입할 것을 검토하고 있다. 이 기계를 구입 할 경우 6년간 ￦1,000이 일정하게 유입될 것으로 예측되고 있다. 이때 회수기간은 얼마인가?",["2년","3년","4년","5년"],3],[18,"다음은 재무적 성과지표를 나열한 것이다. 이 중 옳지 않은 것은?",["잔여이익","투자수익률","공급자 수","경제적 부가가치(EVA)"],3],[20,"다음 중 투자수익률(ROI)을 정확히 나타낸 것은?",["매출액순이익율×총자산회전율","매출액순이익율+총자산회전율","투자중심점","매출액순이익율-총자산회전율"],3],[21,"(주)서초철강은 열연사업부와 냉연사업부를 운영하고 있다. 열연사업부는 냉연사업부에 사용하는 열연강판 을 생산한다. 열연사업부의 변동제조원가는 톤당 ￦2,000이고, 운반원가는 톤당 ￦100이며, 외부 판매가격은 톤당 ￦3,000이다. 냉연사업부에 판매할 때에는 운반비가 발생하지 않으며 열연강판을 외부에서 구입한다면 톤당 ￦2,600에 구입할 수 있다. 만약",["￦2,000","￦2,100","￦2,600","￦2,900"],1],[22,"(주)서초의 원가관련자료는 다음과 같다. 변동제조원가는 ￦300, 변동 판매 및 일반관리비 ￦80, 고정제조 간접원가 ￦150 및 고정 판매 및 일반관리비 ￦40이다. 만약 회사가 전부원가에 의하여 원가보상가격을 결정 한다면 원가보상율 결정에 기준이 되는 원가는?",["￦57","￦300","￦380","￦450"],2]]},"9회":{"재무회계":[[1,"회계정보가 유용하기 위해 갖추어야 할 주요 특성을 회계정보의 질적 특성이라고 한다. 한국채택국 제회계 기준에 의하면 목적적합성과 가장 관련이 있는 것으로 옳은 것은?",["표현의 충실성","중립성","완전성","예측가치"],4],[2,"다음 중 올바르게 짝지어진 것은? 자산계정 (=a), 부채계정 (=b), 자본계정 (=c), 수익계정 (=d), 비용계정 (=e)",["a, b, c는 차변계정, d, e는 대변계정으로 분류된다.","a, c, d는 차변계정, b, e는 대변계정으로 분류된다.","b, e는 차변계정, a, c, d는 대변계정으로 분류된다.","a, e는 차변계정, b, c, d는 대변계정으로 분류된다."],4],[3,"결산(closing)이란 그동안 일해서 얻은 성과가 무엇이고 얼마인지를 계산하고 정리하는 것을 의미한 다. 결산절차는 회계기록의 종점이자 가장 중요한 회계기록의 절차 중 하나이다. 다음 중 결산절차가 아 닌 것은?",["결산 예비 절차","결산 본 절차","재무제표 작성","거래의 식별"],4],[4,"다음은 재무상태표에 대한 설명이다. 옳지 않은 것은?",["투자자 및 채권자는 재무상태표를 통해 기업의 유동성에 대한 정보를 얻을 수 있다.","일정시점의 재무상태를 나타내는 보고서로서 자산, 부채 및 자본에 대한 정보를 얻을 수 있다.","재무상태표는 경영자의 주관적 판단에 의해 영향을 받고 있다.","영업활동으로 인해 발생되는 영업손익을 파악할 수 있다."],4],[5, ","비매입채무란 상거래 이외에서 발생한 채무로서 단기차입금, 미지급금 등이다."],1],[18,"다음 중 순매출액을 계산하는 요소가 아닌 것은?",["매입할인","총매출액","매출에누리 및 환입","매출할인"],1],[19,"매출채권에 대한 경상적인 대손상각비는 무엇으로 처리하는가?",["매출원가","영업외비용","판매비와 관리비","특별손실"],3],[20,"거래처에 상품을 6,000,000원 주문하고, 계약금으로 1,000,000원을 현금으로 지급하였을 경우, 차변 - 29 - 에 기입할 적당한 계정과목은?",["매출원가","선급금","외상매입금","특별손실"],2]],"원가관리회계":[[1,"다음은 원가에 대한 개념 설명이다. 틀린 설명은?",["기간원가는 제품원가 이외의 모든 원가로서 판매비와 관리비는 이에 해당된다.","간접원가란 특정한 원가대상에 직접 추적할 수 없는 원가다.","매몰원가란 경영자가 통제할 수 없는 과거의 의사결정으로부터 발생한 원가다.","기회비용이란 자원을 다른 대체적인 용도에 사용할 경우 얻을 수 있는 최대금액으로 회계장부에 기록되"],4],[2,"원가회계의 의의와 거리가 먼 것은?",["재무상태표에 표시되는 재공품과 제품 등 재고자산의 가액을 결정한다.","원가회계란 제조업에서만 행하는 특수한 회계이다.","필요한 원가정보를 산출하는 회계시스템이다.","제조기업이 판매한 제품의 원가 또는 보유하고 있는 제품의 원가를 알기 위함이다."],2],[3,"다음 중 직접원가에 포함되지 않는 원가항목은?",["주요재료비","생산직 임금","부분품비","공장장 급여"],4],[4,"다음 제조원가 산식 중 올바른 것은?",["가공원가 = 직접재료원가 + 직접노무원가","기초원가 = 직접재료원가 + 제조간접원가","가공원가 = 직접노무원가 + 제조간접원가","기초원가 = 직접노무원가 + 제조간접원가"],3],[5,"가스료, 전기료와 같은 원가를 무엇이라 하는가?",["변동비","준변동비(혼합비)","고정비","준고정비(단계비)"],2],[6,"다음 중 제조원가를 구성하는 원가의 일부가 아닌 것은?",["생산직 직원에게 제공된 식사대금","제조부서에서 발생된 건물임차료","제품 매출대금에서 발생된 대손금","원재료를 제공받는 거래처에게 제공한 선물대금"],3],[7,"다음 중에서 원가회계 목적과 관련이 가장 적은 것은?",["재무제표의 작성에 유용한 원가정보를 제공한다.","원가통제에 대한 유용한 원가정보를 제공한다.","경영자에게 경영의사결정에 유용한 원가정보를 제공한다.","투자자에게 합리적인 의사결정에 관한 정보제공을 목적으로 한다."],4],[9,"다음 자료로 제조간접원가를 구하면 얼마인가? · 직접재료비 150,000원 · 기계감가상각비 45,000원 · 광고선전비 70,000원 · 공장전력비 105,000원 · 직접노무비 370,000원 · 공장임차료 100,000원",["250,000원","315,000원","320,000원","355,000원"],1],[10,"다음 중 제조원가명세서로부터 확인 가능한 사항이 아닌 것은?",["기말 직접재료재고액","제조공정노무비 발생액","기말 재공품재고액","당기순이익"],4],[11,"조업도가 증가할 경우 변동원가와 고정원가의 행태를 바르게 설명한 것은?",["변동원가 총액은 증가하고, 단위당 변동원가는 일정하다.","변동원가 총액은 일정하고, 단위당 변동원가는 증가한다.","고정원가 총액은 일정하고, 단위당 고정원가는 증가한다.","고정원가 총액은 증가하고, 단위당 고정원가는 일정하다."],1],[12,"제과업에서의 설탕은 다음 중 어느 원가로 분류되는가?",["주요재료비","보조재료비","부분품비","소모품비"],2],[13,"조업도의 증감에 관계없이 일정한 범위의 조업도 내에서 그 총액이 항상 일정하게 발생하는 원가요소는?",["수도광열비","전력비","동력비","임차료"],4],[14,"일반적으로 조업도가 증가할수록 발생원가 총액이 증가하고, 조업도가 감소할수록 발생원가 총액이 감소 하는 원가형태에 해당되는 것은?",["공장 기계장치에 대한 감가상각비","공장 건물에 대한 재산세","원재료 운반용 트럭에 대한 보험료","개별 제품에 대한 포장비용"],4],[15,"다음 중 보조부문비의 배부방법과 관련하여 그 성격이 다른 하나는?",["직접배부법","단계배부법","상호배부법","비례배분법"],4],[16,"다음 자료를 활용하였을 때, 직접재료비를 기준으로 A제품에 배부되어야 할 제조간접비 금액은? - 27 - · 제조간접비 총액 : \\1,000,000 · 직접재료비 총액 : \\500,000 · A제품 직접재료비 : \\300,000 · B제품 직접재료비 : \\200,000",["\\200,000","\\300,000","\\400,000","\\600,000"],4],[17,"종합원가계산과 개별원가계산의 장점에 대한 설명이다. 바르게 연결되지 못한 것은?",["종합원가계산-복잡하지 않아 보다 경제적이다.","개별원가계산-제품별로 손익분석 및 계산이 용이하다.","개별원가계산-작업원가표에 의해 효율성을 통제할 수 있다.","종합원가계산-제품의 종류나 규격을 달리하는 특수제품을 계산할 수 있다."],4],[18,"다음 중 당기제품제조원가에 대한 설명으로 올바른 것은?",["기초재공품재고액+당기총제조원가-기말재공품재고액","직접재료비+직접노무비+제조간접비","당기총제조원가-기말재공품재고액","기초재공품재고액+당기총제조원가"],1],[19,"다음의 자료를 이용하였을 때, 기말재공품 재고액은 얼마인가? 직접재료비￦50,000 직접노무비￦40,000 제조간접비￦20,000 기초재공품재고액 ￦10,000 당기제품제조원가 ￦100,000",["￦40,000","￦30,000","￦20,000","￦10,000"],3],[20,"다음 중 개별원가계산을 적용하기에 가장 적합하지 않은 경우는 어느 경우인가?",["개별 제품의 제작원가가 비교적 크다.","주문생산형태로 제품을 제작한다.","다양한 품종을 생산한다.","동일한 종류의 제품을 대량으로 생산하고 있다."],4],[21,"원가배부와 관련된 다음 설명 중 옳지 않은 것은?",["제조간접원가가 전체 제조원가에서 차지하는 비중이 클수록 다양한 원가배부기준을 설정하여야 정확한 원","원가배부기준으로 선택된 원가동인이 원가발생의 인과관계를 잘 반영하지 못하는 경우 제품원가계산","공장전체 제조간접비배부율을 이용할 경우에도 보조부문원가를 먼저 제조부문에 배분하여야 한다.","경제적 의사결정과 동기부여 등을 위해서는 이중배부율법을 사용하는 것이 보다 바람직하다."],3]]},"10회":{"재무회계":[[1,"다음 중 재무상태표의 구성요소가 아닌 것은?",["자본","자산","수익","부채"],3],[2,"다음 중 자본으로 분류되지 않는 계정과목은?",["자본금","주식발행초과금","이익잉여금","선수금"],4],[3,"다음 설명 중 적절치 않은 것은?",["재무제표(Financial statement)는 일정시점에 기업의 재무상태(자산, 부채, 자본)를 보고하는 것이다.","포괄손익계산서(Statement of comprehensive income)는 일정기간 동안의 경영성과인 수익, 비용, 이익을","자본변동표(Statement of changes in equity)는 자본의 크기와 변동에 관한 정보를 제공하는 것이다.","현금흐름표(Statement of cash flow)는 현금의 유입과 유출에 관한 정보를 제공하는 것이다."],1],[4,"다음 중 무형자산의 인식요건에 해당되지 않는 것은?",["기술적 실현가능성이 없어도 개발자금만 충분해도 된다.","사용 및 판매의도","미래경제적 효익의 창출능력","측정가능성"],1],[5,"다음 중 한국채택국제회계기준에 따른 재무제표의 작성과 표시에 적용되는 일반원칙이 아닌 것은?",["경영자는 재무제표를 작성함에 있어서 계속기업으로서의 존속가능성을 평가해야 한다.","재무제표에 보고할 항목은 중요성을 고려하여 결정해야 한다.","한국채택국제회계기준에서 요구하거나 허용하지 않는 한 자산과 부채 그리고 수익과 비용은 상계하","재무제표는 반드시 비교식 재무제표를 공시하지 않고 당기분만 공시해도 된다."],4],[6,"다음 중 자본의 변동은 없지만 자본금이 증가하는 항목은?",["전환사채의 전환","유상증자","무상증자","유상감자"],3],[7,"다음은 전환사채와 신주인수권부사채에 대한 설명이다. 옳지 않은 것은?",["신주인수권부사채권자가 신주인수권을 행사하여도 만기에 해당 사채에 대한 상환의무가 있다.","전환사채를 전환하면 전환 후 더 이상 전환한 부분에 대한 전환사채 이자비용은 발생하지 않는다.","신주인수권부사채권자가 신주인수권을 행사하여도 이자비용은 소멸되지 않는다.","전환사채는 전환시 별도의 주금 납입이 필요하다."],4],[8,"다음 자료에 의하여 기본주당순이익을 산출하기 위한 가중평균보통주식수를 계산하면 얼마인가? 다 만, 계산은 일수를 사용하지 않고 월수를 적용한다. 회계기간은 매년 1월 1일부터 12월 31일까지이다. (1) 2016년 1월 1일 보통주식수 1,000주 (2) 2016년 7월 1일 보통주 유상증자 1,000주 (3) 2016년 10월 1일 보통주 무상증자 10",["1,500주","1,650주","2,000주","2,200주"],2],[9,"회사는 2017년 1월 1일 관리자용 비품 1,000,000원을 구입하면서 수선비로 계상하였다. 비품은 정 액법으로 상각하며, 내용연수 5년, 잔존가치는 50,000원이라고 가정한다. 회사가 수선비로 계상함으로 써 발생되는 비용의 과대계상금액을 계산하면 얼마인가? 다만, 법인세효과는 고려하지 않는다.",["190,000원","800,000원","810,000원","1,000,000원"],3],[10,"다음의 재무제표 분석 항목 중 단기 유동성 비율을 판단할 수 있는 항목으로 옳은 것은?",["부채비율","재고자산회전율","유동비율","투자수익률"],3],[11,"일우제조(주)는 사무직 직원을 위해 사무용 컴퓨터를 2017년 7월 1일 구입하였다. 회계담당자가 해당 컴퓨터를 장부에 기록하기 위한 계정과목으로 옳은 것은?",["기계장치","차량운반구","비품","구축물"],3],[12,"삼우제조(주)는 금형을 제작하여 판매하는 회사이다. 회사는 2016년 12월 1일 계약금으로 1억원을 수령하고 2017년 3월 1일 금형을 거래처에 납품할 예정이다. 계약금 수령시 회사가 인식하는 계정과목 으로 옳은 것은?",["대여금","선급금","매출","선수금"],4],[13,"이우건설(주)는 자본조달을 위해 사채를 발행하였다. 사채는 할인발행되었으며 사채의 액면금액은 10,000,000원 이며, 사채의 현재가치는 9,650,000원이다. 사채의 액면금액과 사채의 현재가치와의 차이 금액은 재무제표에 어떤 계정과목으로 표시되는지 옳은 것은?",["사채할인","사채할인발행","사채할인발행차금","사채할증발행차금"],3],[14,"일감(주)는 2016년 10월 1일 A은행으로부터 100,000,000원을 차입하고 이자는 6개월마다 후급으로 지급 하기로 하였다. 이자율은 연 3%이며, 회계기간은 매년 1월 1일부터 12월 31일까지이다. 2016년도 일 감(주)가 인식하는 이자비용은 얼마인가? 이자비용은 월수로 계산한다.",["없음 ② 750,000원 ③ 1,500,000원 ④ 3,000,000원","현금주의","발생주의","총액주의"],2],[16,"다음 중 유가증권에 속하는 것은?",["어음","자기앞수표","현금","주식"],4],[17,"수익의 이연(예, 선수수익 등) 항목은 무엇으로 분류 되는가?",["자산","비용","부채","수익"],3],[18,"유형자산에 대한 감가상각비를 계상하면 어떤 효과가 나타나는가?",["순이익이 증가하고, 부채가 증가한다.","자본이 감소하고, 부채가 증가한다.","순이익이 감소하고, 자산이 감소한다.","자산이 증가하고, 자본이 증가한다."],3],[20,"다음의 계정과목 중에서 성격이 다른 하나는?",["특허권","현금","외상매출금","보통예금"],1],[21,"결산시에 대손충당금을 과소 설정하였다. 정상적으로 설정한 경우와 비교할 때 어떠한 차이가 있는 가?",["자산이 과소 표시된다.","부채가 과대 표시된다.","비밀적립금이 발생한다.","당기순이익이 과대 표시된다."],4],[22,"무형자산의 취득과 처분활동은 기업활동 중 어디에 해당하는가?",["투자활동","영업활동","재무활동","판매활동"],1]],"원가관리회계":[[3,"전기료, 수도료와 같은 원가를 무엇이라 하는가?",["변동비","준변동비(혼합비)","고정비","준고정비(단계비)"],4],[4,"다음은 변동원가계산의 장점이다. 이 중 옳지 않은 것은?",["변동원가계산은 경영자의 단기적인 의사결정에 적합하다.","변동원가계산은 이익이 생산량에 의하여 영향을 받지 않고 판매량에 의해서만 영향을 받는다.","변동원가계산은 고정제조간접원가를 제품원가에 포함시키지 않기 때문에 생산량에 따라서 단위당 제조원가","변동원가계산은 고정제조간접원가를 제품원가에 포함시키지 않기 때문에 재고자산가치가 낮게 평가된다."],3],[5,"다음은 원가-조업도-이익(CVP)분석의 가정이다. 이 중에서 옳지 않은 것은?",["모든 원가는 변동원가와 고정원가로 분리된다.","수익과 원가의 행태는 확실히 결정되어 있으며 관련범위 내에서 선형이다.","재고수준은 항상 일정하다.","단일제품만 판매한다고 가정하고, 복수제품의 판매를 가정하지 않는다."],3],[6,"다음은 종합예산의 유용성에 관한 것이다. 이 중 옳지 않은 것은?",["종합예산은 기업구성원에게 미래의 계획과 운영절차를 수립하도록 한다.","종합예산은 성과평가의 기준을 제공한다.","종합예산은 각 하위경영자들이 작성하는 운영세부계획의 기준을 제공한다.","종합예산은 의사전달과 조정의 역할을 수행한다."],2],[7,"다음은 제조예산에 관한 것이다. 이 중 제조예산이 아닌 것은?",["예상판매량과 기말제품재고량을 충족시키기 위한 제품생산량을 나타내는 예산","제품생산량 = 제품판매량 - 기말제품재고량 + 기초제품재고량","제품생산량 = 제품판매량 + 기말제품재고량 - 기초제품재고량","제조예산은 판매계획과 재고계획에 의하여 수립한다."],3],[8,"기업들이 외부구매보다 자가 생산을 고집하는 전략적 이유에 속하지 않는 것은?",["기업은 자기 제품명세서를 외부기업과 공유하기를 원하지 않는다.","기업은 자신의 통제영역에서 만들어진 제품만이 요구되는 품질수준을 충족한다고 생각한다.","기업자체원가가 단기적으론 외부구매가격보다 낮다.","기업은 자체제조부서가 외부보다 나은 서비스를 제공할 것이라는 확신을 가지고 있다."],4],[9,"다음 중 자본예산기법에 대한 설명에 해당하는 것은?",["자본예산은 긴급한 상황에서 이루어지는 의사결정기법이다.","자본예산은 장기의사결정이다.","자본예산은 단기의사결정이다.","자본예산은 현재의 현금유출액을 대상으로 한다."],2],[10,"다음 중 분권화의 장점은?",["최고경영자는 전략적 의사결정에 집중할 수 있다.","기업에서 의사결정에 소용되는 시간을 절약할 수 있다.","각 계층의 관리자들로 하여금 의사결정에 관한 훈련기회를 갖도록 해줌으로써 미래의 경영자를 양성할 수","경영활동이 중복 및 정보수집비용이 증가한다."],4],[11,"다음은 내부대체가격 결정시 고려해야할 기준이다. 이 중 옳지 않은 것은?",["목표일치성기준","시장가격기준","성과평가기준","자율성기준"],4],[12,"다음은 가격결정에 영향을 미치는 요소들이다. 이 중 옳지 않은 것은?",["기업의 계획과 통제","고객의 수요","원가","산업내 경쟁정도"],3],[13,"(주)서초의 원가관련자료는 다음과 같다. 변동제조원가는 ￦700, 변동 판매 및 일반관리비 ￦200, 고정제 조간접원가 ￦300, 고정 판매 및 일반관리비 ￦150이다. 만약 회사가 전부원가에 의한 원가보상율이 120%라 면 회사가 부가하는 가격은 얼마인가?",["￦650","￦840","￦1,200","￦2,200"],2],[14,"(주)서초의 원가관련자료는 다음과 같다. 변동제조원가는 ￦180, 변동 판매 및 일반관리비 ￦20, 고정제 조간접원가 ￦95, 고정 판매 및 일반관리비 ￦15이다. 만약 회사가 변동원가에 의한 원가보상율이 150%라면 회사가 부가하는 가격은 얼마인가?",["￦110","￦200","￦370","￦500"],4],[15,"고정비가 일정하다고 가정할 때, 공헌이익률이 증가되는 것은 다음 중 어느 경우인가?",["손익분기점 매출액이 증가하는 경우","단위당 변동비가 증가하는 경우","매출액에 대한 변동비 비율이 증가하는 경우","매출액에 대한 변동비 비율이 감소되는 경우"],3],[16,"다음 중 생산과정에서 원재료를 효율적으로 사용하지 못하여 발생하는 차이는 무엇인가?",["직접노무원가 능률차이","직접재료원가 능률차이","직접노무원가 가격차이","직접재료원가 가격차이"],1],[17,"다음 중 직접재료원가 가격차이를 발생시키는 원인으로 볼 수 없는 것은?",["1회당 재료 매입량","재료의 품질","특별대량주문","기계성능의 저하"],4],[18,"다음은 전부원가계산과 변동원가계산에 대한 내용이다. 잘못된 것은?",["고정제조간접비는 변동원가계산에서는 발생된 시점에 비용처리하고 전부원가계산에서는 판매된 시점에 비","전부원가계산은 외부보고용 재무제표작성에 적합한 원가계산방법이다.","변동원가계산에서는 변동판매관리비가 매출원가에 포함된다.","변동원가계산에서 공헌이익은 매출액에서 변동비를 차감한 개념이다."],3],[19,"다음 중 하위직급의 예산과정에 참여하는 정도에 따라 구분되는 예산편성방법이 아닌 것은?",["참여적 예산편성","전제적 예산편성","포괄적 예산편성","자문적 예산편성"],2],[20,"다음은 투자이익률에 의한 성과평가 내용이다. 올바르지 않은 것은?",["투자이익률은 매출이익률과 자산회전율로 구분이 가능하다.","투자이익률은 투자규모가 다른 투자안의 평가가 가능하다.","투자이익률에 의한 성과평가는 장기적인 수익을 발생시키는 준최적화현상이 발생한다.","투자이익률에 의한 성과평가는 의사결정의 불일치를 가져오는 단점이 있다."],3],[21,"다음은 원가중심점의 성과평가에 대한 내용이다. 올바르지 않은 것은?",["원가에 대해서만 의사결정을 부여하고 책임을 부담시킨다.","실제조업도에 근거한 변동예산과 실제조업도와의 차이․비교를 통해 성과평가를 한다.","원가중심점별로 최소 원가투입에 대한 최대성과 달성에 주된 관심을 가진다.","단일조업도에 의한 고정예산과 실제조업도 하의 실제원가의 비교도 유용한 원가차이 정보를 제공한다."],2],[22,"다음 중 매년 반복되는 일상적인 업무상 의사결정을 나타내는 것은?",["단기의사결정","특수의사결정","정규의사결정","장기의사결정"],4]],"제조원가실무":[[1,"다음 중 원가계산에 관련된 설명 중 타당하지 않은 것은?",["원가회계는 일반적으로 회사내부 정보이용자들에게도 유용한 정보를 제공한다.","제조명세서가 작성되었더라도 제품매출원가를 알 수 있는 것은 아니다.","제조과정에 있는 모든 제조기업의 원가계산은 기업회계기준에서 정한 동일한 원가계산방식에 의해서","제조원가에 해당하는 금액을 발생 즉시 비용처리 하였다면 당기총제조원가를 과소계상하게 된다."],3],[2,"원가회계의 목적이 아닌 것은?",["재고자산의 평가","매출원가의 계산","제품원가의 통제","매출액의 계산"],1],[3,"다음 중 원가의 요건에 해당하지 않는 것은?",["경제적 가치에 소비된 것이어야 한다.","반대급부를 수반한 것이어야 한다.","반대급부와 관련 없이 경영상의 필요적 경비로 소비된 것을 말한다.","경영과 직․간접적으로 관련된 것이어야 한다."],2],[4,"다음 항목 중 직접노무비에 해당하는 금액은 얼마인가?",["￦600,000","￦700,000","￦900,000","￦1,500,000"],1],[5,"노무비의 형태적 분류에 대한 설명이 바르지 않은 것을 고르시오.",["임금 및 수당 : 작업현장에 직접 종사하는 근로자에게 지급하는 보수로서 직접노무비에 해당한다.","급료 : 제조부문에 종사하는 관리자나 사무직원에게 지급하는 보수로서 간접노무비 또는 판매관리비에","잡급 : 임시 고용된 공장 노무자에게 지급하는 보수로서 경비에 해당한다.","종업원 상여 및 제수당 : 상여금, 정근수당, 가족수당, 자격수당 등이다."],3],[6,"개별원가계산에 대한 설명이다. 잘못된 것은 어느 것인가?",["실제배부율과 예정배부율의 구분은 제조간접비와 관련된 문제이다.","고객의 주문에 따라 제품을 생산하는 주문생산형태에 적합한 원가계산이다.","부문별 제조간접비 배분율을 사용하는 것이 공장전체 제조간접비 배분율 적용보다 더 정확하다.","평균화 과정으로 원가계산을 단순화시킬 수 있다."],4],[7,"개별원가계산을 실시하는 경우 제품별원가가 얼마만큼 정확하게 산정되느냐 하는 문제는 다음 중 어느 것과 가장 관련을 가지고 있는가?",["제조간접비의 배부","재공품의 평가","고정비와 변동비의 분리","판매가격의 결정"],1],[8,"￦1,000,000에 구입하여 사용 중이던 비품을 ￦500,000에 매각하는 A방안, ￦100,000을 추가로 투 입하여 ￦650,000에 매각하는 B방안이 있다면 이때 매몰원가는 얼마인가?",["￦500,000","￦1,000,000","￦1,100,000","￦1,500,000"],2],[9,"다음의 공손에 대한 설명 중 잘못된 것은?",["공손품은 품질이나 규격에서 일정기준에 미달하는 불량품을 말한다.","공손에는 정상공손과 비정상공손이 있다.","정상공손원가는 완성품 또는 재공품에 배분한다.","생산과정에서 부수적으로 발생하는 작업폐물을 말한다."],4],[10,"다음 고정비와 변동비에 관한 설명 중 틀린 것은?",["관련범위 내에서 변동비는 조업도의 증감에 따라 원가총액이 비례적으로 변화한다.","관련범위 내에서 고정비는 조업도의 증감에 불구하고 단위당 원가가 일정하다.","관련범위 내에서 변동비는 조업도의 증감에 불구하고 단위당 원가가 일정하다.","관련범위 내에서 고정비는 조업도의 증감과 관계없이 원가총액이 일정하게 발생한다."],2],[11,"제조간접비(공통비)의 배부기준을 정할 때 고려해야 되는 요소로서 다음 중 가장 합리적이고, 우선 적으로 적용되어야 하는 요소는?",["목적적합성","신뢰성","인과관계","예측가능성"],3],[12,"다음은 정부 제조원가계산 비목 중 일반관리비와 이윤산정에 관한 사항이다. 올바르지 않은 것은?",["일반관리비는 기업의 유지를 위한 관리활동부문에서 발생하는 제비용을 말한다.","이윤은 영업이익을 말한다.","이윤계상 시 재료비는 제외된다.","재료의 구입과정에서 발생하는 운반비는 이윤계상 대상에 포함된다."],4],[13,"표준직접노무원가에 대한 설명으로 잘못된 것을 고르시오.",["표준작업시간은 작업환경의 정상적인 상황에서 제품1단위를 생산하는데 소요되는 작업시간의 예상치이다.","표준임률은 제품의 작업에 관여하는 노동력의 예정가격을 말한다.","표준직접노무원가는 표준임률에 표준직접작업시간의 곱으로 설정한다.","표준임률은 작업자의 기술력과 숙련도 등을 고려하여 결정하는 것이 일반적이다."],4],[14,"제조물품을 구성하는 부품을 직접 수입하는 경우 수입비용(물품가격, 운임, 보험료, 수입경비, 관세 등) - 51 - 이 발생한다. 아래의 설명에서 올바른 것은?",["물품가격, 운임, 보험료는 재료비단가로 계상한다.","운임 및 보험료는 경비의 해당 계정과목으로 계상한다.","수입경비는 경비의 해당 계정과목으로 계상한다.","관세는 재료비에 포함하여 계상한다."],1],[15,"다음 공식에 알맞은 용어는? ※ 간접재료비 + 간접노무비 + 간접경비 = (",["제조원가","총원가","직접원가","제조간접비"],4],[16,"다음은 기업제품의 원가계산과 정부물품 제조의 원가계산의 차이점에 대하여 기술한 사항이다. 타당 하지 않은 것은?",["정부의 원가계산은 낙찰자 선정의 기준이 되는 예정가격의 결정을 위해 실시한다.","기업의 원가계산은 재무제표작성을 위한 자료 제공과 판매가격의 결정 등을 목적으로 하고 있다.","정부원가계산은 사전원가계산에 해당한다.","정부와 기업의 원가계산에 있어서 각 비목의 실발생 비용을 모두 반영하는 것은 동일하다."],4],[17,"다음 사항 중 정부물품의 제 기관이 사인의 지위에서 상대방과 대등한 관계로 계약업무를 수행하는 사법적 성격의","계약담당공무원이 지켜야 할 일정한 절차를 규정해 놓은 절차적 성격의 법규이다.","행정주체인 국가기관과 계약상대방 사이의 계약관련 분쟁이 발생할 경우, 대부분 행정소송의 대상이 된","국가 내부관계를 규율한 훈시적 성격의 법규이다."],3],[3,"다음은 예정가격 작성에 대한 기술이다. 타당하지 않은 것을 고르시오.",["소액수의계약 대상의 경우에는 금액규모에 관계없이 작성을 생략할 수 있다.","협상에 의한 계약을 체결하고자 하는 경우에도 작성을 생략할 수 있다.","개산계약을 체결하고자 하는 경우에도 작성을 생략할 수 있다.","턴키입찰의 경우에는 예정가격을 작성하지 아니한다."],3],[4,"다음은 정부공사의 적격심사낙찰제에 대하여 기술한 사항이다. 타당하지 않은 것을 고르시오.",["공사수행능력점수와 가격점수를 합산한 계약이행능력 점수가 일정점수 이상이면 낙찰자로 결정하는","최저가격으로 입찰한 자의 순으로 당해 계약이행능력을 심사한다.","추정가격 300억 원 미만 공사에 대하여 적용된다.","공사수행능력에 대한 변별력 작용으로 실적과 기술이 우수한 입찰자가 낙찰자로 결정된다고 볼 수 있다."],2],[5,"다음은 청렴계약과 관련하여 설명해 놓았다. 바르게 설명한 것은?",["청렴계약을 체결한 후, 계약상대자가 이를 위반하면 계약담당공무원은 예외 없이 해당 계약을 해제","청렴계약을 위반한 경우라도 필요시 중앙관서의 장의 승인을 받아 해당 계약을 계속하여 이행하게 할 수","청렴계약은 먼저 계약목적물에 대한 계약을 체결한 후에 별도로 청렴계약서를 제출하여 체결한다.","청렴계약제는 수의계약의 경우에는 해당되지 않고 입찰의 경우에만 적용된다."],3],[6,"다음 중 정부 공사, 물품·용역의 입찰방식에 대한 설명으로서 올바른 것을 고르시오.",["물품구매 입찰의 경우 원칙적으로 최저가낙찰제를 적용한다.","고시금액 미만 용역입찰은 최저가낙찰제를 적용한다.","공사계약의 경우 최저가낙찰제를 폐지하고 종합심사낙찰제를 도입하였다.","적격심사입찰의 경우에는 예정가격 이상으로 입찰한 자의 순으로 낙찰자를 결정한다."],1],[7,"다음 중 정부 입찰·계약 집행기준에서 입찰공고에 명시하고 있는 사후정산에 관한 설명으로서 올바 르지 않은 것은?",["입찰에 참가하고자 하는 자는 사후정산 내용을 숙지하여야 한다.","입찰참가자는 입찰금액 산정 시(내역입찰의 경우 산출내역서 포함) 사후정산비목은 예정가격 작성 시","기성대가 및 준공대가 지급 시 규정에 따라 정산을 한다.","예정가격 작성 시 계상된 국민건강보험료, 노인장기요양보험료, 국민연금보험료, 고용보험료는 사후"],4],[8,"다음은 입찰의 무효와 관련하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["미리 일괄등록을 한 사항 중 변경등록을 하지 아니하고 입찰서를 제출한 입찰은 무효사유에 해당된다.","입찰참가자격이 없는 자가 한 입찰은 무효 입찰에 해당된다.","예정가격을 초과한 입찰도 무효 입찰에 해당된다.","계약담당자는 입찰을 무효로 하는 경우 입찰자에게 무효의 이유와 그 뜻을 알려야 한다."],4],[10,"정부계약 체결 시 부당한 특약이나 조건에 해당되는 것으로 볼 수 있는 것은?",["하도급자를 선정할 때에는 발주기관이 지정한 업체를 선정하여야 한다는 내용의 특약을 정하는 경우","청렴계약을 위반하였을 경우에는 해당 계약을 해제 또는 해지할 수 있다는 내용의 특약을 정하는 경","발주기관이 계약체결 후 제출서류가 위조 또는 허위서류로 밝혀졌을 경우에는 계약을 해제 또는 해지","계약상대자가 계약상의 의무를 이행하지 아니한 때에는 계약보증금을 국고에 귀속시킨다는 내용의"],4],[11,"공동계약의 입찰, 계약 및 이행과 관련하여 설명한 것 중 틀린 것은?",["공동계약은 발주기관이 공동수급체와 체결하는 계약으로서, 공동수급체 구성은 각 구성원의 자유의사에","공동계약 체결 시 공동수급체 구성원 전원이 계약서에 연명으로 기명날인 또는 서명하여야 한다.","공동계약에서 선금․대가 등의 지급과 관련하여 원칙적으로 공동수급체 구성원별로 구분 기재된 신청서","공동계약과 관련한 입찰공고 시 그 이행방식과 공동수급체 구성원의 자격제한사항까지 입찰공고에"],3],[12,"국가계약의 종류 중 장기계속계약을 설명한 사항이다. 타당하지 않게 기술된 것을 고르시오.",["장기계속계약은 설계서 등에 의하여 사업내용이 확정되었으나 전체 예산확보가 곤란하거나 조속한","단 년도 사업예산이지만 연말에 발주된 관계로 계약체결 후 다음 연도로 사고 이월되어 사업이 완료","장기계속계약은 당해 연도 예산 범위 내에서 1차 계약을 체결하면서 총공사금액을 부기한다.","장기계속계약의 계약상대자는 1차 계약 시 부기한 총금액의 계약에 대한 권리와 의무가 있다."],3],[13,"다음은 원가계산방식에 의한 가격으로 예정가격을 결정할 경우 관련된 내용이다. 잘못 기술된 것은?",["적정한 거래실례가격이 형성되어 있지 않은 경우에 원가계산에 의한 가격으로 예정가격을 결정할 수 있다.","원가계산 시 재료비, 노무비, 경비, 일반관리비, 이윤의 비목을 반드시 포함하여야 한다.","공사원가계산 시 일정률로 계상하는 일반관리비, 간접노무비 등은 사전 공고한 공사원가제비율과 관계","계약목적물의 특수성으로 인하여 스스로 원가계산이 곤란한 경우에는 일정한 자격요건을 갖춘 원가"],1],[14,"입찰공고와 관련하여 기술한 다음 사항 중 바르지 못한 것은?",["입찰공고의 내용은 입찰에 부치는 사항, 입찰 장소 및 일시 등 일반적인 사항과 당해 계약 성격에","긴급을 요하는 입찰은 발주기관이 재량적으로 판단하여 입찰공고 기간을 단축할 수 있도록 규정되어 있다.","입찰공고는 원칙적으로 입찰서 제출마감일 전일부터 기산하여 7일(국제입찰 : 40일)전에 공고하여야","국제입찰의 경우에는 외국어로 입찰서 및 입찰참가신청서 제출마감일 등을 요약 공고하여야 한다."],2],[15,"다음은 입찰참가자격 사전심사제도(PQ)에 대하여 기술한 사항이다. 타당하지 않은 것을 고르시오.",["PQ는 원칙적으로 의무적 실시사항이다.","PQ는 부실공사 방지 등을 위해 도입된 제도이다.","PQ는 입찰 전에 미리 계약수행능력을 심사하여 적격자만이 입찰에 참가할 수 있게 하는 제도이다.","PQ는 각 발주기관이 심사기준을 정함에 있어서는 이행실적, 기술능력, 재무상태 등 계약수행능력을"],4],[16,"다음은 개찰 및 낙찰선언과 관련하여 기술한 사항이다. 올바르지 아니한 것을 고르시오.",["계약담당공무원이 착오로 낙찰자 결정을 잘못한 경우에는 낙찰자 결정 자체를 취소하고 당초의 낙찰","낙찰자로 결정된 자가 계약체결 이전에 부적격자로 판명되어 낙찰자 결정이 취소된 경우에, 동 부적","낙찰선언은 계약을 체결할 수 있는 권리를 부여하는 편무예약에 해당한다고 볼 수 있다.","기술(또는 규격)·가격 분리 동시입찰의 경우 기술(또는 규격)적격자로 확정된 자가 1인인 경우에도"],1],[17,"다음은 국가계약법령상 도입하여 시행하고 있는 과징금부과제도에 대한 설명이다. 올바르지 아니한 것을 고르시오.",["일정한 경우 입찰참가자격 제한을 갈음하여 과징금을 부과할 수 있도록 하고 있다.","과징금 부과금액은 일정한 상한금액이 있다.","각 중앙관서의 장은 과징금을 직접 부과할 수 있다.","부정당업자에 대해 입찰참가자격 제한조치와 동시에 과징금 부과처분을 병행할 수 없다."],4],[18,"다음 중 정부 입찰에 있어 입찰서 작성 및 제출에 관한 설명으로서 올바르지 않은 것은?",["입찰서의 금액표시에 있어 한글(한자) 및 아라비아 숫자로 병기할 수 있는데 이 경우 기재된 금액표시가","입찰자는 기명날인을 함에 있어 반드시 입찰자 성명을 기재하여야 한다.","입찰자는 입찰서의 기재사항 중 삭제 또는 정정한 곳이 있을 때에는 입찰에 사용하는 인감으로 날인","입찰자는 입찰서를 봉함하여 1인 1통만을 제출하며, 동일사항에 동일인이 2통 이상의 입찰서를 제"],2],[19,"다음 중 국가계약법령상 입찰참가자격 제한 대상자에 관하여 설명한 것으로서 타당하지 않은 것을 고르시오.",["계약담당공무원은 부정당업자에 해당된다고 인정되는 자가 있을 때는 직접 재제를 할 수 있다.","행정처분에 불복할 경우에는 행정소송의 대상이 된다.","계약상대자 등”의 대리인, 지배인 그 밖의 사용인이 입찰참가자격의 제한 사유에 해당될 경우에도","행정처분이라 함은 행정권한을 위임(위탁)을 받은 공공기관이 국민의 권리의무에 관계되는 사항에"],3],[20,"다음 중 공사이행기간의 변경에 따른 실비산정에 대하여 설명한 것으로서 올바르지 않은 것은?",["설계변경(계약상대자의 책임 없는 사유인 경우에 한함)으로 인하여 준공기한 내에 계약을 이행할 수","공사기간 연장에 따른 간접노무비는 정상적인 공사기간 중에 실제 지급된 임금수준을 초과할 수 없","계약상대자의 책임으로 시공이 중단되었을 경우 계약기간의 연장을 신청할 수 있다.","계약상대자는 준공대가 수령 전까지 조정신청을 하여야 한다."],2],[22,"입찰참가자격 사전심사에 관한 설명으로 다음 중 올바르지 않은 것은?",["입찰참가 적격자는 기술적 공사이행능력, 경영상태 부문 및 사회적 책임을 심사한 결과를 기준으로","부실공사 방지를 위해 일정수준 이상의 능력을 갖춘 자에게 입찰에 참가할 자격을 부여한다.","추정가격 300억 원 이상의 공사는 의무적으로 실시한다.","입찰참가자격 사전심사 대상 공사의 경우, 현장설명일 전일부터 기산하여 30일 전에 입찰공고 하여야"],3]]},"11회":{"재무회계":[[1,"다음은 회계의 순환과정 중 일부를 기술한 것이다. 회계의 순환과정을 순서대로 기술한 것으로 옳은 것은? A. 전기 B. 분개 C. 수정전시산표 작성 D. 수정분개 E. 재무제표 작성 F. 거래와 사건의 식별",["A, B, C, E, D, F","A, B, D, C, E, F","F, A, B, C, D, E","F, B, A, C, D, E"],4],[2,"다음 중 총계정원장의 기록이 정확한지의 여부를 파악하는 검증기능을 갖는 것은 어느 것인가?",["시산표","분개장","정산표","전표"],1],[3,"회계정보가 유용하기 위해 갖추어야 할 주요 특성을 회계정보의 질적 특성이라고 한다. 한국채택국 제회계기준에 의하면 목적적합성과 가장 관련이 있는 것은 어느 것인가?",["표현의 충실성","중립성","완전성","예측가치"],4],[4,"다음 중에서 회계변경의 이론적 유형이 아닌 것은?",["회계처리기준의 변경","회계추정의 변경","전기오류의 수정","보고실체의 변경"],3],[5,"다음 중에서 회계추정의 변경과 관련 있는 내용은 무엇인가?",["재고자산 단가결정 방법을 선입선출법에서 이동평균법으로 변경","유형자산의 측정기준을 원가모형에서 재평가모형으로 변경","투자부동산의 측정기준을 원가모형에서 공정가치모형으로 변경","금융자산이나 금융부채의 공정가치 추정변경"],4],[6,"다음은 재무상태표에 대한 설명이다. 옳지 않은 것은?",["투자자 및 채권자는 재무상태표를 통해 기업의 유동성에 대한 정보를 얻을 수 있다.","일정시점의 재무상태를 나타내는 보고서로서 자산, 부채 및 자본에 대한 정보를 얻을 수 있다.","재무상태표는 경영자의 주관적 판단에 의해 영향을 받고 있다.","영업활동으로 인해 발생되는 영업손익을 파악할 수 있다."],4],[7,"다음 항목 중 이연항목에 해당되는 것은 어느 것인가?",["미지급비용, 미수수익","선급비용, 선수수익","미지급비용, 선수수익","미수수익, 선급비용"],2],[8,"다음은 상장회사의 무형자산과 관련된 설명이다. 옳지 않은 것은?",["영업권은 20년 이내 합리적인 방법으로 상각해야 한다.","탄소배출권 및 저작권은 무형자산의 범위에 포함된다.","무형자산의 제거로 인하여 발생하는 손익은 당기손익에 반영된다.","개발비는 무형자산에 포함되지만 경상개발비는 무형자산에 해당되지 않는다."],1],[9,"다음 중 당좌자산에 속하지 않는 것은?",["상품","단기금융상품","매출채권","선급금"],1],[10,"주식을 발행했을 때 자본금은 어떻게 구성되는가?",["액면가액 × 유통주식수","시장가액
