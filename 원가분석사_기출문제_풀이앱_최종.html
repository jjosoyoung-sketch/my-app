 필요한 총소요일 수는? {기준조건 : 바닥미장(㎡당) 미장공 0.05인}",["3일","4일","5일","6일"],3],[20,"다음 중 공공 공사의 공기연장 간접비의 산정 설명으로 옳은 것은?",["실비로 산정하는 것을 원칙으로 하나 일부 항목에 대해 요율로 산정한다.","지급임차료의 실비입증이 어려운 경우 요율로 산정할 수 있도록 규정하고 있다.","간접노무비 중 상여금은 기본급의 연 500%를 초과하지 않아야 한다.","예정가격 작성기준에 그 기준을 두고 있다."],1],[21,"다음은 물가변동으로 인한 계약금액 조정 방법 중 지수조정률 산출방법에 대하여 기술한 사항이다. 올바르 지 않은 것을 고르시오.",["계약금액의 산출내역 중 재료비, 노무비, 경비를 구성하는 제비목을 대상으로 비목군을 분류한다.","입찰시점 및 조정기준일 시점이 월중인 경우에는 전월지수를 적용한다.","기계경비 지수는 표준품셈의 건설기계 가격표상의 전체 기종에 대한 시간당 손료의 평균치를 지수화 한","계수는 각 비목군에 해당하는 산출내역서상의 금액이 총공사금액에서 각각 차지하는 비율을 의미한다."],4]],"제도및법규":[[1,"다음 중에서 입찰보증금으로 납부할 수 있는 것이 아닌 것을 고르시오.",["현금","상장증권","어음","보증보험증권"],3],[2,"다음에서 자치단체가 체결하는 수의계약의 배제 사유에 해당하지 않는 것은?",["중소기업기본법에 따른 소기업","공사 또는 기술용역의 경우 기술자 보유현황이 관련 법령에 따른 업종등록기준에 미달하는 자","발주기관이 제한한 자격요건 등을 충족하지 아니한 자","견적서 제출 마감일 현재 부도․파산․영업정지 등이 확정된 경우"],1],[3,"다음 낙찰자 결정방법에 관한 설명 중 잘못 기술한 것을 고르시오.",["적격심사는 가장 낮은 금액으로 낙찰자를 결정하는 방식이다.","종합심사 또는 종합평가 낙찰자는 300억 원 이상 공사에 적용하는 낙찰자 결정방식이다.","일괄입찰은 발주기관이 제시한 입찰안내서 등에 따라 입찰자가 설계서를 작성하여 제출하는 입찰방","희망수량 입찰은 다량의 수요물품을 희망수량에 따라 분할하여 구매하고자 할 경우 최저가격으로 입"],1],[4,"다음 중 자치단체의 선금 지급 이후 반환 사유로 적절하지 않은 것은?",["계약을 해제․해지하는 경우","선금지급조건을 위배한 경우","계약변경으로 인해 계약금액이 증액 되었을 경우","정당한 사유 없이 선금수령일로부터 15일 이내에 공동수급체 구성원이나 하수급자에게 선금을 배분"],3],[5,"하자보수책임에 관한 사항 중 바르지 않은 것은?",["하자담보 책임기한은 민법에서 정한 기한을 초과할 수 없다.","공사의 하자담보 책임의 존속기한은 공사 준공 시 확정하여야 한다.","장기계속계약의 경우 연차별로 담보책임 존속기간을 정하되, 연차별로 담보책임을 구분할 수 없을","도급계약에 대한 담보책임 존속기한은 10년을 초과할 수 없다."],2],[6,"다음 중 개별법령에 따른 분리 발주 대상이 아닌 공사는?",["정보통신공사","전기공사","기계설비공사","소방공사"],3],[7,"공공 공사의 경비 항목 중 계약체결 시 조정 없이 반영하도록 규정하여 적격심사 가격 산식에서도 제외한 경비 항목이 아닌 것은?",["국민연금보험료","국민건강보험료","산재보험료","품질관리비"],3],[8,"다음에서 국가의 예산ㆍ회계ㆍ계약에 관계되는 회계관계직원 등이 아닌 자는?",["회계관리관","지출관","계약관","재무관"],1],[9,"정부입찰에서 낙찰자로 결정되면 계약을 체결하게 된다. 다음의 계약체결과 관련하여 틀리게 설명한 것은?",["계약체결은 원칙적으로 낙찰통지를 받은 후 10일 이내에 하여야 한다.","정부계약에서 계약서 작성을 생략할 수 있는 경우는 없다.","계약체결 시 원칙적으로 계약서를 서면으로 작성하여야 한다.","전자조달시스템을 이용한 전자계약서 작성을 인정하고 있다."],2],[10,"다음 중 계약목적물별 계약의 종류가 바르게 연결되지 아니한 것은?",["청소용역 - 건설기술용역","설계용역 - 건설기술용역","경비용역 – 일반용역","감리용역 - 일반용역"],1],[11,"국가계약법의 특성에 관하여 틀리게 설명한 것은?",["기본적으로 사법 성격의 법규이다.","모두 실체법적 성격의 법규이다.","민법의 기본원리가 적용된다.","기본적으로 국가의 내부관계를 규율해 놓은 훈시적 성격의 법규이다."],2],[12,"정부계약에서 지체일수 산정과 관련하여 바르게 설명한 것은?",["지체일수는 계약이행기한의 다음날부터 기산한다.","준공 또는 납품기한이 공휴일인 경우에는 공휴일의 다음날부터 기산한다.","준공기한 내에 준공신고서를 제출한 경우에도 준공검사에 소요된 기간은 지체일수에 산입한다.","준공기한 경과 후에 준공신고서를 제출한 경우에는 예외 없이 검사에 소요된 기간은 모두 지체일수"],1],[13,"국가계약법 등에 따라 계약의 목적, 성질, 규모 등을 고려하여 경쟁에 따라 계약을 체결하는 것이 비효율적이라고 판단되는 경우에 수의계약을 체결할 수 있다. 다음에서 수의계약을 체결할 수 있는 경 우에 해당하지 않는 것은?",["추정가격이 2천만 원 초과 5천만 원 이하인 계약으로서 관련 법령에 따른 소기업 또는 소상공인과","추정가격이 2천만 원 초과 5천만 원 이하인 계약 중 학술연구ㆍ원가계산ㆍ건설기술 등과 관련된 계","추정가격이 2천만 원 초과 5천만 원 이하인 계약으로서 관련 법령에 따라 여성기업과 체결하는 물","추정가격이 3억 원 이하인 건설공사, 추정가격이 8천만 원 이하인 전문공사로서 관련 법령에 따른"],4],[14,"정부계약에서 설계변경에 관하여 설명한 것 중 틀리게 설명한 것은?",["설계서에는 설계도면, 공사시방서, 현장설명서 및 물량내역서 등이 있다.","공사현장 상태가 설계도면과 상이하여도 설계변경사유에는 해당되지 않는다.","설계변경으로 인해 공사물량의 증감이 발생한 때에는 계약금액 조정대상이 된다.","설계서의 내용이 불분명한 경우는 설계변경사유에 해당된다."],2],[15,"정보과학기술 등 집약도가 높은 지식을 활용하여 고부가가치를 창출하는 사업 중 지식기반사업에 대한 계약을 체결하는 경우 우선적으로 적용할 수 있는 계약체결방법은?",["경쟁적 대화에 의한 계약","제한경쟁입찰에 의한 계약","협상에 의한 계약","사후원가검토조건부계약"],3],[16,"다음 중 지방자치단체 경쟁 입찰에 있어서 예정가격 작성을 위한 복수예비가격 15개의 작성 범위 에 해당하는 것은?",["기초금액의 ±3% 범위 내에서 0∼+3% 7개, 0∼-3% 8개","기초금액의 ±3% 범위 내에서 0∼+3% 8개, 0∼-3% 7개","기초금액의 ±2% 범위 내에서 0∼+2% 7개, 0∼-2% 8개","기초금액의 ±2% 범위 내에서 0∼+2% 8개, 0∼-2% 7개"],1],[17,"다음의 ( )에 들어갈 숫자가 올바르게 열거한 것을 고르시오. 계약상대자가 정당한 사유 없이 공사계약의 이행을 지체한 경우에 물리는 지연배상금의 율은 계약금액 의 ( )이고, 지연배상금의 징수사유가 발생하고 그 금액이 계약금액의 ( )이상인 경우로서 계약을 해제 또는 해지하지 아니하는 경우에는 계약상대자로 하여금 잔여계약 이행금액에 대하여 계약보증금을 추가",["1,000분의 0.8 – 100분의 10","1,000분의 0.8 – 100분의 15","1,000분의 0.5 – 100분의 10","1,000분의 0.5 – 100분의 15"],3],[18,"“청렴계약”의 내용에 해당하지 아니하는 것은?",["금품, 향응, 취업제공 및 알선 등의 요구ㆍ약속과 수수(授受) 금지 등에 관한 사항","국가기관과 지방자치단체와 계약을 하는 경우 예정가격을 작성 금지에 관한 사항","계약과 관련된 특정 정보의 제공을 요구하거나 받는 행위의 금지에 관한 사항","입찰가격의 사전 협의 또는 특정인의 낙찰을 위한 담합 등 공정한 경쟁을 방해하는 행위의 금지에"],2],[19,"기획재정부 계약예규 “예정가격 작성기준”에서는 원가계산을 3개 분야로 구분하고 있다. 가장 알맞 은 구분은 무엇인가?",["제조원가, 공사원가, 용역원가","표준원가,","종합원가, 전부원가, 총괄 ,"회계추정의 변경에 대한 회계처리 방법은?",["전진법","소급법","당기일괄처리법","상황에 따라 위의 3가지를 선택하여 적용"],1],[17,"다음 중 올바른 결산정리사항이 아닌 것은?",["비용의 미지급분은 비용에서 차감하여 자산으로 이월한다.","비용의 선급분은 비용에서 차감하여 자산으로 이월한다.","수익의 선수분은 수익에서 차감하여 부채로 이월한다.","대손충당금, 감가상각누계액은 비용에 가산하되, 자산의 평가계정으로 계상한다."],4],[18,"㈜한양의 2020년도 기말수정분개전 법인세비용차감전 순이익은 3,000,000원이다. 결산시 반영할 사 항이 아래와 같다면 ㈜한양의 2020년 법인세비용차감전 순이익은 얼마인가? - 3 - * 선급보혐료 300,000원 * 미지급임차료 100,000원 * 미수이자 60,000원",["3,260,000원","3,360,000원","3,460,000원","3,560,000원"],3],[19,"다음 중 당기손익 공정가치측정 금융자산에 대한 설명으로 틀린 것은?",["단기 시세차익을 목적으로 보유한 시장성이 있는 주식이나 채권을 말한다.","기말평가 시 당기손익 공정가치측정 금융자산평가손익은 손익계산서의 영업외수익 또는 영업외 비용","처분 시 당기손익 공정가치측정 금융자산처분손익은 손익계산서의 영업외수익 또는 영업외비용으로","당기손익 공정가치측정 금융자산은 투자자산으로 분류된다."],2],[20,"다음 중 재무제표의 인식과 제거에 대해 옳지 않은 것은?",["자산, 부채, 자본의 정의를 충족하는 항목만이 재무상태표에 인식된다.","자산, 부채, 자본, 수익, 비용에 대한 정보는 재무제표이용자들에게 목적적합하다.","제거는 기업의 재무상태표에서 인식된 자산이나 부채의 전부 또는 일부를 삭제하는 것을 말하며, 일반","특정 자산이나 부채를 인식하는 것은 목적 적합한 정보를 제공할 뿐만 아니라 해당 자산이나 부채"],1],[21,"다음 자료를 이용하여 매입으로 인한 현금유출액을 구하면 얼마인가? 단, 매입은 외상으로만 이루어 진다고 가정한다. · 기초재고자산 ￦500,000 · 기말재고자산 ￦700,000 · 기초매입채무 ￦400,000 · 기말매입채무 ￦600,000 · 매출원가 ￦800,000",["\\400,000","\\500,000","\\600,000","\\800,000"],4]],"원가관리회계":[[1,"(주)원가성의 2013년도의 변동비는 매출액의 60%이다. 매출액을 S, 총고정비를 FC라고 할 때, 매출 액의 30%에 해당하는 목표이익을 얻기 위한 매출액은?",["S = FC/0.1","S = FC/0.3","S = FC/0.6","S = 0.9×FC"],2],[2,"원가에 대한 다음 설명 중 가장 옳지 않은 것은?",["준고정원가는 관련조업도 내에서 일정하게 발생하는 원가를 말한다.","직접재료비와 직접노무비를 기초원가라 한다.","간접원가란 특정한 원가집적대상에 직접 추적할 수 없는 원가를 말한다.","제품생산량이 증가함에 따라 관련 범위 내에서 제품단위당 고정원가는 일정하다."],1],[3,"조업도의 감소에 따른 고정비 및 변동비와 관련한 원가행태를 틀리게 나타낸 것은?",["총고정비는 일정하다.","단위당 고정비는 감소한다.","총변동비는 감소한다.","단위당 변동비는 일정하다."],2],[4,"다음에서 설명하고 있는 원가행태는 무엇인가? 전력비의 원가행태는 사용량과 무관하게 납부하는 기본요금과 조업도(사용량)가 증가함에 따라 납부해야 할 금액이 비례적으로 증가하는 추가요금으로 구성되어 있다.",["변동비(변동원가)","고정비(고정원가)","준변동비(준변동원가)","준고정비(준고정원가)"],1],[5,"다음 중 제조원가 3 요소에 해당 하지 않는 것은?",["재료비","외주가공비","노무비","제조경비"],1],[6,"다음 중 제조원가에 속하지 않는 항목은?",["공장 경비원 임금","재료비","기계 감가상각비","대표이사 급여"],2],[7,"다음의 보조부문비의 배부방법 중 정확도가 높은 방법부터 올바르게 배열한 것은? - 10 -",["직접배부법 〉상호배부법 〉단계배부법","직접배부법 〉단계배부법 〉상호배부법","상호배부법 〉단계배부법 〉직접배부법","단계배부법 〉상호배부법 〉직접배부법"],4],[8,"다음은 개별원가계산에 대한 설명이다. 틀린 것은?",["종합원가계산에 비하여 보다 정확한 원가계산이 가능하다.","원가기록업무가 비교적 단순하여 경제적이다.","제품별로 손익분석이 가능하다.","제조지시서별로 원가계산표를 작성한다."],3],[9,"다음 중 부문별 원가계산에 대한 설명으로 틀린 것은?",["제품원가를 신속하게 계산하기 위하여 사용된다.","기업의 규모가 크고 제품이 여러 제조과정을 거쳐 생산되는 기업에서 많이 사용된다.","제조간접원가를 제품별로 보다 정확하게 배부하기 위한 방법이다.","제조간접원가를 발생장소별로 분류 집계하는 방법이다."],3],[10,"완성품 중 표준규격이나 품질에 미치지 못하는 불합격품을 무엇이라고 하는가?",["연산품","작업폐물","공손품","부산물"],3],[11,"다음 원가의 개념에 대한 설명 중 틀린 것은?",["직접원가란 특정 원가 집적대상에 추적이 가능하거나 식별 가능한 원가이다.","고정원가란 관련범위 내에서 조업도 수준과 관계없이 총원가가 일정한 원가형태를 말한다.","매몰원가란 특정의사결정과 직접적으로 관련 있는 원가를 말한다.","기간원가란 제품생산과 관련 없이 발생된 원가로써 발생된 기간에 비용으로 처리되는 원가를 말한"],2],[12,"다음 중 제조원가명세서에서 확인할 수 없는 내용은?",["기말 제품 재고액","재공품에 투입된 가공비","기말 재공품 재고액","기말 원재료 재고액"],1],[13,"다음 자료를 활용하였을 때, 제품단위당 변동제조원가는 얼마인가? - 11 - * 단위당 판매가격 ￦900 * 단위당 직접재료비 ￦300 * 단위당 직접노무비 ￦220(시간당 임률은 ￦110) * 변동제조간접비는 시간당 ￦20이 발생되는 것으로 추정",["￦340","￦560","￦940","￦1240"],2],[14,"다음 자료를 활용하여 당월경비소비액을 계산하면 얼마인가? 당월지급액 ￦270,000",["￦80,000","￦220,000","￦250,000","￦290,000"],1],[15,"다음 중 개별원가계산제도를 적용하기에 적합한 업종은 어느 것인가?",["제지업","정유산업","조선업","방직업"],1],[16,"회계기준에 의한 제조원가명세서에 반영되지 않는 것은?",["당기재료원가","당기노무원가","일반관리비","당기총제조원가"],4],[17,"(주)한양의 20x5년 발생자료를 참고하여 당기제품제조원가를 계산하면? 원재료 기초재고 \\100,000, 당기매입 \\800,000, 기말재고 \\150,000 직접노무비 \\500,000 제조간접비 \\600,000 재공품 기초재공품 \\300,000, 기말재공품 \\200,000",["\\1,950,000","\\2,050,000","\\2,150,000","\\2,250,000"],2],[18,"(주)서울상회는 직접원가를 기준으로 제조간접비를 배부한다. 다음 자료에 의해 제조시서 No.1의 제 조간접비 배부액은 얼마인가? - 12 - 구 분 공장전체 발생원가 제조지시서 No.1 직접재료비 \\1,000,000 \\200,000 직접노무비 \\2,000,000 \\400,000 직접노동시간 1,000시간 200시간 제조간접비 \\1,800,000 (",["\\100,000","\\200,000","\\300,000","\\360,000"],4],[20,"㈜한국의 기본원가는 \\200이고, 가공원가는 \\350인 경우 ㈜한국의 직접노무원가는 얼마인가? 단, ㈜한국의 제조간접원가는 직접재료원가의 2배이다.",["\\50","\\100","\\150","\\200"],2],[21,"20×1년 설립된 ㈜한국은 혼합공정을 통해 의약품을 생산한다. ㈜한국은 20×1년 1,000개의 의약품 을 생산할 수 있는 원료를 투입하여 800개의 의약품을 생산하였으며, 200개는 80%가 완성된 상태로 기 말재공품으로 남아 있다. ㈜한국의 가공원가의 완성품환산량은 얼마인가? 단, 원료를 공정의 착수시 전 부 투입되었으며, 가공원가는 공정 전반에 걸쳐 ",["160개","200개","800개","960개"],1]],"제조원가실무":[[1,"다음은 원가계산의 목적에 대한 설명이다. 가장 거리가 먼 것은?",["가격결정의 목적","재무제표 작성을 위한 목적","재고조사의 목적","경영계획 수립 목적"],3],[2,"다음은 정부원가계산 기준 시 국가계약법 시행규칙 제7조(원가계산을 할 때 단위당 가격의 기준)에 대한 설명이다. 틀린 것은?",["거래실례가격은 시중에 적정한 거래가 형성되고 있는 물품가격이다.","거래실례가격에는 조달청장이 조사하여 통보한 가격, 기획재정부장관에게 등록한 기관이 조사하","유사한 거래실례가격은 기능과 용도가 유사한 물품의 거래가격을 말한다.","견적가격은 계약상대자 또는 제3자로부터 직접 제출받은 가격을 말한다."],2],[3,"다음은 부문별 원가계산에 대한 설명이다. 틀린 것은?",["원가의 3대요소인 재료비, 노무비, 경비의 소비액을 각 요소별로 원가를 계산한 다음 이를 발생장소","원가를 분류집계하기 위한 계산조직상의 구분을 원가부문, 원가중심점이라 한다.","제조간접비의 배부에 있어 각 부문별 원가계산은 책임소재가 확실하다.","제조공장 전체의 일괄된 배부기준, 배부율에 의해 각 제품에 배부하기보다 각 부문별로 책정된 배부"],4],[4,"다음은 재무제표에 대한 설명이다. 설명 중에서 ( ( A )안에 알맞은 말로 연결된 것은? )는 손익계산서를 작성하기 전 단계에서 이루어지며, 손익계산서에 기재되는 재무제표 부속명세 서의 일종이다. ( A )에는 기말재료재고액, 기말재공품재고액이 표시되며, 이러한 기말재고자산은 재 무상태표의 기말재고자산과 일치하여야 한다. ( A )에서 최종적으로 산정되는",["A - 제조원가 명세서, B – 당기재료 매입액","A - 제조원가 명세서, B – 당기제품 제조원가","A – 재무상태표, B – 기초재료 재고액","A - 제조원가 명세서, B – 기초재료 재고액"],2],[5,"다음은 공손품·작업폐물 및 감손의 회계처리에 대한 설명이다. 틀린 것은?",["공손품은 제품의 제조과정에서 여러 사유로 인하여 판매가 불가능한 불량품, 즉 불합격품을 말한다.","공손품이 발생하는 원인은 작업설비의 불완전, 재료의 불량, 작업기술의 미숙, 작업자의 부주의 등이","공손품의 발생은 기업의 생산성 향상 및 이윤창출에 문제가 있다.","모든 공손품은 보수나 회복이 불가능하며, 공손비는 원가성이 인정되지 않아 원가 외 항목으로 처리"],4],[6,"다음은 변동원가계산과 전부원가계산에 대한 설명이다. 틀린 것은?",["전부원가계산의 기본 목적은 외부보고에 있다.","변동원가계산의 기본 목적은 계획수립과 통제에 있다.","변동원가계산은 고정제조간접원가를 제품원가계산 범주에 포함시키는 방법이다.","변동원가계산은 기업의 CVP 분석 및 단기적 의사결정에 대한 유용한 정보를 제공한다."],3],[7,"다음은 재료량 산출 시 공식이다. 공식이 맞지 않는 것은?",["불량률 = 불량량 ÷ 총 생산량","재료소요량 = 제품순량(정미량) × (1 + 손실률 - 불량률)","수율 = (생산량 ÷ 투입량) × 100","시료율 = 시료량 ÷ 총 생산량에 대한 원재료"],2],[8,"다음은 CVP 분석에 관한 내용이다. 설명이 틀린 것은?",["CVP 분석은 조업도(판매량)가 변동함에 따라 원가, 이익, 수익 등이 어떤 영향을 받는지를 분석하","CVP 분석은 손익분기점, 판매가격의 결정에 필요한 정보를 제공한다.","손익분기점 매출액 = 고정원가 ÷ 공헌이익율","등식법의 산정공식은 총원가(총비용) + 경상이익 = 총수익"],4],[9,"다음의 제품에 대한 비목별 금액을 기준으로 가공원가는 얼마인가?",["\\445,000","\\400,000","\\225,000","\\475,000"],3],[11,"보강각관 제작에 대한 재료 할증율을 계산하면(소수점이하 셋째자리 절사) 몇 %인가? - 보강각관 제작에 대한 소재 및 제품 규격 ○ 재 ?",["정당한 이유 없이 계약의 체결 또는 이행 관련 행위를 하지 않은 자","계약상대자의 귀책사유가 아닌 것으로 계약이행이 지체된 경우","사기 그밖에 부정한 행위로 입찰·낙찰 또는 계약의 체결·이행과정에서 국가나 지방자치단체에 손해","계약을 이행할 때 부실·조잡 또는 부당하게 하거나 부정한 행위를 한 자"],2],[10,"다음 중 공공계약 대가지급과 관련하여 알맞지 않은 것은?",["선금을 지급받기 위해서는 발주자에게 선금 보증서를 제출해야 한다.","준공대가도 필요한 경우 준공검사 이전에 지급할 수 있다.","단순한 물품의 구매는 선금지급 대상이 되지 않는다.","발주자는 계약상대자가 선금지급 조건을 위배한 경우 반환을 청구해야 한다."],2],[11,"다음 중 경쟁 입찰에 의한 낙찰자 결정방식이라고 볼 수 없는 것은?",["적격심사","협상에 의한 계약","설계·시공 일괄 입찰","국토교통부에서 정한 공모 기준에 따라서 건축 설계 공모를 하여 디자인 공모에 당선된 자와의 계약"],4],[12,"다음 중 1인 견적에 의한 수의계약 대상 공사가 아닌 것은? - 46 -",["공사에서 장래시설물의 하자에 대한 책임 구분이 곤란한 경우","작업상의 혼잡 등으로 하나의 현장에서 2인 이상 시공자가 공사를 할 수 없는 경우","지방자치단체가 시군으로 지역 제한 견적 공고를 하였으나 입찰자가 없는 경우","특허공법 등에 의한 공사로 사실상 경쟁이 불가능한 경우"],3],[13,"다음 중 국가계약법상 입찰참가자격 제한 대상이 아닌 자는?",["계약을 이행할 때에 부실·조잡 또는 부당하게 하거나 부정한 행위를 한 자","공정거래위원회로부터 입찰참가자격 제한의 요청이 있는 자","경쟁입찰, 계약체결 또는 이행과정에서 입찰자 또는 계약상대자 간에 담합을 한 자","국토교통부장관으로부터 입찰참가자격 제한의 요청이 있는 자"],4],[14,"공사계약일반조건에서 공사감독관이 공사의 전부 또는 일부의 이행을 정지시킬 수 있는 사유가 아닌 것은?",["공사의 이행이 계약내용과 일치하지 않는 경우","공사의 전부 또는 일부의 안전을 위해 공사의 정지가 필요한 경우","재해방지 등을 위한 응급조치의 경우","계약상대방이 요청한 경우"],4],[15,"국가계약법상 입찰 또는 수의계약 등에 부칠 사항에 대해 낙찰자 및 계약금액의 결정기준으로 삼기 위해 미리 해당 규격서 및 설계서 등에 따라 작성해 두는 가격을 의미하는 용어는?",["예정가격","추정가격","입찰가격","경쟁가격"],1],[16,"선금과 기성 및 준공대가 지급을 비교하여 설명한 것 중 바르지 않게 설명한 것은?",["선금과 기성 및 준공대가 모두 그 지급이 임의사항이다.","선금지급과 기성 및 준공대가 지급 모두 계약상대자의 신청이 있어야 한다.","선금지급 시에는 채권확보를 위해 보증서를 징구하게 되나, 기성 및 준공대가 지급 시에는 그러하지","선금은 계약체결이 되면 지급 할 수 있으나, 기성대가는 기성부분 이행 후 기성검사를 거쳐 지급한"],1],[17,"지체상금과 계약의 해제 또는 해지와 관련하여 설명한 것 중 틀린 것은?",["지체상금은 계약의 이행지체에 따른 손해배상액의 예정 성격으로 징수하는 것이다.","계약상대자가 이행지체 중이라도 이행불능상태가 되면 계약을 해지할 수 있다.","지체상금이 계약보증금 상당액에 달한 경우라도 예외적으로 계약을 해제 또는 해지하지 않을 경우도","장기계속계약은 연차별이 아닌 총 공사의 이행을 기준으로 지체된 경우 지체상금을 부과한다."],4],[19,"정부 공사계약에서 하자보수와 관련하여 설명한 것 중 틀린 것은?",["하자담보책임기간은 1년 이상 10년 이하의 범위에서 정한다.","장기계속공사는 연차계약별로 하자보수보증금을 납부하는 것을 원칙으로 한다.","하자보수책임은 사용자의 관리과정에서 발생된 하자도 포함한다.","하자보수보증금은 납부를 면제하는 제도를 두고 있다."],3],[20,"2단계 경쟁입찰에 관하여 설명한 것 중 바르지 않게 설명한 것은?",["1단계와 2단계로 나누어 실시하는 입찰형태이다.","1단계입찰이 2인 <script>
// Convert QDATA array format to app format
// QDATA = { "10회": { "재무회계": [[n,q,[c1..4],a], ...], ... }, ... }
const DB = {};
for(const [rkey, subjs] of Object.entries(QDATA)) {
  DB[rkey] = {};
  for(const [subj, qs] of Object.entries(subjs)) {
    DB[rkey][subj] = qs.map(([n,q,c,a]) => ({n,q,c,a,e:''}));
  }
}

const ROUNDS = Object.keys(DB).sort((a,b)=>parseInt(a)-parseInt(b));
const SUBJS = ['재무회계','원가관리회계','제조원가실무','공사기타원가','제도및법규'];
let round=ROUNDS[ROUNDS.length-1], subj='원가관리회계', qi=0;
let ans={}, graded={}, draws={}, tool='c', col='#1a56db', sz=3;
let drawing=false, lx=0, ly=0, aiOpen=false;
let expCache={};  // {key: explanation text}

const K=(r,s,i)=>`${r}||${s}||${i}`;
const QS=()=>(DB[round]&&DB[round][subj])||[];

function initUI(){
  document.getElementById('rtabs').innerHTML=ROUNDS.map(r=>
    `<button class="rtab${r===round?' on':''}" onclick="setRound('${r}')">${r}</button>`
  ).join('');
  const qs=QS();
  document.getElementById('stabs').innerHTML=SUBJS.map(s=>{
    const hasQ = DB[round]&&DB[round][s]&&DB[round][s].length>0;
    const label = s.length>5?s.replace('재무회계','재무').replace('원가관리회계','원가관리').replace('제조원가실무','제조원가').replace('공사기타원가','공사기타').replace('제도및법규','제도법규'):s;
    return `<button class="stab${s===subj?' on':''}${!hasQ?' disabled':''}" onclick="setSubj('${s}')" style="${!hasQ?'opacity:.4;cursor:default':''}">${label}</button>`;
  }).join('');
}

function setRound(r){round=r;qi=0;subj=getDefaultSubj(r);initUI();renderDots();renderQ();updateScore();scheduleSave();}
function setSubj(s){
  if(!DB[round]||!DB[round][s]||!DB[round][s].length)return;
  subj=s;qi=0;initUI();renderDots();renderQ();updateScore();scheduleSave();
}
function getDefaultSubj(r){
  for(const s of SUBJS){if(DB[r]&&DB[r][s]&&DB[r][s].length)return s;}
  return SUBJS[0];
}

function renderDots(){
  const qs=QS();
  document.getElementById('dots').innerHTML=qs.map((_,i)=>{
    const k=K(round,subj,i);
    let c='dot';
    if(i===qi)c+=' cur';
    else if(graded[k]===true)c+=' ok';
    else if(graded[k]===false)c+=' ng';
    else if(ans[k]!==undefined)c+=' ans';
    return `<button class="${c}" onclick="goQ(${i})">${i+1}</button>`;
  }).join('');
  const total = qs.length;
  document.getElementById('qcnt').textContent=total?`${qi+1}/${total}`:'0/0';
}

function renderQ(){
  const qs=QS();
  const empty=document.getElementById('empty');
  const qwrap=document.getElementById('qwrap');
  
  if(!qs.length){
    empty.style.display='block';qwrap.style.display='none';
    document.getElementById('qcnt').textContent='0/0';
    document.getElementById('sbg').textContent='0 / 0';
    document.getElementById('spct').textContent='';
    return;
  }
  empty.style.display='none';qwrap.style.display='block';
  
  const q=qs[qi], k=K(round,subj,qi), isG=graded[k]!==undefined, a=ans[k];
  const hasAns = q.a > 0;
  
  document.getElementById('qrnd').textContent=`제${round} · ${subj}`;
  document.getElementById('qsbj').textContent=`제${q.n}번`;
  document.getElementById('qtxt').innerHTML=q.q.replace(/\n/g,'<br>');
  
  const qb=document.getElementById('qbox');
  if(q.d){qb.style.display='block';qb.textContent=q.d;}else{qb.style.display='none';}
  
  const MARKS=['①','②','③','④'];
  document.getElementById('choices').innerHTML=q.c.map((c,i)=>{
    let cl='ci'; const num=i+1;
    if(isG&&hasAns){
      cl+=' lk';
      if(num===q.a)cl+=' ok';
      else if(a===num)cl+=' ng';
    }else if(a===num)cl+=' sel';
    return `<div class="${cl}" onclick="pick(${num})"><span class="cn">${MARKS[i]}</span><span>${c}</span></div>`;
  }).join('');
  
  // No answer note
  const noAnsNote = document.getElementById('no-ans-note');
  noAnsNote.style.display = hasAns?'none':'block';
  
  const rb=document.getElementById('rb'),rt=document.getElementById('rt'),rm=document.getElementById('rm');
  if(isG&&hasAns){
    rb.style.display='block'; rb.className=graded[k]?'ok':'ng';
    rt.className=graded[k]?'ok':'ng';
    rt.textContent=graded[k]?'✓ 정답입니다!':'✗ 오답입니다';
    if(graded[k]){
      // 정답: 짧은 칭찬 + 해설 표시
      const exp = q.e && q.e.length > 5 ? q.e : '';
      rm.innerHTML = exp
        ? `<span style="color:var(--ok)">${exp}</span>`
        : `<span style="color:var(--muted)">잘 하셨습니다! AI 비서에게 더 자세한 해설을 요청해보세요.</span>`;
    }else{
      // 오답: 정답 표시 + 해설 영역
      const exp = q.e && q.e.length > 5 ? q.e : '';
      const savedExp = expCache[k] || '';
      if(savedExp){
        rm.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br>${savedExp}`;
      } else if(exp){
        rm.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br>${exp}`;
      } else {
        rm.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br><span class="exp-loading">🤖 AI 해설 불러오는 중...</span>`;
      }
    }
  }else{rb.style.display='none';}
  
  renderDots(); loadDraw();
}

function pick(num){
  const k=K(round,subj,qi);
  if(graded[k]!==undefined)return;
  ans[k]=num; renderQ();
}

function doGrade(){
  const qs=QS(); if(!qs.length)return;
  const k=K(round,subj,qi), q=qs[qi];
  if(!q.a){alert('이 문제는 정답 데이터가 없습니다. AI 비서에게 해설을 요청해보세요!');return;}
  if(ans[k]===undefined){alert('먼저 답을 선택해주세요!');return;}
  if(graded[k]!==undefined){alert('이미 채점된 문제입니다.');return;}
  const ok=ans[k]===q.a; graded[k]=ok; renderQ(); updateScore(); scheduleSave();
  if(!ok){ autoExp(q); }  // 오답이면 해설 로드 (AI패널 열지 않음)
}

function gradeAll(){
  const qs=QS(); if(!qs.length)return;
  let cnt=0, newWrong=[];
  qs.forEach((q,i)=>{
    const k=K(round,subj,i);
    if(ans[k]!==undefined && graded[k]===undefined && q.a>0){
      const ok=ans[k]===q.a; graded[k]=ok; cnt++;
      if(!ok) newWrong.push({q,i});
    }
  });
  if(!cnt){
    const allDone=qs.filter(q=>q.a>0).every((_,i)=>graded[K(round,subj,i)]!==undefined);
    alert(allDone?'모든 문제가 이미 채점되었습니다.':'먼저 답을 선택한 후 채점해 주세요.');
    return;
  }
  renderDots(); updateScore();
  // 첫 오답 또는 첫 미답 문제로 이동
  const firstWrong=qs.findIndex((_,i)=>graded[K(round,subj,i)]===false);
  const firstUnans=qs.findIndex((_,i)=>ans[K(round,subj,i)]===undefined);
  if(firstWrong>=0)qi=firstWrong;
  else if(firstUnans>=0)qi=firstUnans;
  renderQ();
  if(newWrong.length>0&&!aiOpen)toggleAI();
}

function updateScore(){
  const qs=QS();
  const total=qs.length;
  const gradedKeys=qs.map((_,i)=>K(round,subj,i)).filter(k=>graded[k]!==undefined);
  const okCnt=gradedKeys.filter(k=>graded[k]).length;
  const gTotal=gradedKeys.length;
  document.getElementById('sbg').textContent=`${okCnt} / ${total}`;
  if(gTotal>0){
    const pct=Math.round(okCnt/gTotal*100);
    document.getElementById('spct').textContent=`(채점 ${gTotal}문제 · ${pct}%)`;
  }else{
    document.getElementById('spct').textContent='';
  }
}

function prevQ(){if(qi>0){qi--;renderQ();}}
function nextQ(){const qs=QS();if(qi<qs.length-1){qi++;renderQ();}}
function goQ(i){qi=i;renderQ();scheduleSave();}

function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('aip').classList.toggle('open',aiOpen);
  document.getElementById('aibtn').classList.toggle('on',aiOpen);
}

function autoExp(q){
  const MARKS=['①','②','③','④'];
  addM(`📋 ${round} ${subj} ${q.n}번 오답 해설 요청`,'a');
  const prompt=`[원가분석사 기출 오답해설]\n회차: ${round} / 과목: ${subj} / 번호: ${q.n}번\n\n문제: ${q.q}\n\n보기:\n${q.c.map((c,i)=>`${MARKS[i]} ${c}`).join('\n')}\n\n정답: ${MARKS[q.a-1]} (${q.a}번)\n\n정답이 ${q.a}번인 이유와 오답 선지의 오류를 원가분석사 수험생 수준으로 핵심만 간결하게 설명해주세요.`;
  if(typeof sendPrompt==='function')sendPrompt(prompt);
  else addM('💡 채팅창에 직접 질문해 주세요!','a');
}

function sendAI(){
  const el=document.getElementById('ain');
  const t=el.value.trim(); if(!t)return; el.value='';
  ask(t);
}

function ask(text){
  const qs=QS(); const q=qs[qi];
  const ctx=q?`[${round} ${subj} ${q.n}번 문제 관련]\n문제: ${q.q}\n\n`:'';

  if(typeof sendPrompt==='function')sendPrompt(prompt);

// ===== CANVAS + UNDO/REDO + PASTE + LOCALSTORAGE =====
const LS_KEY = 'wonka_draws_v1';
const LS_STATE = 'wonka_state_v1';
let undoStack = {};   // {key: [dataURL, ...]}
let redoStack = {};   // {key: [dataURL, ...]}
const MAX_UNDO = 20;
let saveTimer = null;

// --- LocalStorage helpers ---
function lsSave(){
  try{
    // Save draws (compressed: only keys with data)
    const toSave = {};
    for(const [k,v] of Object.entries(draws)) if(v) toSave[k]=v;
    localStorage.setItem(LS_KEY, JSON.stringify(toSave));
    // Save app state (ans, graded, round, subj)
    const state = {ans, graded, round, subj, qi};
    localStorage.setItem(LS_STATE, JSON.stringify(state));
    showSaveBadge(true);
  } catch(e){
    showSaveBadge(false);
  }
}

function lsLoad(){
  try{
    const d = localStorage.getItem(LS_KEY);
    if(d){ Object.assign(draws, JSON.parse(d)); }
    const s = localStorage.getItem(LS_STATE);
    if(s){
      const st = JSON.parse(s);
      if(st.round && DB[st.round]) round = st.round;
      if(st.subj) subj = st.subj;
      if(st.qi !== undefined) qi = st.qi;
      if(st.ans) Object.assign(ans, st.ans);
      if(st.graded) Object.assign(graded, st.graded);
    }
  } catch(e){}
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(lsSave, 800);
  showSaveBadge(null); // saving...
}

function showSaveBadge(ok){
  const b = document.getElementById('save-badge');
  if(!b) return;
  if(ok===null){ b.textContent='💾 저장중...'; b.className='save-badge'; }
  else if(ok){ b.textContent='✅ 저장됨'; b.className='save-badge saved'; }
  else{ b.textContent='⚠️ 저장실패'; b.className='save-badge'; }
}

// --- UNDO / REDO ---
function pushUndo(){
  const k=K(round,subj,qi);
  const cvs=document.getElementById('cvs');
  if(!undoStack[k]) undoStack[k]=[];
  if(!redoStack[k]) redoStack[k]=[];
  undoStack[k].push(cvs.toDataURL());
  if(undoStack[k].length > MAX_UNDO) undoStack[k].shift();
  redoStack[k]=[];
  updateUndoButtons();
}

function undoDraw(){
  const k=K(round,subj,qi);
  if(!undoStack[k]||!undoStack[k].length) return;
  const cvs=document.getElementById('cvs');
  if(!redoStack[k]) redoStack[k]=[];
  redoStack[k].push(cvs.toDataURL());
  const prev = undoStack[k].pop();
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(prev && prev !== 'empty'){
    const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0); img.src=prev;
  }
  draws[k] = cvs.toDataURL();
  updateUndoButtons();
  scheduleSave();
}

function redoDraw(){
  const k=K(round,subj,qi);
  if(!redoStack[k]||!redoStack[k].length) return;
  const cvs=document.getElementById('cvs');
  if(!undoStack[k]) undoStack[k]=[];
  undoStack[k].push(cvs.toDataURL());
  const next = redoStack[k].pop();
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(next){
    const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0); img.src=next;
  }
  draws[k] = cvs.toDataURL();
  updateUndoButtons();
  scheduleSave();
}

function updateUndoButtons(){
  const k=K(round,subj,qi);
  const ub=document.getElementById('undobtn'), rb2=document.getElementById('redobtn');
  if(ub) ub.disabled=!undoStack[k]||!undoStack[k].length;
  if(rb2) rb2.disabled=!redoStack[k]||!redoStack[k].length;
}

// --- IMAGE PASTE ---
function initPaste(){
  document.addEventListener('paste', e=>{
    const items = e.clipboardData?.items;
    if(!items) return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        const blob = item.getAsFile();
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = ()=>{
          const cvs=document.getElementById('cvs');
          const ctx=cvs.getContext('2d');
          pushUndo();
          // Draw at top-left with max width 400px
          const maxW=Math.min(400, cvs.width*0.8);
          const scale=Math.min(1, maxW/img.width);
          const w=img.width*scale, h=img.height*scale;
          const x=(cvs.width-w)/2, y=80;
          ctx.drawImage(img,x,y,w,h);
          draws[K(round,subj,qi)]=cvs.toDataURL();
          scheduleSave();
          URL.revokeObjectURL(url);
        };
        img.src=url;
        showPasteHint();
        break;
      }
    }
  });
  // Show hint on cont focus/hover
  const cont=document.getElementById('cont');
  cont.addEventListener('click',()=>{
    if(tool!=='c') showPasteHint();
  });
}

function showPasteHint(){
  const h=document.getElementById('paste-hint');
  if(!h) return;
  h.classList.add('show');
  setTimeout(()=>h.classList.remove('show'), 2500);
}

// --- CANVAS INIT ---
function initCanvas(){
  const cvs=document.getElementById('cvs');
  const resize=()=>{
    const cont=document.getElementById('cont');
    const r=cont.getBoundingClientRect();
    const wrap=document.getElementById('qwrap');
    const newW=r.width, newH=Math.max(r.height,wrap.scrollHeight+40);
    if(cvs.width===newW && cvs.height===newH) return;
    // Preserve content during resize
    const tmp=cvs.toDataURL();
    cvs.width=newW; cvs.height=newH;
    loadDraw();
  };
  setTimeout(resize,200);
  new ResizeObserver(()=>setTimeout(resize,50)).observe(document.getElementById('cont'));

  let lastDrawEnd=0;
  cvs.addEventListener('pointerdown',e=>{
    if(tool==='c')return;
    drawing=true;
    pushUndo();
    const r=cvs.getBoundingClientRect(); lx=e.clientX-r.left; ly=e.clientY-r.top;
    e.preventDefault();
  });
  cvs.addEventListener('pointermove',e=>{
    if(!drawing)return;
    const r=cvs.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top;
    const ctx=cvs.getContext('2d');
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.lineCap='round'; ctx.lineJoin='round';
    if(tool==='e'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=sz*5;ctx.strokeStyle='rgba(0,0,0,1)';}
    else if(tool==='h'){ctx.globalCompositeOperation='source-over';ctx.lineWidth=sz*6;ctx.globalAlpha=0.25;ctx.strokeStyle=col;}
    else{ctx.globalCompositeOperation='source-over';ctx.lineWidth=sz;ctx.globalAlpha=1;ctx.strokeStyle=col;}
    ctx.stroke(); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    lx=x; ly=y;
  });
  const endDraw=()=>{
    if(!drawing) return;
    drawing=false;
    saveDraw();
    scheduleSave();
  };
  ['pointerup','pointerleave'].forEach(ev=>cvs.addEventListener(ev,endDraw));
}

function setTool(t){
  tool=t;
  ['c','p','h','e'].forEach(id=>{const el=document.getElementById('t-'+id);if(el)el.className='tb';});
  const el=document.getElementById('t-'+t);
  if(el)el.className=t==='h'?'tb hl':'tb on';
  document.getElementById('cvs').style.pointerEvents=t==='c'?'none':'all';
}
function setCol(c,el){col=c;document.querySelectorAll('.cd').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');}
function setSz(v){sz=parseInt(v);document.getElementById('szl').textContent=v;}
function saveDraw(){const k=K(round,subj,qi);draws[k]=document.getElementById('cvs').toDataURL();}
function loadDraw(){
  const k=K(round,subj,qi), cvs=document.getElementById('cvs'), ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(draws[k]){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=draws[k];}
  updateUndoButtons();
}
function clearDraw(){
  if(!confirm('이 문제의 필기를 모두 지우시겠습니까?')) return;
  const k=K(round,subj,qi);
  pushUndo();
  delete draws[k];
  delete undoStack[k];
  delete redoStack[k];
  const cvs=document.getElementById('cvs');
  cvs.getContext('2d').clearRect(0,0,cvs.width,cvs.height);
  updateUndoButtons();
  scheduleSave();
}

// keyboard undo/redo
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undoDraw();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redoDraw();}
});

// ===== AI ASSISTANT =====
async function autoExp(q){
  const MARKS=['①','②','③','④'];
  const k = K(round,subj,qi);

  // 이미 캐시된 해설이 있으면 스킵
  if(expCache[k]) return;

  // 오답 박스의 rm 영역에 로딩 표시
  const rm = document.getElementById('rm');
  if(rm){
    rm.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br><span class="exp-loading">🤖 AI 해설 불러오는 중...</span>`;
  }

  const prompt=`원가분석사 시험 오답 해설을 해주세요.

과목: ${subj} / ${round} ${q.n}번

문제: ${q.q}

보기:
${q.c.map((c,i)=>`${MARKS[i]} ${c}`).join('\n')}

정답: ${MARKS[q.a-1]}번 (${q.a}번)

[요청사항]
- 정답이 ${q.a}번인 이유를 핵심 위주로 설명
- 틀린 선지(특히 내가 고른 오답)가 왜 틀렸는지 간략히 설명
- 원가분석사 수험생 눈높이로 4~6줄 이내로 간결하게`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('') || '';

    if(text){
      // 캐시에 저장
      expCache[k] = text;
      // 오답 박스에 표시
      const rm2 = document.getElementById('rm');
      if(rm2 && graded[k]===false){
        rm2.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br>${text.replace(/\n/g,'<br>')}`;
      }
    } else {
      throw new Error('empty response');
    }
  } catch(err) {
    // API 실패 시 sendPrompt fallback
    const rm2 = document.getElementById('rm');
    if(rm2 && graded[k]===false){
      rm2.innerHTML=`<strong style="color:var(--ng)">정답: ${MARKS[q.a-1]}번</strong><br><br>
        <span style="color:var(--muted);font-size:12px;">해설을 불러오지 못했습니다.<br>
        아래 <b>AI 비서 버튼</b>을 눌러 해설을 요청해보세요.</span>
        <br><br><button onclick="requestExpManual()" style="padding:6px 14px;border-radius:8px;background:var(--acc2);color:#fff;border:none;cursor:pointer;font-size:12px;font-family:inherit;">🤖 AI 비서에게 해설 요청</button>`;
    }
    // sendPrompt fallback
    if(typeof sendPrompt==='function'){
      sendPrompt(`[원가분석사 오답해설 요청]\n${round} ${subj} ${q.n}번\n\n문제: ${q.q}\n보기: ${q.c.map((c,i)=>`${MARKS[i]} ${c}`).join(' / ')}\n정답: ${MARKS[q.a-1]}번\n\n정답 이유와 오답 이유를 간결하게 설명해주세요.`);
    }
  }
}

// 수동으로 해설 요청하는 함수 (API 실패 시 버튼에서 호출)
function requestExpManual(){
  const qs=QS(); if(!qs.length) return;
  const q=qs[qi];
  const MARKS=['①','②','③','④'];
  const prompt=`[원가분석사 오답해설]\n${round} ${subj} ${q.n}번\n\n문제: ${q.q}\n보기: ${q.c.map((c,i)=>`${MARKS[i]} ${c}`).join(' / ')}\n정답: ${MARKS[q.a-1]}번\n\n정답 이유와 오답 이유를 간결하게 설명해주세요.`;
  if(typeof sendPrompt==='function') sendPrompt(prompt);
  if(!aiOpen) toggleAI();
}

function sendAI(){
  const el=document.getElementById('ain');
  const t=el.value.trim(); if(!t)return; el.value='';
  ask(t);
}

function ask(text){
  const qs=QS(); const q=qs[qi];
  const ctx=q?`[${round} ${subj} ${q.n}번 문제 관련]\n문제: ${q.q}\n\n`:'';
  addM(text,'u');
  const prompt=`${ctx}질문: ${text}\n\n원가분석사 시험 관련 내용을 수험생 눈높이에 맞게 명확하게 설명해주세요.`;
  if(typeof sendPrompt==='function'){
    sendPrompt(prompt);
  } else {
    addM('💡 Claude.ai 채팅창에 위 질문을 입력해 주세요.','a');
  }
}

function addM(txt,role){
  const c=document.getElementById('aims');
  const d=document.createElement('div');
  d.className=`ab ${role}`;
  d.innerHTML=txt;
  c.appendChild(d); c.scrollTop=99999;
}

// ===== RESET FUNCTIONS =====
function resetThisQ(){
  const qs=QS(); if(!qs.length) return;
  const k=K(round,subj,qi);
  if(ans[k]===undefined && graded[k]===undefined){
    alert('선택된 답변이 없습니다.'); return;
  }
  if(!confirm('이 문제의 선택 답변과 채점 결과를 초기화할까요?')) return;
  delete ans[k];
  delete graded[k];
  delete expCache[k];
  renderQ(); renderDots(); updateScore(); scheduleSave();
}

function resetAllQ(){
  const qs=QS(); if(!qs.length) return;
  const hasAny = qs.some((_,i)=>{
    const k=K(round,subj,i);
    return ans[k]!==undefined || graded[k]!==undefined;
  });
  if(!hasAny){ alert('초기화할 답변이 없습니다.'); return; }
  if(!confirm(`[${round} ${subj}] 전체 답변과 채점 결과를 초기화할까요?
필기는 유지됩니다.`)) return;
  qs.forEach((_,i)=>{
    const k=K(round,subj,i);
    delete ans[k];
    delete graded[k];
    delete expCache[k];
  });
  qi=0;
  renderQ(); renderDots(); updateScore(); scheduleSave();
}

// ===== INIT =====
// Load saved data FIRST before initUI
lsLoad();
initUI(); renderDots(); renderQ(); initCanvas(); setTool('c'); updateScore();
initPaste();
showSaveBadge(true);
</script>
