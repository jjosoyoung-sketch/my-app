비를 제외한 모든 제조원가를 말한다.","간접재료비는 포함되나 간접노무비는 포함되지 않는다.","간접노무비는 포함되나 간접재료비는 포함되지 않는다."],3],[7,"가공비에 대한 설명으로 맞는 것은?",["직접재료비와 직접경비를 포함한 원가이다.","직접노무비와 제조간접비를 합계한 것이다.","직접재료비와 직접노무비를 합계한 것이다.","제품의 판매활동과 관련된 원가를 말한다."],1],[8,"다음 중 특정원가대상의 추적가능성에 따른 원가분류는?",["변동비와 고정비 ② 통제가능원가와 통제불능원가 ③ 제품원가와 기간원가","직접비와 간접비","주요재료비","보조재료비"],4],[10,"보조부문원가를 제조부문에 배부하는 방법에 속하지 않는 것은?",["단계배부법","직접배부법","상호배부법","간접배부법"],3],[11,"활동기준원가에 대한 설명으로 맞는 것은?",["소품종 대량생산체계에 적합하다.","원가를 원가대상에 직접 추적하는 원가계산방법이다.","제조간접비의 비중이 증가하는 상황에서 개발된 원가계산방법이다.","각 제품이 자원을 소비하므로 제품의 생산량에 비례하여 제조간접원가가 발생한다."],3],[12,"㈜서울은 최초투자로 \\1,000,000인 기계를 도입하려고 한다. 이 기계의 내용연수는 5년이고 잔존가치는 없다. 감가상각은 정액법을 사용한다. 기계도입으로 인한 연평균 현금유입액은 \\500,000으로 추정한다. 이 투자에 대한 회계적 이익률을 구하고, 기업의 목표 이익률이 25%일 경우 회계적 이익률법에 의한 투자여부 를 판단하시오! 단, 세금은 고려하지",["50%-채택","30%-채택","20%-기각","15%-기각"],2],[13,"다음의 자본예산모형 중 재무제표의 자료를 그대로 이용하여 투자안의 채택여부를 결정할 수 있는 것은?",["회수기간법","회계적이익률법","내부수익률법","순현재가치법"],1],[14,"다음은 부품의 자가제조와 관련된 의사결정을 할 때, 고려할 내용들이다. 올바르지 않은 것은?",["외부구입원가","회피불능원가","증분원가","기회원가"],4],[15,"다음은 원가기준 가격결정방법에 대한 설명이다. 올바르지 않은 것은?",["제품원가는 제품가격의 상한선 역할을 한다.","적용하기가 복잡하지 않고 간편하다.","제품원가방법은 가격결정의 정당성을 확보한다.","외부보고용 재무제표작성에 유용한 원가정보를 제공한다."],3],[16,"다음은 책임회계에 대한 내용이다. 올바르지 못한 설명은?",["원가와 수익의 통제를 주된 목적으로 한다.","기능별․제품별로 원가를 집계한다.","책임중심점별로 원가를 집계하고 평가한다.","통제가능성에 따른 원가분류를 한다."],3],[18,"다음 중 예산의 순기능으로 볼 수 없는 것은?",["미래계획에 대한 기초자료를 제공한다.","하위경영자가 상위경영자의 의사를 파악할 수 있다.","문제의 해결방안을 제시한다.","조직 간의 동기유발로 경쟁을 격화시킨다."],3],[19,"다음은 종합예산편성순서이다. 순서에 맞게 배열한 것은? ㉠ 예산손익계산서 작성 ㉡ 판매 예산편성 ㉣ 매출원가 예산편성 ㉤ 예산재무상태표의 작성",["㉡-㉢-㉣-㉠-㉤","㉡-㉢-㉠-㉣-㉤","㉢-㉡-㉣-㉠-㉤","㉢-㉣-㉡-㉠-㉤"],4],[20,"다음 중 표준원가제도 유용성에 대한 올바른 설명이 아닌 것은?",["생산부서나 구매부서의 성과관리 지표로 활용할 수 있다.","제품원가계산이 신속하게 이루어질 수 있다.","제조기술 향상에 도움을 주어 생산성을 향상시킨다.","제조원가의 절감을 유도할 수 있다."],4],[21,"변동원가계산과 전부원가계산에 있어 그 특징을 설명한 것 중에서 올바르지 못한 것은?",["변동원가계산은 생산량조절에 따른 이익조정을 방지할 수 있다.","변동원가계산제도에서는 재고자산의 가치가 낮게 평가된다.","전부원가계산제도는 원가포괄개념에 근거하고 있다.","전부원가계산은 원가회피개념에 근거하고 있다."],1],[22,"다음은 초변동원가계산에 대한 내용이다. 개념과 거리가 먼 것은 어느 것인가?",["재고의 증가는 이익의 감소를 가져온다.","직접재료원가만 제품원가로 처리한다.","직접노무원가를 제외한 모든 고정비는 당기비용처리한다","영업이익은 변동원가계산의 영업이익과 다르게 나타난다."],1]],"제조원가실무":[[1,"다음 중 일반적으로 제조원가에 포함되지 않는 것은 어느 것인가?",["판매수수료","보조재료비","공장건물에 대한 임차료","간접노무비"],1],[2,"다음의 원가계산방법에 대한 설명 중 틀린 것은 어느 것인가?",["실제원가계산은 직접재료비, 직접노무비, 제조간접비를 실제원가로 측정하는 방법이다.","정상원가계산은 직접재료비는 실제원가로 측정하고, 직접노무비와 제조간접비를 합한 가공원가는 예정","표준원가계산은 직접재료비, 직접노무비, 제조간접비를 표준원가로 측정하는 방법이다.","원가의 집계방식에 따라 제품원가를 개별 작업별로 구분하여 집계하는 개별원가계산과 제조공정별로"],2],[3,"인플레이션 시 재료비결정에서 사용되는 원가흐름가정에서 재료비 소비가격이 낮게 계상되고 기말 재고액이 높게 평가되는 방법은 어느 것인가?",["선입선출법","후입선출법","총평균법","이동평균법"],1],[4,"다음 중 공손에 대한 설명으로 틀린 것은 어느 것인가?",["공손품이란 정상품에 비해 품질이나 규격이 미달되는 불합격품을 말한다.","공손은 정상공손과 비정상공손으로 이루어진다.","비정상공손 원가는 영업외비용으로 처리한다.","기말재공품이 검사시점을 통과한 경우에는 정상공손원가는 완성품에만 배분한다."],4],[5,"㈜ 중앙의 10월달 매출액은 500,000원이다. 직접재료원가가 200,000원이고 직접노무원가가 100,000원 이다. 간접원가는 기본원가(prime cost)의 40%이다. 10월달 이익은 얼마인가? (단 모든 재고는 없다.)",["70,000원","75,000원","80,000원","85,000원"],3],[6,"다음 중 결합원가계산에 대한 설명으로 틀린 것을 고르시오.",["분리점이란 연산품들이 개별적으로 식별되는 점을 말한다. 이 분리점 이후에 발생한 제조원가를 결합","연산품이란 동일한 투입원료로부터 동시에 생산되는 2개 이상의 이종제품을 말한다.","작업폐물은 가공 중에 발생한 투입재료의 잔유물로서 시장가치의 유무에 관계없이 추가적인 가공","부산품은 주산품의 제조과정에서 부수적으로 생산되는 제품으로서 매각가치 또는 이용가치가 있는"],1],[7,"(주)한산상회는 집중호우로 보관 중이던 상품 ￦10,000,000이 파손되었다. 이 제품을 파손된 상태에서 처분하면 ￦800,000에 처분가능하나, 회사는 ￦300,000을 들여 파손부분을 수선하여 ￦2,000,000에 처 분하기로 하였다. 수선 후 처분에 따른 기회비용은 얼마인가?",["￦300,000","￦800,000","￦1,700,000","￦2,000,000"],2],[8,"제조간접비 과소배부액을 매출원가법과 원가요소비례법으로 정리하는 경우에 대한 설명으로 가장 옳지 않은 것은 어느 것인가?",["재무상태표상의 자본은 원가요소비례법이 더 크게 계상된다.","당기순이익은 원가요소비례법이 매출원가법에 비하여 더 크게 계상된다.","원가요소비례법이 매출원가법보다 매출원가가 더 크게 계상된다.","원가요소비례법을 적용하는 경우가 재무상태표상의 자산이 더 크게 계상된다."],3],[9,"활동기준원가계산(ABC: activity based costing)에 대한 설명 중에서 가장 적절하지 못한 것은 어느 것인가?",["전통적인 원가배분방법과 비교하여 원가집합과 원가동인의 수가 감소되므로 보다 효율적으로 원가를","활동에 대한 정보를 제공함으로써 원가정보뿐만 아니라 관리회계 목적의 정보도 제공할 수 있다","원가의 발생에 있어서 다양한 원가유발요인을 인식하므로 보다 적정한 가격결정에 이용할 수 있다.","활동분석을 통하여 비부가 가치 활동을 제거하거나 감소시킴으로서 생산시간을 단축할 수 있다."],1],[10,"다음 중 원가차이분석의 설명으로 옳지 않은 것은 어느 것인가?",["가격차이 = 실제수량 × (실제가격 - 표준가격)","능률차이 = 표준가격 × (실제소비량 - 표준소비량)","임률차이 = 실제작업시간 × (실제임률 - 표준임률)","실제가 표준보다 많으면 유리한 차이"],4],[11,"원가계산을 할 때 보조부문은 제조부문의 제조활동에 필요한 용역을 제공하기 때문에 보조부문의 원가는 제조부문에 배부되어야 한다. 이때 이상적인 배부기준은 논리적이고 보조부문 원가발생과 높은 상관관계가 있으며 쉽게 배부될 수 있어야 한다. 일반적으로 널리 사용되는 배분기준으로서 가장 적당 하지 않은 것은? - 57 -",["건물관리부문 - 면적(㎡)","공장인사관리부문 - 종업원 인원수","수선유지부문 - 작업시간","동력부문 - 종업원 인원수"],4],[12,"아래와 같은 최근 생산실적을 기준으로 노무공수를 산출하면(소수점이하 둘째자리 절사) 제품단위당 노무공수는 몇 Hr인가? - 최근 생산실적 자료(2016년 연간) ○ 당기 제품생산량 : 2,000개 ○ 기초재공품 수량 : 300개(공정율 50%) ○ 기말재공품 수량 : 200개(공정율 50%) ○ 당기 총작업시간 : 25,500Hr",["12.75Hr","12.43Hr","12.14Hr","11.33Hr"],2],[13,"다음은 A사가 직접 구입한 재료에 관한 비용자료이다. 구입실적비용을 기준으로 정부회계기준에 따 라 재료단가를 적용할 경우 직접재료의 단가는 얼마인가? ○ 직접재료 구입수량 : 1,500㎏ ○ 직접재료 1,500㎏에 대한 발생비용 ㆍ재료대금 : 3,630,000원 ㆍ재료구입 시 발생비용(운임, 보험료) : 297,000원 ㆍ재료구입 후 부대비용(운송비, 하역",["2,200원","2,218원","2,380원","2,637원"],3],[14,"다음 중 고정원가를 가장 올바르게 설명한 것은 어느 것인가?",["관련범위 내에서 조업도의 변동에 관계없이 총원가가 일정하게 발생하는 원가","관련범위 내에서 원가총액이 일정하게 변동하는 원가","관련범위 내에서 조업도의 변동에 따라 직접적으로 비례하여 증감하는 원가","관련범위 내에서 조업도의 변동에 관계없이 단위당 금액이 일정한 원가"],1],[15,"조업도가 0인 경우에도 일정한 원가가 발생하고, 조업도의 증가에 따라 총원가가 비례적으로 증가 하는 원가는 무엇인가?",["고정원가","변동원가","단계원가","혼합원가"],4],[16,"원가회계는 성격에 따라 외부보고용 재무제표의 작성을 위한 원가회계(A)와 경영관리적 측면에 보다 유용한 원가회계(B)로 크게 구분할 수 있다. A, B를 순서대로 가장 알맞게 짝지은 것은? - 58 - A B A B",["개별원가계산 - 전부원가계산","전부원가계산 - 표준원가계산","변동원가계산 - 종합원가계산","정상원가계산 - 표준원가계산"],2],[17,"개별원가계산의 제조간접비와 관련한 설명이다. 가장 옳지 않은 것은 어느 것인가?",["제조간접비 배부방법 중 실제배부법은 제조간접비 실제발생 총액이 집계되어야 하므로 원가계산시점","재료비는 직접 추적 가능한 원가이므로 제조간접비 배부대상이 되지 아니한다.","제조간접비 배부차이는 처리방법에 따라 영업외손익으로도 반영이 가능하다.","제조간접비의 예정배부액이 실제발생액보다 큰 경우에는 과다배부로 유리한 차이를 가져온다."],2],[18,"다음 중 보조부문의 원가배부방법 중에서 상호배부법에 관한 설명으로만 구성된 것은 어느 것인 가? ㉠ 보조부문 상호간의 용역을 고려하지 않는다. ㉡ 보조부문원가의 배부순서가 미리 정해져 있어야 한다. ㉢ 보조부문원가의 배부순서를 고려하지 않는다. ㉣ 이론적으로 가장 타당한 방법이다.",["㉠, ㉡","㉡, ㉢","㉢, ㉣","㉣, ㉠"],3],[19,"다음 중에서 제조원가명세서 항목에 나타나지 않는 항목은 어느 것인가?",["원재료 매입액","기초 제품재고액","제조공정의 노무비 발생액","기말 재공품재고액"],2],[20,"다음 자료에 의할 때 제조원가에 포함되는 금액은 얼마인가? ㆍ간접재료비 ￦100,000 ㆍ공장보험료 ￦20,000 ㆍ영업사원 급료 ￦15,000 ㆍ제조 외부가공비 ￦13,000 ㆍ본사건물보험료 ￦5,000 ㆍ공장장 급료 ￦10,000",["￦163,000","￦148,000","￦143,000","￦133,000"],3]],"공사기타원가":[[1,"대한건설협회에서 발표하는 시중노임단가(건설업 임금 실태조사)의 적용 시기는 다음 중 어느 것인 가?",["1월 1일 , 6월 1일","1월 1일 , 7월 1일","1월 1일 , 8월 1일","1월 1일 , 9월 1일"],4],[2,"국토교통부 고시 “사회보험의 보험료 적용기준” 에 의거하면 건강보험료, 연금보험료, 노인장기요양 보험료는 공사기간이 얼마 이상인 건설공사에 적용되는가?",["1일","1개월","6개월","1년"],1],[3,"다음 중 공사원가계산을 할 때에 일반관리비를 산출하는 산식은 어느 것인가?",["(재료비+노무비+경비) × 일반관리비율","(노무비+경비) × 일반관리비율","(재료비+노무비) × 일반관리비율","(재료비+경비) × 일반관리비율"],3],[4,"다음 중 공사기간 연장에 따른 간접비 산정 시 계상되지 않는 항목은 어느 것인가?",["간접노무비","산재보험료","건강보험료","일반관리비"],1],[5,"다음 빈칸에 알맞은 용어는 무엇인가? “( )이란 예정가격을 결정하기 위하여 조사한 거래실례가격, 원가계산가격, 감정가격 및 견적가격 등에 부가가치세 등을 합산하여 작성한 가격으로서 계약담당공무원이 입찰자의 입찰금액 산정의 편의를 제공하고 예비가격 작성의 기준금액으로서 입찰일 전에 입찰자에게 발표하는 금액을 말한다.”",["기초금액","조사금액","추정금액","설계금액"],2],[6,"다음 중 설계변경 사유로 볼 수 없는 경우는 어느 것인가?",["신기술, 신공법","표준품셈의 적용 오류","현장상태와 설계서의 상이","설계서의 불분명, 누락, 오류 및 설계서 상호간의 모순"],4],[7,"물가변동으로 인한 계약금액 조정방법 중 품목조정율을 산출하기 위하여는 먼저 등락율과 등락폭을 산정하게 된다. 산출내역서상 특정품목의 가격등락이 다음과 같을 때 동 품목의 등락폭을 산출하면 - 53 - 얼마인가?",["1,800원","1,700원","1,600원","1,000원"],4],[8,"기획재정부 계약예규 예정가격작성기준에 따른 공사원가 구성체계의 설명 중 틀린 것은 어느 것인가?",["순공사원가는 재료비, 노무비, 경비로 이루어진다.","경비의 대표적 항목은 전력비, 수도광열비, 환경보전비 등이 있다.","일반관리비는 총 원가에 속한다.","공사손해보험료는 경비에 속한다."],4],[9,"공공 공사에서 설계변경으로 인한 계약금액조정 시 발주기관이 설계변경을 요구한 경우의 조정기준 으로 틀린 것은 어느 것인가?",["증가된 물량 또는 신규비목의 단가는 상호 협의한다.","감소된 물량에 대해서는 계약단가를 적용한다.","계약당사자간 협의가 이루어지지 아니하는 경우에는 계약단가를 적용한다.","계약상대자의 책임 없는 사유로 인한 경우는 발주기관이 요구한 경우의 기준에 따른다."],1],[10,"기획재정부 계약예규 “공사계약 일반조건”에 따르면 “설계서”에 해당하지 않는 것은 다음 중 어느 것인가?",["공사시방서","설계도면","현장설명서","단가산출서"],4],[11,"다음 중 정부발주공사의 공사기간 연장으로 인한 간접비관련 설명으로 바른 것은?",["3개월 평균임금을 분석하여 추후 산정금액을 예상하여 산정한다.","간접비 산정시 연장된 기간만큼의 금융비용도 함께 청구하여야 한다.","장기계속공사의 경우 청구할 수 있는 근거가 없다.","실비로 산정하는 것이 기본 방식이다."],2],[12,"다음 중 기계손료에 해당하지 않는 것은 어느 것인가?",["유류비","상각비","정비비","관리비"],2],[14,"노인장기요양보험료를 산출하기 위하여는 다음 중 어떤 비목에 노인장기요양보험료요율을 곱하여야 하는가?",["산재보험료","자동차보험료","국민건강보험료","노인장기요양보험료"],1],[15,"다음 각 재료의 수량산출 단위로 적정하지 않은 것은 어느 것인가?",["철근 - ton(무게)","거푸집 - ㎡(면적)","콘크리트 - ㎥(체적)","벽돌 - ton(무게)"],4],[16,"다음 중 정미량 및 소요량에 대한 설명으로 맞는 것은 어느 것인가?",["소요량 = 정미량 × 할증율","정미량은 자재 발주시 기준이 된다.","소요량은 공임의 기준이 된다.","소요량은 도면치수를 그대로 산출한 수치이다."],4],[17,"다음 중 개발비용의 산정에 포함되지 않는 비용은 어느 것인가?",["순공사비","조사비 및 설계비","해당토지의 개량비, 제세공과금, 보상비 등","국가나 지방자치단체에 공공시설이나 토지 등을 기부체납 또는 제공한 비용"],4],[18,"물가변동, 설계변경, 기타 계약내용변경에 의한 계약금액 조정신청기한은 계속비공사의 경우( 까지, 장기계속공사의 경우 ( 터 ( ) )까지 이며, 계약담당공무원은 계약금액조정 청구를 받은 날부 ) 이내 계약금액을 조정하여야 한다. ( ) 알맞은 말로 짝지어진 것은?",["준공대가 수령 전, 각 차수별 준공대가 수령 전, 20일","준공검사 전, 차수계약 준공검사 전, 30일","준공 전, 차수계약 준공 전, 20일","준공대가 수령 전, 각 차수별 준공대가 수령 전, 30일"],1],[19,"다음 중 물가변동으로 인한 계약금액 조정에서 ‘입찰일’의 의미는 어느 것인가?",["입찰개시일","입찰마감일","입찰개시일과 마감일의 중간일","입찰마감일의 익일"],3],[20,"다음 중 원가계산에 있어서 경비의 개념으로 맞는 것은 어느 것인가?",["일반관리비가 포함된다.","재료비에 포함되는 원가","직접산출경비와 기타경비 등이 있다.","공사의 시공을 위하여 소요되는 공사원가 중 노무비를 제외한 금액"],2],[21,"다음 중 관련법에 따라 정산하는 공사비 항목이 아닌 것은 어느 것인가?",["국민건강보험료","국민연금보험료","산업안전보건관리비","이윤"],2]],"제도및법규":[[1,"다음은 정부조달에서 전자입찰 및 계약체결과 관련하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["입찰자가 입찰서를 제출할 때에는 원칙적으로 국가종합전자조달시스템(G2B)을 이용하여 입찰서를","입찰공고를 할 때에도 원칙적으로 국가종합전자조달시스템(G2B)을 이용하여 공고하여야 한다.","계약체결은 원칙적으로 낙찰통지를 받은 후 10일 이내에 하여야 한다.","정부계약은 예외 없이 서면으로 계약서를 작성하여야 한다."],4],[2,"국제입찰 대상여부를 판단하는 기준으로 삼기 위하여 예정가격이 결정되기 전에 국가계약법 시행령 제7조의 규정에 의하여 산정된 가격/금액은 무엇인가?",["고시금액","추정금액","고시가격","추정가격"],2],[3,"다음은 국가기관이 운영하는 공동도급계약제도에 관한 설명이다. 바르지 않게 기술된 것은?",["계약담당공무원은 계약의 목적, 성질상 공동계약에 의하는 것이 부적절하다고 인정되는 경우를 제외","시공능력, 실적, 기술보유여부 등에서 상대적으로 열위에 있는 중소업체의 수주기회를 확대하기 위해","공동계약은 계약담당공무원과 공동수급체 구성원 중 대표자만 계약서에 기명·날인 또는 서명하여","지식기반사업 중 수 개의 전문분야가 요구되는 복합사업에 입찰참가자가 공동으로 참가하고자 하"],1],[4,"다음은 정부공사입찰에 있어 현장설명제도에 관한 사항이다. 올바르지 않은 것은?",["실제 공사현장에서 입찰참가자의 적정한 시공을 위하여 이행내용, 입찰시 숙지사항 등을 설명","현장설명에 참가하지 않은 자는 입찰에 참가할 수 없도록 규정되어 있다.","현장설명 실시 여부는 공사의 성질, 규모 등을 고려하여 발주기관이 판단하는 것이 원칙이다.","현장설명에 참가하는 자는 소정의 국가기술자격수첩을 제시하여야 하며, PQ를 실시하는 공사의"],3],[5,"현행 적격심사낙찰제의 내용 및 문제점 등에 대한 다음 설명사항 중 잘못 기술된 사항은?",["최저가낙찰제의 저가입찰로 인한 부실공사 방지를 위해 가격이외에 업체의 계약이행능력도 함께 심사","계약이행능력에 대한 평가는 시공경험, 기술능력, 시공평가 결과, 경영상태, 신인도 등이 주요 평","계약이행능력 평가에 대한 변별력 작용으로 실적·기술 우위의 업체가 선정되고 있는 편이다.","100억 원 이상은 92점, 100억 미만은 95점 이상이어야 낙찰자로 결정한다."],1],[6,"“국가계약법”의 성격에 관한 설명 중 바르지 않게 설명한 것은 ?",["일부 공법성격의 규정은 있으나 기본적으로 사법성격의 법규이다.","일부 일반 국민을 기속하는 규정은 있으나 기본적으로 국가의 내부관계를 규율해 놓은 훈시적 성격","국가가 일방당사자가 되어 공사 등의 계약을 체결할 때 적용되는 법이다.","국가가 일방당사자가 아닌 경우에는 국가계약법을 준용하여서도 아니 된다."],2],[7,"다음은 정부계약에서 부정당업자에 대한 입찰참가자격 제한조치와 관련하여 설명해 놓았다. 그 중 바르지 않게 설명한 것은?",["입찰참가자격 제한조치권자는 각 중앙관서의 장이 된다.","입찰참가자격 제한조치에 대한 불복에 대해서는 민사소송 절차를 따른다.","입찰참가자격의 제한을 받은 자가 법인이나 단체인 경우에는 그 대표자에게도 제한조치를 한다.","입찰참가자격 제한조치를 할 때에는 그 제한기준, 기간, 적용대상 등에 대해 확대 또는 유추해석"],1],[8,"다음 중 경쟁 입찰 후 수의계약이 가능한 경우가 아닌 것은 ?",["1차 경쟁 입찰을 하였으나 입찰자가 1인뿐인 경우","재공고시 입찰자 또는 낙찰자가 없을 경우","낙찰자가 계약을 체결하지 아니한 경우","낙찰자가 계약체결 후 계약을 해제한 경우"],4],[9,"다음 중 물품, 용역계약 추진 시 협상에 의한 계약대상과 관련이 적은 것은?",["전문성","시중성","기술성","긴급성"],3],[10,"다음 중 국가계약의 특성에 관하여 옳지 않게 설명한 것은 어느 것인가?",["원칙적으로 국가가 사인의 지위에 서서 사경제주체로서 행하는 사법상의 법률행위이다","민법의 기본원리가 적용된다.","국가계약과 관련된 다툼은 예외 없이 모두 민사소송 대상이다.","요식계약 형태가 원칙이다."],4],[12,"다음은 입찰참가 및 입찰서 작성과 관련하여 설명해 놓았다. 틀리게 설명한 것은?",["입찰참가신청을 한 자이어야 입찰에 참가할 수 있다.","입찰서의 입찰자란에는 반드시 대표자 성명을 기재하여야 한다.","입찰서는 1인이 2통 이상을 제출하여도 무방하다.","입찰자는 원칙적으로 제출한 입찰서를 교환·변경 또는 취소하지 못한다."],1],[13,"입찰보증금과 계약보증금의 공통점과 상이점에 대해 설명해 놓은 것 중 틀리게 설명한 것은?",["입찰보증금과 계약보증금 모두 입찰 전에 납부하여야 한다.","입찰보증금과 계약보증금 모두 그 납부를 면제할 수 있는 사유가 있다.","입찰보증금과 계약보증금 모두 그 성격은 손해배상액의 예정성격이라 할 수 있다.","입찰보증금과 계약보증금 모두 현금이나 보증기관 등의 보증서로 납부할 수 있다."],3],[14,"계약을 체결하게 되면 선금을 지급하게 된다. 선금지급과 관련하여 설명한 것 중 바르지 않게 설명 한 것은?",["선금은 물품구매계약의 경우도 지급대상이 된다.","부정당업자 제재기간 중에 있는 자애 대해서는 선금지급을 배제한다.","계약규모에 따라 일정률 금액은 의무적으로 지급토록 하고 있다.","선금 지급 후 기성대가 지급 시 정산하게 된다."],3],[15,"다음 중 공동도급의 입찰 및 계약과 관련하여 틀리게 설명한 것은?",["공동계약체결 시 공동수급체 대표자만 계약서에 기명하고 날인 또는 서명한다.","공동수급체 구성원 간에는 하도급이 허용되지 않는다.","공동도급계약을 체결한 후 원칙적으로 공동수급체 구성원의 출자비율 또는 분담내용을 변경할 수","우리나라는 지역의무 공동도급제도를 운영하고 있다."],4],[16,"다음 중에서 공사계약에서의 하자보수와 관련하여 설명한 것 중 바르지 않는 것은? - 62 -",["하자보수책임은 시공 상의 하자에 대해 보수할 책임이 있다.","하자보수보증금은 하자담보책임기간이 종료된 후에는 계약상대자의 청구에 의하여 반환한다.","장기계속공사는 예외 없이 총 공사계약금액에 대하여 하자보수보증금을 납부하여야 한다.","하자담보책임기간은 공사의 종류에 따라 1년 이상 10년 이하의 범위에서 정해지고 있다"],1],[17,"다음 중에서 국제조달과 관련하여 틀리게 설명한 것은?",["우리나라는 한미 FTA(자유무역협정) 정부조달협정(GPA)에 가입되어 있다.","우리나라는 WTO(세계무역기구) 정부조달협정(GPA)에 가입되어 있다.","우리나라의 국제입찰 대상기관은 우리나라가 임으로 정하면 된다.","국제입찰 시에는 내국민대우 등 호혜의 원칙이 적용된다."],4],[18,"다음의 국가계약법령과 하위규정과의 관계에 대해 설명한 것 중 바르지 않은 것은?",["국가계약에 관한 법령으로는 국가계약법, 동법 시행령 및 시행규칙 등이 있다.","국가계약법령의 하위규정으로는 행정규칙 성격의 예규, 고시, 훈령 등이 있다.","계약예규, 고시 등은 국가계약법령을 보완하는 기능을 한다.","계약예규, 고시 등의 내용이 국가계약법령에 위배되어도 무방하다."],4],[19,"예정가격결정시 고려사항이 아닌 것은 ?",["이행전망","수급상황","계약조건","면세대상"],2],[20,"다음 중 입찰보증금의 납부면제 대상이 아닌 것은?",["국가기관 및 지방자치단체","공공기관 입찰에 참여한 사단법인","정부가 50 / 100 이상 출연기관","농협협동조합법에의한 조합공동사업법인"],3],[21,"다음은 공사원가계산 비목 중 경비의 세 비목에 관한 설명으로서 정부원가계산 기준에 타당하지 않 은 것은?",["운반비란 거래운임, 하역비, 운송보험료 등 재료구입과 관련되는 비용은 재료비에 포함하고 재료구","기계경비의 경우 기계손료, 운전경비, 운전경비 및 운송비의 합계액으로서 기계손료란 조작비, 정비","보험료는 산업재해보험, 고용보험, 국민건강보험 및 국민연금보험 등 법령이나 계약조건에 의하여","관급자재 관리비란 공사현장에 사용될 관급자재에 대한 보관 및 관리 등에 소요되는 비용을 말한다."],4]]},"12회":{"재무회계":[[1,"다음 중에서 재무상태표의 구성요소가 아닌 것은?",["자본","자산","수익","부채"],3],[2,"다음 중에서 자산으로 계상할 수 없는 것은?",["토지를 구입하기 위해서 미리 지급한 계약금","상품을 판매하고 아직 회수하지 못한 판매대금","외상으로 비품을 구입하고 아직 지급하지 못한 대금","판매목적으로 보유하고 있는 상품"],3],[3,"현금을 수취할 때 수익을 인식하고 현금을 지출할 때 비용을 인식하는 방법을 무엇이라고 하는가?",["현금주의","발생주의","총액주의","실현주의"],1],[4,"일진(주)는 2014년 5월 1일 비품 2,000,000원을 구입하면서 대금지급은 2016년 4월 1일에 하기로 하였다. 이러한 거래로 인해 발생될 수 있는 부채계정과목으로 옳은 것은? 회계기간은 매년 1월 1일 부터 12월 31일까지이다.",["미지급금","미지급비용","장기성미지급비용","장기성미지급금"],4],[5,"재무제표 중 일정기간을 대상으로 작성하는 것이 아닌 것은 어느 것인가?",["현금흐름표","포괄손익계산서","자본변동표","재무상태표"],4],[6,"유형자산의 취득 초기에는 많은 감가상각비를 인식하다가 시간의 경과와 더불어 점점 적은 감가상각 비를 인식하는 방법은?",["정액법","정률법","생산량비례법","시가법"],2],[7,"김대리는 기업의 재무제표 분석을 통해 기업의 강점과 약점을 파악하고자 한다. 우선, 당좌비율을 분석하고자 한다. 당좌비율 분석에 필요한 계정과목으로 옳지 않은 것은?",["현금","단기매매금융자산","매출채권","재고자산"],4],[9,"다음 중 자본의 변동은 없지만 자본금이 증가하는 항목은?",["전환사채의 전환","유상증자","무상증자","유상감자"],3],[10,"감가상각누계액의 성격은 무엇인가?",["자산의 차감계정","부채","소유주지분","자산의 가산계정"],1],[11,"거래를 최초로 기록하는 공식적인 회계장부는 무엇인가?",["분개장","계정","총계정원장","시산표"],1],[12,"2017년 1월 1일 현재 일우(주)의 자본은 40억 원이며 2017년 2월 1일 배당금 10억 원 지급, 2017년 7월 1일 유상증자 15억 원을 납입 받았다. 2017년 12월 31일 3],[3,"다음 중 일반적인 간접비 배부방법에 대한 설명으로 옳지 않은 것은 어느 것인가?",["인적비용에 대한 배부방법은 작업시간법이 가장 합리적인 배부방법이다.","기계운전비용에 대한 배부방법은 기계시간법이 가장 합리적인 배부방법이다.","생산수량에 비례하여 발생하는 비용은 수량법이 가장 합리적인 배부방법이다.","가공공정에서 발생하는 간접비는 재료비법이 가장 합리적인 배부방법이다."],4],[4,"다음 중 정부의 제조원가계산에 있어 직접재료 소요량 산출 시 기초자료에 해당하지 않는 것은? - 63 -",["규격서","도면","견본품","결산서(제조원가명세서)"],4],[5,"다음 중에서 정부가 제조원가의 노무비 계산을 위한 노무공수를 산출할 때 포함되지 않는 시간을 고 르시오.",["정전대기시간","직무교육시간","정상작업시간","작업준비시간"],1],[6,"다음 중 보조부문비를 제조부문에 배부하는 방법 중 인과관계를 고려한 가장 정확한 원가배분 방법 은 어느 것인가?",["직접배부법","순차배부법","단계배부법","상호배부법"],4],[7,"다음은 변동원가계산, 전부원가계산 및 초변동원가계산에 대한 설명이다. 가장 적절하지 않은 것은 어느 것인가?",["변동원가계산에서는 원가를 기능에 따라 구분하여 변동원가와 고정원가로 분류한다.","변동원가계산에서는 고정제조간접원가를 기간비용으로 인식하지만 전부원가계산에서는 고정제조간접","초변동원가계산에서는 직접노무원가와 변동제조간접원가를 기간비용으로 처리한다.","전부원가계산에서 계산된 영업이익은 판매량뿐만 아니라 생산량의 변화에도 영향을 받는다."],1],[8,"다음 공식의 ( )에 들어갈 알맞은 용어를 고르시오. 간접재료비 + 간접노무비 + 간접경비 = (",["제조원가","총원가","직접원가","제조간접비"],4],[9,"다음 중 제조원가계산에서 일반관리비에 포함되는 항목은 어느 것인가?",["시장개척비","상표상각비","경상시험연구비","견본비"],3],[10,"다음은 ㈜고려의 직접재료원가에 대한 자료이다. ㈜고려의 직접재료원가 수량차이는 얼마인가? 직접재료 표준투입수량 : 200Kg 직접재료원가 Kg당 표준가격 : 40원 직접재료 실제투입수량 : 300Kg 직접재료원가 Kg당 실제가격 : 30원 - 64 -",["4,000원(유리)","4,000원(불리)","3,000원(유리)","3,000원(불리)"],2],[11,"㈜빛나라의 제조원가에 대한 다음 설명 중 가장 옳지 않은 것은 어느 것인가?",["제품생산량이 증감하더라도 제품단위당 고정원가는 일정하다.","준고정원가는 관련조업도 내에서 일정하게 발생하는 원가를 말한다.","직접재료비와 직접노무비를 기초원가라 한다.","간접원가란 특정한 원가집적대상에 직접 추적할 수 없는 원가를 말한다."],1],[12,"간접경비는 일반적으로 배부기준을 설정하여 배부계산을 하게 된다. 아래의 간접경비 배부기준 중 에서 적정원가를 가장 잘 산정할 수 있는 배부기준은 무엇인가?",["부담능력기준","인과관계기준","수혜기준","기계작동시간"],2],[13,"재료의 소비단가를 계속기록법을 채택하여 결정하는 방법은 개별법, 선입선출법, 후입선출법, 평균 법으로 구분 할 수 있다. 다음 중 출고된 재료의 매입단가를 재료의 소비단가로 결정하는 방법은 무엇 인가?",["개별법","선입선출법","후입선출법","평균법"],1],[14,"A사는 2016년 원가자료를 분석하고 2017년 경제여건의 변동을 고려하여 다음과 같은 제조간접비 변동예산액을 수립하였다. 제조간접비 예산 = \\1,000,000 + \\100 x 직접노동시간 2017년 직접노동시간은 20,000h이 될 것으로 추정되었다. 이 경우 2017년 제조간접비 예정배부율을 구하시오.",["\\130","\\140","\\150","\\160"],3],[15,"다음은 직접재료 소요량 산출에 있어서 손실률과 수율에 관하여 기술한 사항이다. 올바르지 않은 것을 고르시오.",["손실률은 대부분 재단, 절단, 가공 등의 제조공정에서 발생하는 손실량에 의해 측정된다.","동일 공정에서 여러 가지 재료를 배합·투입하여 양품이 완성되는 경우에는 손실량이 수율측정에 의","수율은 양품에 포함된 재료량을 투입재료량으로 나눈 비율을 의미한다.","화학적 변화에 의하여 제품화되는 품목의 경우 일반적으로 제조과정에 투입된 재료는 모두 양품의"],4],[16,"다음은 개별원가계산에 대한 설명이다. 설명이 가장 잘못된 것은 어느 것인가?",["실제배부율과 예정배부율의 구분은 제조간접비와 관련된 문제이다.","고객의 주문에 따라 제품을 생산하는 주문생산형태에 적합한 원가계산이다.","부문별 제조간접비 배분율을 사용하는 것이 공장전체 제조간접비 배분율 적용보다 더 정확하다.","평균화 과정으로 원가계산을 단순화 시킬 수 있다."],4],[17,"다음 중 원가계산에 대한 설명으로 맞지 않는 것은 어느 것인가?",["예정원가계산은 사전원가, 표준원가계산은 사후원가계산이다.","추정원가계산은 과거실적, 경험 등을 근거로 산정하는 사전원가이다.","표준원가계산은 과학적 연구결과에 의해 산정하는 원가방식이다.","사후원가는 제품의 제조가 끝난 시점에서 발생한 비용을 근거로 산출하는 원가로서 실제원가라고"],1],[18,"다음 중 활동기준원가계산(ABC: activity based costing)에 대한 설명으로 가장 적절하지 못한 것 은 어느 것인가?",["전통적인 원가배분방법과 비교하여 원가집합과 원가동인의 수가 감소되므로 보다 효율적으로 원가를","활동에 대한 정보를 제공함으로써 원가정보 뿐만 아니라 관리회계 목적의 정보도 제공할 수 있다.","원가의 발생에 있어서 다양한 원가유발 요인을 인식하므로 보다 적정한 가격결정에 이용할 수 있다.","활동분석을 통하여 비부가가치 활동을 제거하거나 감소시킴으로써 생산시간을 단축할 수 있다."],1],[23,"정부제조원가계산 비목 중 경비의 세비목 산정에 대하여 설명한 사항이다. 설명이 가장 잘못된 것 은 어느 것인가?",["전력비, 수도광열비는 기업에서 실제 소요되는 모든 비용을 말한다.","외주가공비는 재료를 외부에 가공시키는 실가공비용을 말한다.","특허권 사용료는 타인이 소유하는 특허권을 사용할 경우 지급하게 되는 사용료를 말한다.","기술료는 노하우 비용과 부대비용으로서 외부에 지급되는 비용을 말한다."],1],[24,"다음 중 조립금속제품, 기계 및 장비의 제조·구매 원가계산 시 적용되는 일반관리비율과 이윤율의 상한은 얼마인가?",["일반관리비율 8%,","일반관리비율 7%,","일반관리비율 6%,","일반관리비율 6%,"],2]],"공사기타원가":[[1,"다음 중 공사원가계산 시 재료비에 대한 설명으로 타당하지 않은 것은 어느 것인가?",["재료비는 공사목적물의 실체를 형성하는 직접재료비와 실체를 형성하지 않으나 보조적으로 소비되는","직접재료비 중 공사목적물의 기본적 구성형태를 이루는 물품의 가치를 주요재료비라 한다.","간접재료비 중 기계오일, 접착제, 용접가스, 장갑, 연마재 등 소모성 물품의 가치를 소모재료비라 한","재료비의 단위당 가격 결정기준은 거래실례가격을 우선하여 산출하고, 산정한 주요 재료비는 지급자"],4],[2,"직접노무비란 공사목적물을 완성하기 위하여 직접 작업에 종사하는 근로자 노임의 합계를 말하며, 표준품셈에서 단위당 공량을 구하여 단가산출서 또는 일위대가표에서 해당 공종의 노임 단가를 적용하 는데, 동 노임 단가를 공표하는 기관 또는 단체로 타당한 것은 어느 것인가?",["국토교통부","대한건설협회","건설기술연구원","중소기업협동조합"],1],[3,"다음 중 공사원가계산 시 경비 산정방법에 대한 설명으로 타당하지 않은 것은?",["품셈, 도면에 의거 산출이 가능한 비목은 직접 산출(기계경비 등)한다.","직접산출이 불가능한 비목은 동종 업체들의 원가계산자료(공사원가명세서 등)를 분석한 후 비율을","계약상대방으로 예상되는 업체의 최근년도 원가계산자료를 활용한다.","조달청이 매년 2번 발표하는“원가계산 제비율 적용기준”을 활용한다."],2],[4,"다음 중 공공공사계약 법령의 계약금액 조정제도에 해당되지 않는 것은?",["설계변경","물가변동","기타계약내용변경","공동도급사의 변경"],1],[5,"다음 중 산재보험료에 대한 내용으로 타당하지 않은 것은?",["산재보험료는 건설근로자의 산업재해를 보상하기 위한 제도로서, 직접노무비와 간접노무비의 합계액","산재보험요율은 「고용보험 및 산업재해보상보험의 보험료징수 등에 관한 법률」의 규정에 따라 고","건설업 면허를 가진 자가 시행하는 모든 건설공사는 의무적으로 산재보험료를 산정한다.","산재보험료=직접노무비×적용보험료율, 그 기준으로 총공사금액이 5천만 원 미만의 사업에 대해서"],2],[6,"다음 중 물가변동으로 인한 계약금액 조정제도에 대한 설명으로 적절하지 않은 것은?",["기간요건과 조정율요건의 동시 충족 필요","조정요건에 대한 특례(예외)규정을 두고 있지 않음","지수조정율 또는 품목조정율 중 계약상대자가 계약체결 시 조정방법 선택","조정기준일 이전 선금급 수령 시 조정금액 공제 필요"],3],[7,"다음 중 공사손해보험료에 대한 설명으로 타당하지 않은 것은?",["대형공사(대안입찰․일괄입찰) 및 추정가격이 200억원 이상인 입찰참가자격사전심사(PQ) 대상공사에","공사손해보험에 가입할 때 지급하는 보험료를 말하며, 보험가입대상 공사부분의 총공사원가(재료비,","보험가입대상 공사부분의 총 공사원가란 재료비, 노무비, 경비 및 이윤에 부가가치세를 포함한 금액","발주기관이 지급하는 관급자재가 있을 경우에는 보험가입 대상 공사부분의 총 공사원가와 관급자재"],3],[8,"건설공사표준품셈 기준 중 건설기계의 경비 산정의 용어와 정의 중에서 상각비에 해당하는 내용을 고르시오.",["기계의 사용에 따르는 가치의 감가액을 말한다.","기계를 사용함에 따라 발생하는 고장 또는 성능 저하부분의 회복을 목적으로 하는 분해수리 등 정비","경제적 내용시간이 끝날 때의 기계잔존가치의 취득가격에 대한 비율을 말하며 0.1로 한다.","보유한 기계를 관리하는데 필요로 하는 이자 및 보관 격납비용을 말한다."],3],[9,"다음에서 계약금액 조정제도 중 기타계약내용변경 사유로 적절하지 않은 것은 어느 것인가?",["환율폭등으로 인한 자재비 가격의 급등","공사이행기간의 변경(연장 및 단축)","발주기관 사정으로 휴일 및 야간작업 발생","토취장 또는 토사장 변경에 따른 운반거리 변경"],3],[11,"원가계산의 각 비목을 산정하는 방법은 직접 산정하는 비목과 배부율(비율)로 산정하는 비목을 계 산하여 원가계산서를 완성하는데, 통상 직접 산정하는 비목을 직접비라고 하는데 여기서 말하는 직접비 란 다음 중 어느 것인가?",["재료비","재료비+노무비","재료비+노무비+산출경비","재료비+노무비+산출경비+기타경비"],1],[12,"경비의 산출은 직접 산출이 원칙이나, 직접 산출이 어려울 때는 비율(또는 배부율)로 산출하는데 다음 중 일반적으로 비율(또는 배부율)로 산출하는 경비는 어느 것인가?",["운반비","특허권사용료","기타경비","외주가공비"],2],[13,"장비의 사용료는 감가상각비 또는 기계경비로 표현을 하고, 시간당 손료는 “장비가격 x 시간당 손 료계수”로 산정을 하는데 시간당 손료계수는 3가지의 계수로 구성되는바, 이에 해당되지 않는 계수는 ?",["수리비계수","정비비계수","관리비계수","상각비계수"],1],[14,"간접노무비 계산시 간접노무인력이 아닌 직종은?",["현장감독","작업반장","경비부문 종사자","식당종사자"],1],[16,"다음 중 개발비용 산정에 대한 설명으로 틀린 것은? - 61 - ④ 복리후생비",["개발비용에 조사비가 해당된다.","순공사비는 포함되나 설계비는 포함되지 않는다.","일반관리비가 포함된다.","토지구입비용은 포함되지 않는다."],1],[17,"설계변경 사유에 해당되지 않는 것은?",["설계서의 오류, 누락, 불분명, 상호간 모순","공사이행기간의 연장 발생","시공사의 새로운 기술․공법 제안","설계서와 지질, 용수, 지장물 등 현장상태 상이"],4],[18,"제비율표를 적용하여 간접노무비 산정 시 전기공사의 경우 건축공사의 부대공사일 때 간접노무비율 은 어느 분야의 요율을 따라야 하는가?",["건축공사와 토목공사의 평균값","건축공사와 토목공사중 적은값","토목공사","건축공사"],2],[19,"다음 중 기계경비 구성요소 중 취득가격과 무관한 비용으로 맞는 것은?",["상각비","운전경비","기계손료","정비비"],2],[21,"다음 중 공사목적물의 실체를 형성하지는 않으나 공사에 보조적으로 소비되는 물품의 가치는 어느 것인가?",["직접재료비","간접재료비","운반비","여비·교통비·통신비"],1],[22,"다음 중 물가변동적용대가에 대한 설명으로 적절하지 않은 것은?",["전체 계약금액 중 조정기준일 이후에 이행될 금액","장기계속공사인 경우 전체 계약금액을 기준으로 산정","예정공정률과 실행공정률을 비교하여 산정","조정신청일 당시의 공사공정예정표와 산출내역서 적용"],4],[23,"다음 중 계약금액 조정신청에 대한 설명으로 맞는 것은?",["계약금액 증액 청구시에는 시공사가 청구한다.","계약금액 감액시에는 발주자가 시공사를 통해 조정 청구하도록 지시한다.","계약상대자로부터 조정신청이 접수되면 원칙적으로 발주자는 50일 이내에 처리하도록 규정하고 있","기성 및 준공대가 수령 후에는 어떠한 경우라도 조정이 되지 않는다."],2]],"제도및법규":[[1,"다음은 공공조달계약 시 적용되는 법적 체계에 관하여 설명해 놓았다. 그 중 틀리게 설명한 것은 어 느 것인가?",["국가를 당사자로 하는 계약에 관한 법률(국가계약법)은 국가가 계약의 한 당사자가 되는 계약에 적","공기업․준정부기관 중에는 국가계약법이 직접 적용되는 기관도 있다.","공기업․준정부기관의 조달계약에 관하여는 공기업․준정부기관 계약사무규칙이 적용된다.","지방자치단체의 조달계약에 관하여는 지방자치단체를 당사자로 하는 계약에 관한 법률(지방계약법)"],4],[2,"정부계약의 종류에 관하여 설명한 것 중 틀리게 설명한 것은 어느 것인가?",["정부계약은 개산계약만 인정하고 있다.","경쟁방법에 따라 크게 분류하면 경쟁입찰과 수의계약으로 나눌 수 있다.","협상에 의한 계약 방법도 인정하고 있다.","이행기간에 따라 단년도 계약과 장기계속계약으로 나눌 수 있다."],2],[3,"정부계약의 특성에 관하여 설명해 놓은 것 중 바르지 않게 설명한 것은 어느 것인가?",["정부계약은 원칙적으로 사법상의 계약이다.","정부계약도 신의성실의 원칙과 권리남용금지의 원칙이 적용되고 있다.","정부계약은 부당한 특약이나 조건을 정하여도 무방하다.","정부계약은 요식 계약을 원칙으로 하고 있다."],3],[4,"다음 중 정부계약의 적용원칙이 아닌 것은 어느 것인가?",["신의성실의 원칙","계약자유의 원칙","사정한정의 원칙","권리남용금지의 원칙"],4],[5,"다음 중 개산계약의 대상으로 옳지 않은 것은 어느 것인가?",["개발시제품의 제조계약","시험, 조사, 연구용역계약","시간적 여유가 없는 긴급한 재해복구를 위한 계약","민간업체의 위탁계약"],4],[6,"다음 중 공사원가 산정 시 추정금액 200억 원 이상인 경우에 적용되는 원가비목은 어느 것인가? - 66 -",["산재보험료","산업안전보건관리비","공사손해보험료","고용보험료"],2],[7,"다음 중 규격입찰을 한 후 동 입찰에서 통과된 자를 대상으로 가격입찰을 실시하는 입찰방식은 어느 것인가?",["2단계 경쟁입찰","규격·가격분리입찰","희망수량 경쟁입찰","적격심사 낙찰제"],3],[8,"물품의 제조 및 용역계약 추진 시 계약금액이 10억 원 이상인 경우에 선금대상 비율은 얼마인가?",["100분의 30","100분의 40","100분의 50","100분의 70"],1],[9,"다음 중 정부조달에서 국제입찰과 관련하여 바르게 설명한 것은 어느 것인가?",["우리나라는 WTO 정부조달협정에 가입되어 있어 동 협정에 가입한 회원국은 일정 기준에 따라 서로","우리나라는 WTO 정부조달협정에 가입한 이상, 금액 제한 없이 모든 국가기관이 발주하는 입찰에","WTO 정부조달협정에 따라 일정규모 이상 대외개방이 되는 금액은 항상 원화로 고정되어 있다.","WTO 정부조달협정에 따른 국제입찰을 회피하기 위해 조달대상을 분할하여 국제입찰 절차에 의하지"],1],[10,"추정가격과 예정가격에 관하여 설명한 것 중 틀린 것은 어느 것인가?",["예정가격은 예산을 초과하여서는 아니 된다.","추정가격은 부가가치세가 제외되며, 예정가격은 부가가치세가 포함된다.","추정가격은 예정가격이 결정되기 전에 산정한다.","추정가격은 예산을 초과하여도 무방하다."],2],[11,"다음은 대안입찰제도와 관련하여 설명한 것이다. 바르게 설명하지 않은 것은?",["대안입찰은 원안입찰과 함께 따로 입찰자의 의사에 따라 대안이 허용된 공사의 입찰을 말한다.","대안입찰의 낙찰자결정 시, 설계‧시공일괄입찰(턴키)에서 계약금액을 확정하고 설계점수가 가장 높은","대안입찰은 원칙적으로 추정가격이 300억 원 이상인 대형공사와 추정가격이 300억 원 미만이더라도","대안을 허용한 대안입찰의 경우 입찰자는 원안입찰과 함께 반드시 대안을 제출하여야 한다."],3],[13,"입찰참가와 관련하여 설명해 놓은 것 중 틀리게 설명한 것은 어느 것인가?",["입찰참가신청을 하지 않은 자도 입찰에 참가할 수 있다.","대리인도 위임장을 제출한 경우에는 입찰에 참가할 수 있다.","2개 이상 법인의 임직원인 자는 1개 법인의 대리인으로만 입찰에 참가할 수 있다.","대리인 지정 시 법인의 경우 반드시 임원일 필요는 없다."],1],[14,"정부입찰과 관련하여 설명한 것 중 틀리게 설명한 것은 어느 것인가?",["정부입찰은 전자입찰만 인정되고 있다.","입찰서는 1인이 1통만을 제출하여야 한다.","제출한 입찰서는 원칙적으로 교환·변경 또는 취소하지 못한다.","입찰서의 입찰자란에는 반드시 대표자의 성명을 기재하여야 한다."],2],[15,"다음은 입찰보증금에 관하여 설명해 놓았다. 올바르게 설명한 것은 어느 것인가?",["입찰보증금은 현금으로만 납부하여야 한다.","낙찰되지 않은 자의 입찰보증금은 반납할 필요가 없다.","입찰보증금은 면제사유에 해당하면 그 납부를 면제할 수 있다.","입찰보증금은 계약의 이행을 담보하기 위해 받는 보증금이다."],1],[16,"정부계약 관련사항의 정보공개와 관련하여 다음의 설명 중 맞지 않는 것은 어느 것인가?",["정부계약 관련 정보의 공개는 모든 관심 있는 공급자들에게 조달관련 정보를 미리 제공함으로써 조","정부계약 관련 정보의 공개 대상에 수의계약에 관한 사항은 모두 제외되어 있다.","정부계약 관련 정보의 공개 대상은 경쟁입찰 또는 수의계약의 계약체결 및 계약변경에 관한 사항을","정부계약 관련 정보를 공개할 때에는 국가종합전자조달시스템(G2B) 또는 각 중앙관서의 장이 지정·"],2],[18,"다음 중 정부공사계약에서 낙찰제도와 관련하여 틀리게 설명한 것은 어느 것인가?",["공사계약에서 낙찰자 결정방법은 적격심사낙찰제, 종합심사낙찰제 등이 있다.","설계와 시공을 일괄하여 입찰에 부치는 설계시공일괄입찰제도가 있다.","실시설계 기술제안입찰에 의한 계약은 용역계약에 적용되는 계약방법이다.","추정가격이 300억 원 미만인 공사에는 적격심사낙찰제가 적용된다."],4],[19,"선금사용과 관련하여 설명해 놓은 것 중 틀리게 설명한 것은 어느 것인가?",["선금지급조건 위배는 선금 반환대상이다.","선금 전액 사용 시 최종 사용내역서를 제출하여야 한다.","계약상대자의 귀책사유에 의하여 반환하는 경우에는 해당 선금잔액에 대한 약정이자상당액을 가산하","계약을 해제 또는 해지하는 경우에는 선금을 반환할 필요가 없다."],2],[20,"정부공사에서의 종합심사낙찰제에 관하여 설명한 것 중 틀린 것은 어느 것인가?",["추정가격이 300억 원 이상인 공사에 적용된다.","공사수행능력과 입찰가격을 종합 심사하여 낙찰자를 결정하는 방식이다.","사회적 책임 부문도 심사항목 대상에 포함되어 있다.","추정가격이 300억 원 미만인 공사에 적용된다."],1],[21,"정부계약에서 계약보증금에 관하여 설명해 놓은 것 중 틀리게 설명한 것은 어느 것인가?",["계약보증금은 계약체결 시 계약금액의 100분의 10 이상을 납부하게 된다.","계약보증금은 계약의 이행을 담보하기 위한 보증금이다.","계약보증금은 그 납부를 면제할 수 있는 경우가 없다.","계약보증금은 현금 또는 보증서 등으로 납부하게 된다."],2],[22,"정부계약에서 계약체결과 관련하여 설명한 것 중 틀리게 설명한 것은 어느 것인가? - 69 -",["계약체결은 원칙적으로 낙찰통지를 받은 후 10일 이내에 하여야 한다.","계약서는 서면으로 작성하는 것을 원칙으로 하고 있다.","정부계약은 예외 없이 계약서를 작성하여야 한다.","낙찰자가 정당한 이유 없이 계약을 체결하지 아니하면 입찰보증금을 국고에 귀속한다."],4]]},"13회":{"재무회계":[[1,"다음은 회계의 순환과정 중 일부를 기술한 것이다. 회계의 순환과정을 순서대로 기술한 것으로 옳은 것은? A. 전기 B. 분개 C. 수정전시산표 작성 D. 수정분개 E. 재무제표 작성 F. 거래와 사건의 식별",["A, B, C, E, D, F","A, B, D, C, E, F","F, A, B, C, D, E","F, B, A, C, D, E"],4],[2,"다음 중 한국채택국제회계기준에 따른 재무제표의 작성과 표시에 적용되는 일반원칙이 아닌 것은?",["경영자는 재무제표를 작성함에 있어서 계속기업으로서의 존속가능성을 평가해야 한다.","재무제표에 보고할 항목은 중요성을 고려하여 결정해야 한다.","한국채택국제회계기준에서 요구하거나 허용하지 않는 한 자산과 부채 그리고 수익과 비용은 상계하","재무제표는 반드시 비교식 재무제표를 공시하지 않고 당기분만 공시해도 된다."],4],[3,"다음은 재무상태표에 대한 설명이다. 옳지 않은 것은?",["투자자 및 채권자는 재무상태표를 통해 기업의 유동성에 대한 정보를 얻을 수 있다.","일정시점의 재무상태를 나타내는 보고서로서 자산, 부채 및 자본에 대한 정보를 얻을 수 있다.","재무상태표는 경영자의 주관적 판단에 의해 영향을 받고 있다.","영업활동으로 인해 발생되는 영업 손익을 파악할 수 있다."],4],[4,"다음 중 무형자산의 인식요건에 해당되지 않는 것은?",["기술적 실현가능성이 없어도 개발자금만 충분해도 된다.","사용 및 판매의도","미래경제적 효익의 창출능력","측정가능성"],1],[5,"다음 중 금융부채의 범위에 포함될 수 없는 것은?",["단기차입금","미지급금","미지급법인세","매입채무"],3],[7,"다음 중 자본의 변동은 없지만 자본금이 증가하는 항목은 어느 것인가?",["전환사채의 전환","유상증자","무상증자","유상감자"],3],[8,"다음 중 총계정원장의 기록이 정확한지의 여부를 파악하는 검증기능을 갖는 것은 어느 것인가?",["시산표","분개장","정산표","전표"],1],[9,"다음은 거래 유형별 유형자산의 취득원가를 설명한 것이다. 옳지 않은 것은?",["매입할인이 있는 경우 이를 차감하여 취득원가를 결정한다.","토지와 건물을 일괄 구입할 경우 상대적 공정가치에 비례하여 배분한다.","회사가 사용해 오던 건물을 철거하고 신건물로 대체하는 경우에 구건물의 미상각장부금액은 신건물","안전 또는 환경상의 이유로 취득하는 유형자산은 다른 자산에서 미래 경제적 효익을 얻기 위하여 필"],3],[10,"다음 자료를 이용하여 매출원가를 계산하면 얼마인가? ∎ 기초상품재고액 : ￦3,000 ∎ 당기상품매입액 : ￦50,000 ∎ 기말상품재고액 : ￦4,000",["￦55,000","￦54,000","￦51,000","￦49,000"],4],[11,"다음 중에서 선입선출법에 대한 설명이 아닌 것은?",["재고자산의 종류가 적고 쉽게 구별될 수 있는 경우에 적용하기가 쉽다.","일반적으로 원가흐름의 가정과 실물흐름이 같다.","타 방법에 비하여 이익을 조작할 가능성이 적다.","기말재고자산 금액은 현행원가의 근사치가 된다."],1],[13,"(주)삼우가 단기간 내에 매매를 목적으로 취득한 채권은 회계 상 어떻게 분류되는가?",["단기매매금융자산","매도가능금융자산","만기보유금융자산","지분법적용투자금융자산"],1],[14,"주식을 발행했을 때 자본금은 어떻게 구성되는가?",["액면가액 × 유통주식수","시장가액 × 발행주식수","액면가액 × 발행주식수","시장가액 × 유통주식수"],3],[15,"결산 시에 대손충당금을 과소 설정하였다. 정상적으로 설정한 경우와 비교할 때 어떠한 차이가 있 는가?",["자산이 과소 표시된다.","부채가 과대 표시된다.","비밀적립금이 발생한다.","당기순이익이 과대 표시된다."],4],[16,"미래 사업확장을 위해 주식을 발행하여 자금을 조달하였다. 기업의 활동 중 어떤 활동에 해당되는 가?",["영업활동","재무활동","투자활동","조달활동"],2],[17,"다음 중 당좌자산에 속하지 않는 것은?",["상품","단기금융상품","매출채권","선급금"],1],[18,"부채나 배당금 등의 단기 지급 능력의 비율을 무엇이라고 하는가?",["안정성비율","유동성비율","수익성비율","활동성비율"],2],[19,"미래(주)는 단기매매목적으로 주식을 2018년 7월 10일 1,000,000원에 취득한 후 2018년 12월 1일 1,300,000원에 처분을 하였다. 유가증권처분이익의 회계처리로 옳은 것은? - 54 -",["300,000원을 영업외 수익으로 인식한다.","300,000원을 기타포괄이익으로 인식한다.","1,300,000원을 영업외 수익으로 인식한다.","1,300,000원을 기타포괄이익으로 인식한"],1],[20,"(주)한국의 2017년 말과 2018년 말 현재 매출채권 잔액이 각각 \\50,000과 \\70,000이고 2018년 매출액은 \\240,000이다. (주)한국이 매출채권을 회수하는데 평균적으로 걸리는 기간은? (단, 매출채권 회수기간은 월할 계산함)",["6개월","5개월","4개월","3개월"],4],[21,"다음 중 현금화되는 속도가 가장 빠른 것은 어느 것인가?",["매도가능금융상품","당기손익인식금융상품","상품 등 재고자산","기계장치 등 유형자산"],2],[22,"다음은 이우(주)의 비교식 재무제표의 정보 중 일부이다. 이우(주)가 매출과 관련하여 당기에 회수 한 현금은 얼마인가? 회계기간은 매년 1월 1일부터 12월 31일까지이다. (단위: 원) 계정과목 당기 매출채권 700,000 대손충당금 (200,000) 매출액 대손상각비",["450,000원","500,000원","750,000원","1,150,000원"],3]],"원가관리회계":[[1,"다음은 변동원가계산의 장점이다. 이 중 옳지 않은 것은?",["변동원가계산은 경영자의 단기적인 의사결정에 적합하다.","변동원가계산은 이익이 생산량에 의하여 영향을 받지 않고 판매량에 의해서만 영향을 받는다.","변동원가계산은 고정제조간접원가를 제품원가에 포함시키지 않기 때문에 생산량에 따라서 단위당 제조원가","변동원가계산은 고정제조간접원가를 제품원가에 포함시키지 않기 때문에 재고자산가치가 낮게 평가된다."],4],[2,"다음은 원가-조업도-이익(CVP)분석에 대한 설명이다. 이 중 옳지 않은 것은?",["손익분기점에서 영업이익이 0이므로 법인세가 발생하지 않는다.","손익분기점에서 공헌이익과 고정원가가 일치한다.","손익분기점에서 공헌이익과 변동원가가 일치한다.","손익분기점 판매량은 고정원가를 단위당 공헌이익으로 나눈 값이다."],4],[3,"다음 중 관련원가가 갖추어야 할 속성은?",["미래에 발생될 원가와 수익이며, 의사결정 대안에 따라 다르게 나타나는 원가와 수익이다.","과거에 발생된 원가와 수익이며, 의사결정 대안에 따라 다르게 나타나는 원가와 수익이다.","미래에 발생될 원가와 수익이며, 동일한 의사결정 대안에 따라 나타나는 원가와 수익이다.","과거에 발생된 원가와 수익이며, 동일한 의사결정 대안에 따라 나타나는 원가와 수익이다."],2],[5,"다음 중 사업부분의 구조조정 시 고려해야할 원가는?",["통제불가능원가","회피불가능원가","관련원가","기회원가"],3],[6,"다음 중 표준원가의 표준설정에 관한 내용 중 설명이 옳지 못한 것은?",["구매부서는 구매하고자 하는 원재료의 구입가격에 대한 표준을 설정한다.","생산부서는 생산하는 제품의 완성을 위하여 예상되는 원재료의 손실 등을 고려하여 원재료 소요량을 결정","직접노무비의 임률은 회계담당자가 결정한다.","직접노무비의 노동시간에 대한 표준은 임률과 마찬가지로 회계담당자가 결정한다."],4],[8,"서초구청은 유지비용을 절감하기 위하여 소방차를 교체하려고 한다. 다음의 의사결정 관련항목 중 교체 의사결정 시 고려해야할 항목이 아닌 것은?",["신규 소방차의 취득원가","기존 소방차의 취득원가","신규 소방차로 교체에 따른 유지비용 절감액","신규 소방차에 대한 감가상각비"],4],[9,"다음 중 자본예산기법에 대한 설명에 해당하는 것은?",["자본예산은 긴급한 상황에서 이루어지는 의사결정기법이다.","자본예산은 장기의사결정이다.","자본예산은 단기의사결정이다.","자본예산은 현재의 현금유출액을 대상으로 한다."],1],[10,"(주)서초텔레콤은 다음과 같이 요금제를 운영하고 있다. - A요금제 : 기본요금 ￦200, 1초당 요금이 ￦4 - B요금제 : 기본요금 ￦400, 1초당 요금이 ￦3 A요금제와 B요금제의 사용요금이 같아지는 사용시간은 얼마인가?",["300","250","200","150"],2],[11,"다음은 종합예산의 유용성에 관한 것이다. 이 중에서 옳지 않은 것은?",["종합예산은 기업구성원에게 미래의 계획과 운영절차를 수립하도록 한다.","종합예산은 성과평가의 기준을 제공한다.","종합예산은 각 하위경영자들이 작성하는 운영세부계획의 기준을 제공한다.","종합예산은 의사전달과 조정의 역할을 수행한다."],3],[12,"(주)서초전자는 영업이익이 ￦15,000이고 영업레버리지가 2.5이다. 만약 매출액이 40% 증가하였다면 (주)서초전자의 영업이익은 얼마인가?",["20,000원","25,000원","30,000원","35,000원"],4],[14,"다음 중 수익중심점의 성과평가의 기준은?",["실제원가와 표준원가의 차이","변동예산상의 이익과 실제이익과의 차이","목표매출액과 실제매출액의 차이","투자수익률에 의한 평가"],2],[15,"다음은 재무적 성과지표를 나열한 것이다. 이 중 옳지 않은 것은?",["잔여이익","투자수익률","공급자 수","경제적 부가가치(EVA)"],1],[16,"다음 중 투자수익률(ROI)을 정확히 나타낸 것은?",["매출액순이익율×총자산회전율","매출액순이익율+총자산회전율","매출액순이익율-총자산회전율","매출액순이익율÷총자산회전율"],3],[18,"(주)서초의 원가 관련자료는 다음과 같다. 변동제조원가는 ￦180, 변동 판매 및 일반관리비 ￦20, 고정제 조간접원가 ￦95, 고정 판매 및 일반관리비 ￦15 이다. 만약 회사가 변동원가에 의한 원가보상율이 150%라 면 회사가 부가하는 가격은 얼마인가?",["￦110","￦200","￦370","￦500"],4],[19,"다음 중 손익분기점 분석의 가정이라고 볼 수 없는 것은?",["단위당 판매가격은 일정하다.","원가는 고정원가와 변동원가로 구분된다.","생산된 것이 모두 판매되는 것은 아니다.","원가에 영향을 미치는 요인은 조업도이다."],1],[20,"고정비가 일정하다고 가정할 때, 공헌이익률이 증가되는 것은 다음 중 어느 경우인가?",["손익분기점 매출액이 증가하는 경우","단위당 변동비가 증가하는 경우","매출액에 대한 변동비 비율이 증가하는 경우","매출액에 대한 변동비 비율이 감소되는 경우"],3],[21,"다음 중 직접재료원가 가격차이를 발생시키는 원인으로 볼 수 없는 것은?",["1회당 재료 매입량","재료의 품질","특별대량주문","기계성능의 저하"],3],[22,"변동원가계산과 전부원가계산에 있어 그 특징을 설명한 것 중에서 올바르지 못한 것은?",["변동원가계산은 생산량조절에 따른 이익조정을 방지할 수 있다.","변동원가계산제도에서는 재고자산의 가치가 낮게 평가된다.","전부원가계산제도는 원가포괄개념에 근거하고 있다.","전부원가계산은 원가회피개념에 근거하고 있다."],4],[23,"다음은 초변동원가계산에 대한 내용이다. 개념과 거리가 먼 것은 반관리비의 합계액에 이윤율","설계변경에 따른 계약금액을 조정함에 있어서 증가 또는 신규 비목 등에 따른 이윤율 적용은 산출","계약상대자가 비영리법인인 경우에는 이윤을 계상하여서는 아니 된다.","계약담당공무원은 계약목적물에 대한 특성을 분석하고 그 결과 입찰 대상자들의 이윤율이 법정율"],3],[5,"예정가격작성기준에 따른 공사원가계산 시 노무비에 대한 설명 중 바르지 않은 것은 어느 것인가?",["노무비는 공사원가를 구성하는 직접노무비와 간접노무비를 포함한다.","직접노무비와 간접노무비는 기본급, 제수당, 상여금 및 퇴직급여충당금의 합계액인 점에서 다르지","제수당, 퇴직급여충당금은 근로기준법상 인정되는 범위를 초과하여 계상할 수 없다.","직접노무비는 공사현장에서 직접 작업에 종사하지는 않으나, 보조 작업에 종사하는 노무자를 포함"],3],[6,"원가산정의 원칙(견적의 기본원칙)에 맞지 않는 것은 어느 것인가?",["전문적인 판단에 의해 실제상황을 정확하게 예측, 반영된 것으로 작성","견적의 정확성에 영향을 주는 정보의 정도는 모든 항목에서 일관성 있게 적용","상세수준의 원칙에 따라 모든 요소에 대한 비용을 포함","과거 실적자료가 미비할 경우 편의성을 위해 임의의 정보 활용"],1],[7,"국가계약법에서 확정된 계약내용을 변경·조정할 수 있도록 정한 일정한 기준이나 요건에 해당하지 않는 것은 어느 것인가?",["계약체결 후 100일이 경과하고 조정률이 3.8% 증감된 경우","공사시방서가 변경되는 경우","산출내역서상 단가가 과다 계상된 경우","공사기간이 변경되는 경우"],3],[8,"정부공사계약에서 발주기관이 설계변경을 요구한 경우(계약상대자의 책임 없는 사유로 인한 경우 포 함) 계약당사자 간 신규단가에 대한 협의가 이루어지지 아니할 때의 신규단가 산정금액은 얼마인가? - 설계가격 : 220,000,000원 - 예정가격 : 200,000,000원 - 계약금액 : 180,000,000원 - 설계변경당시 단가 : 1,000원",["1,000원","950원","909원","900원"],3],[9,"물가변동에 따른 조정률 산정 시 기준시점이 되는 날은 언제인가?",["입찰공고일","입찰서제출 마감일","계약체결일","최초착공일"],2],[10,"설계변경으로 인한 계약금액을 조정 시 “설계변경당시”의 기준으로 적절하지 않은 것은 어느 것인 가?",["설계도면의 변경을 요하는 경우에는 변경도면을 발주기관이 확정한 때","설계도면의 변경을 요하지 않는 경우에는 계약당사자간에 설계변경을 문서에 의하여 합의한 때","계약상대자가 설계변경 내역서를 감리자의 승인을 얻어 발주기관에 제출한 때","우선시공을 한 경우에는 그 우선시공을 하게 한 때"],4],[12,"추정가격 및 예정가격에 대한 설명으로 맞지 않는 것은 어느 것인가?",["추정가격은 국제입찰 대상여부를 판단하는 기준이 된다.","예정가격은 계약금액의 상하한제 역할을 한다.","추정가격에는 부가가치세 및 관급자재가격을 제외한다.","예정가격은 부가가치세 및 관급자재가격을 포함한다."],2],[13,"정부계약 관련 계약금액조정 청구시한 및 조정기한으로 적절하지 않은 것은?",["발주기관은 계약상대자의 청구를 받은 날부터 30일 이내에 계약금액을 조정하여야 한다.","계약상대자의 계약금액조정 청구는 장기계속계약의 경우 각 차수별 준공대가 수령 전까지 하여야","발주기관은 계약상대자의 청구를 받은 날부터 90일 이내에 계약금액을 조정하는 것이 원칙이나","계약상대자의 계약금액조정 청구는 계속비 계약의 경우 준공대가 수령 전까지 하면 조정금액을 지"],3],[14,"다음의 열거 중 개발부담금 부과 대상사업에서 면제되는 것은 어느 것인가?",["⌜주택법⌟에 따른 주택건설사업","⌜도시개발법⌟에 따른 도시개발사업(수용방식)","⌜국토의 계획 및 이용에 관한 법률⌟에 따른 골프장 건설사업","⌜중소기업창업 지원법⌟에 따라 사업승인을 받아 시행하는 공장용지 조성사업"],4],[15,"물가변동으로 인한 계약금액의 조정에 필요한 산정식으로 바르지 않은 것은 어느 것인가?",["조정금액 = 물가변동적용대가 x 지수조정률(K)","선금공제액 = 물가변동적용대가 x 지수조정률 x 선금지급률","선금조정률 = 선금/계약금액(당해 연도)","계약금액의 조정(최종) = 당초의 계약금액 x (조정금액-선금공제액)"],4],[16,"토목공사의 공사규모가 45억 원이고, 공사기간이 11개월인 경우, 간접노무비율로 맞는 것은? - 67 - 토목공사 간접노무비율 : 15%, 50억 원 미만 : 14%,",["15.0%","14.66%","14.15%","13.2%"],1],[17,"거래실례가격으로 예정가격을 결정함에 있어 다음 중 바르지 않은 것은 어느 것인가?",["기획재정부장관에게 등록한 기관이 조사하여 공표한 가격","원가계산에 의한 가격","조달청장이 조사하여 통보한 가격","각 중앙관서의 장 또는 계약담당공무원이 2인 이상의 사업자에 대하여 당해 물품의 거래실례를"],2],[18,"장비의 사용료는 감가상각비 또는 기계경비로 표현을 하고, 시간당 손료는 “장비가격 x 시간당 손 료계수”로 산정을 하는데 시간당 손료계수는 3가지의 계수로 구성되며 이에 해당되지 않는 계수는 ?",["상각비계수","정비비계수","관리비계수","수리비계수"],1],[19,"다음 중 예정가격의 기능에 해당하지 않는 것은 어느 것인가?",["기성금액 지급 기준","계약금액 상한","적격심사 가격평가기준","입찰금액 적정성 심사기준"],1],[20,"공사원가계산에서 산재보험료의 산출시 배부대상액은?",["노무비","직접노무비","간접노무비","재료비+노무비"],1],[21,"다음은 건설공사 원가산정에 있어 기계경비 산정에 관한 사항이다. 올바르지 않은 것은 어느 것인 가?",["장비별 작업시간당 작업능력과 시간당 기계경비를 산정하여 원가계산 한다.","시간당 작업능력은 작업싸이클, 회당 표준작업량 등을 고려하여 산출한다.","시간당 기계경비는 기계손료, 운전경비 및 수송비의 합계액으로 하는 것이 원칙이다.","운전경비는 기계를 사용하는 데 필요한 경비로서 연료·전력·윤활유 등은 포함하나 운전기사의"],4]],"제도및법규":[[1,"국가계약법상의 정부계약의 특성에 관하여 바르게 설명한 것은?",["정부계약과 관련된 다툼은 예외 없이 모두 민사소송 대상이다.","민법의 기본원리가 배제된다.","국가가 사인의 지위에 서서 사경제주체로서 행하는 사법상의 법률행위뿐이다.","요식계약 형태가 원칙이다."],2],[2,"국가계약법 등에 따라 계약의 목적, 성질, 규모 등을 고려하여 필요하다고 인정되면 참가자의 자격 을 제한하여 제한경쟁계약을 체결할 수 있는데 그 제한의 유형에 해당하지 않는 것은?",["특수한 기술 또는 공법이 요구되는 공사계약의 경우에는 당해 공사수행에 필요한 기술의 보유상황","특수한 기술이 요구되는 용역계약의 경우에는 당해 용역수행에 필요한 기술의 보유상황 또는 당해","「중소기업제품 구매촉진 및 판로지원에 관한 법률 시행령」 제6조에 따라 중소벤처기업부장관이","「건설산업기본법」에 의한 건설공사(전문공사 제외)로서 추정가격이 3억 원 이하인 공사, 「건설"],3],[3,"국가계약법 등에 따라 입찰 또는 계약체결 전에 낙찰자 및 계약금액의 결정기준으로 삼기 위하여 예 정가격을 작성할 때 포함해야할 세액이 아닌 것은 ?",["「부가가치세법」에 의한 부가가치세","「개별소비세법」에 따른 개별소비세","「인지세법」에 의한 인지세","「관세법」에 의한 관세"],1],[4,"다음은 추정가격과 관련하여 설명해 놓았다. 그 중 옳지 않은 것은?",["추정가격은 예정가격이 결정되기 전에 산정한다.","추정가격은 국제입찰 대상, 수의계약 대상 등의 기준으로 삼기 위해 예산에 계상된 금액 등을","추정가격에는 관급자재대가 제외된다.","추정가격도 예정가격과 같이 부가가치세가 포함된다."],1],[6,"물품ㆍ공사ㆍ용역 등의 계약과 관련된 내용의 자문을 위하여 계약심의위원회를 설치하여 운영할 수 있다. 계약심의위원회와 관련된 내용이 아닌 것은 ?",["발주기관이 입찰참가자격요건, 부정당업자의 입찰참가자격 제한, 그 밖에 계약과 관련하여 질의한","입찰참가자 또는 계약상대자가 입찰, 계약체결 및 계약이행과 관련하여 질의하거나 시정을 요구한","예정가격의 100분의 86 미만으로 낙찰된 공사계약의 계약금액을 설계변경으로 인한 계약금을 증","계약심의위원회의 구성 및 운영에 관하여 필요한 세부사항은 기획재정부령으로 정한다."],4],[7,"정부조달과정에서 분쟁해결제도와 관련하여 틀리게 설명한 것은?",["국가계약에 대한 분쟁조정기구로 기획재정부에 국가계약분쟁조정위원회가 설치되어 있다.","국가계약분쟁조정위원회의 조정안에 대해 당사자의 이의 제기가 없으면 재판상의 화해와 같은 효","계약체결 시 계약당사자 간에 조정 또는 중재 중 하나의 방법을 정할 수 있다.","조정안에 대해 당사자는 의무적으로 따라야 한다."],3],[8,"장기계속계약에 관한 내용과 관련이 없는 것은 ?",["장기계속계약은 임차, 운송, 보관, 전기ㆍ가스ㆍ수도의 공급 등 그 성질상 수년간 계속하여 존속할","장기계속공사계약은 총공사금액 및 총공사기간에 관하여 별도 계약을 체결하고 다시 개개의 사업","장기계속공사는 낙찰 등에 의하여 결정된 총공사금액을 부기하고 당해 연도의 예산의 범위 안에서","장기계속공사계약은 계약상대방이 이행할 급부의 구체적인 내용, 계약상대방에게 지급할 공사대금"],2],[10,"입찰의 무효와 관련하여 바르게 설명한 것은?",["입찰참가자격이 없는 자가 한 입찰은 무효사유에 해당된다.","입찰무효사유는 계약담당자가 임의로 정하여도 무방하다.","동일사안에 동일인이 2인 이상의 대리입찰을 하여도 유효하다.","동일사안에 동일인이 2통 이상의 입찰서를 제출하여도 유효하다."],3],[11,"다음 중 정부계약에서 선금 지급과 관련하여 바르지 않게 설명한 것은?",["선금 지급은 공사계약만을 대상으로 하고 있다.","선금은 노임이나 자재구입비 등에 우선 충당토록 하기 위해 지급하는 것이다.","선금 지급 시에는 원칙적으로 채권확보를 한 후 지급하게 된다.","선금 지급은 임의 사항이나, 일정률 금액은 의무적으로 지급토록 하고 있다."],1],[12,"부정당업자에 대한 입찰참가자격 제한조치와 관련하여 틀리게 설명한 것은?",["입찰참가자격 제한조치에 대해서는 제척기간이 없다.","입찰참가자격 제한조치 기간은 1월 이상 2년 이하의 범위에서 정해진다.","입찰참가자격 제한조치에 대한 불복 시에는 행정소송 절차에 따른다.","장기계속계약의 경우 계약이행 중에 제한조치를 받아도 나머지 차수별 계약은 이행이 가능하다."],4],[13,"부정당업자에 대한 과징금부과에 관하여 틀리게 설명한 것은?",["과징금을 부과하려면 기획재정부에 설치되어 있는 과징금부과심의위원회의 심의를 거쳐야 한다.","과징금 부과 시에는 감경제도를 두고 있지 않다.","과징금 부과는 부정당업자에 대한 입찰참가자격 제한조치를 갈음하게 된다.","과징금 부과처분도 행정쟁송의 대상이 된다."],3],[14,"다음은 물가변동제도에 관하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["물가변동조정률 산정방식에는 지수조정률 방식뿐이다.","우리나라에 단품물가조정제도가 도입되어 있다.","계약금액 조정요건으로는 90일 이상의 기간요건과 3% 이상의 조정률 요건이 있다.","물가변동으로 인한 계약금액 조정은 의무사항이다."],4],[16,"발주기관별로 조달계약과 관련한 법체계를 설명한 것 중 바르게 설명한 것은?",["국가기관은 국가계약법을 적용한다.","국가기관은 물론 지방자치단체도 국가계약법을 적용한다.","공기업․준정부기관도 우선 국가계약법을 적용하되, 필요 시 공기업․준정부기관 계약사무규칙을 준","공공기관 중 공기업․준정부기관 외의 기타공공기관도 공기업․준정부기관 계약사무규칙을 적용한다."],2],[17,"다음은 정부공사의 현장설명에 관하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["현장설명은 공사입찰에 있어서 공사의 성질‧규모 등을 고려하여 실제 공사 현장에서 입찰참가자의","현장설명 시에는 원칙적으로 소정의 국가기술자격수첩(건설기술자경력수첩)을 제시하여야 한다.","모든 공사에 대해 의무적으로 현장설명을 실시하여야 한다.","입찰참가자격사전심사(PQ)를 실시하는 공사는 PQ 실시 결과 적격자만 현장설명에 참가할 수 있"],2],[18,"입찰보증금과 계약보증금의 공통점과 상이점에 대해 설명해 놓은 것 중 틀리게 설명한 것?",["입찰보증금과 계약보증금 모두 입찰 전에 납부하여야 한다.","입찰보증금과 계약보증금 모두 그 납부를 면제할 수 있는 사유가 있다.","입찰보증금과 계약보증금 모두 그 성격은 손해배상액의 예정성격이라 할 수 있다.","입찰보증금과 계약보증금 모두 현금이나 보증기관 등의 보증서로 납부할 수 있다."],4],[19,"공사계약에서 대가지급과 관련하여 설명한 것 중 틀리게 설명한 것은?",["대가 지급에는 기성대가와 준공대가가 있다.","기성대가는 확정급으로만 지급하여야 한다.","준공대가 지급기한까지 대가를 지급하지 못한 경우에는 지연이자를 지급하여야 한다.","기성대가와 준공대가는 원칙적으로 검사를 완료한 후에 지급하여야 한다."],1],[21,"계속비 계약에 관하여 설명한 것 중 바르게 설명한 것은 ?",["계속비 계약은 3개 연도에 걸친 사업만을 대상으로 한다.","계속비 계약은 연차별로 지체상금을 부과한다.","계속비 계약은 사업계획과 총 예산이 모두 확정되어 있다.","계속비 계약은 1차 연도 예산만 확보되어 있다."],4],[22,"입찰참가자격 사전심사(PQ)제도에 관하여 옳지 않게 설명한 것은 ?",["부실공사를 방지하기 위한 수단으로 입찰 전에 미리 공사수행능력 등을 심사하여 일정수준이상의","경영상태 평가는 유효기간 내에 있는 회사채, 기업어음 및 기업의 신용평가등급 중 가장 최근의","공사의 종류나 특성에 따라서는 발주기관이 판단하여 입찰을 실시한 후에 PQ를 실시하여도 무방","적격자 선정방법은 우선 경영상태부문의 적격요건을 충족하는 자를 대상으로 기술적 공사이행능력"],4],[23,"다음은 정부계약에서 감독 및 검사업무와 관련하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["감독업무는 공사의 경우, 설계도서 등에 작성된 대로 충실하게 시공되고 있는지 등을 감독하는 역","검사조서란 검사공무원이 계약서․설계서, 그 밖의 관계서류에 의하여 계약의 이행상태를 검사하여","감독의 직무와 검사의 직무는 원칙적으로 서로 겸직할 수 없다.","검사조서는 모든 정부계약에 대해 이행이 완료되면 작성하여야 한다."],4],[24,"대형공사계약에서의 입찰 및 낙찰제도에 관하여 설명한 것 중 틀린 것은?",["턴키입찰은 설계와 시공을 일괄하여 입찰에 부치는 제도이다.","대형공사계약에서의 입찰제도로는 턴키입찰, 대안입찰, 기술제안입찰 등이 있다.","기술제안입찰에는 기본설계 기술제안입찰과 실시설계 기술제안입찰이 있다.","턴키입찰, 대안입찰 및 기술제안입찰 모두 낙찰자 결정방법이 동일하다."],4]]},"14회":{"재무회계":[[1,"수익이 발생하였으나 그 수익에 대한 대금을 아직 현금으로 수령하지 못한 경우 거래요소에 대한 변 동 관계는?",["수익의 취소와 부채의 감소","부채의 감소와 수익의 발생","비용의 발생과 수익의 발생","자산의 증가와 수익의 발생"],4],[2,"㈜한라는 2019년 10월 1일에 k은행으로부터 10,000,000원을 1년간 차입하였다. 차입금 이자율은 연 12%이며, 이자는 2020년 9월 30일에 원금상환과 함께 지급하기로 하였다. (주)한라의 결산일이 매 년 12월 31일이라고 가정할 때 ㈜한라가 2019년 12월 31일에 해야 할 회계처리는?",["(차) 현금 10,000,000원 (대) 차입금 10,000,000원","(차) 이자비용 3,000,000원 (대) 미지급비용 3,000,000원","(차) 이자비용 3,000,000원 (대) 예수금 3,000,000원","(차) 차입금 2,500,000원 (대) 미지급차입금 2,500,000원"],2],[3,"㈜백두의 수정 전 시산표상 소모품비는 23,000원이고, 기말 현재 사용한 소모품은 16,000원이라고 했을 때 소모품비와 관련한 결산수정분개는?",["(차) 소모품 7,000원 (대) 소모품비 7,000원","(차) 소모품비 7,000원 (대) 소모품 7,000원","(차) 소모품비 16,000원 (대) 소모품 16,000원","(차) 소모품 16,000원 (대) 소모품비 16,000원"],1],[4,"다음의 감가상각에 대한 설명 중 틀린 것은?",["감가상각은 자산의 평가과정이다.","건설 중인 자산은 완성되기 전까지는 감가상각의 대상이 아니다.","유휴상태인 기계도 감가상각대상이다.","정률법이나 이중체감법은 감가상각 내용연수 초기에 감가상각비를 많이 계상하는 가속상각법에 속한"],1],[5,"다음 중 재고자산의 분류에 속하지 않는 자산은?",["원재료","기계장치","반제품","상품"],2],[7,"다음 중 무형자산으로 분류되는 항목은?",["개발비","경상개발비","연구비","위의 3항목 모두 무형자산의 범주에 속한다."],1],[8,"다음은 영업권(goodwill)에 관한 설명이다. 옳지 않은 것은?",["영업권은 한 기업이 동종 산업의 다른 기업에 비하여 정상수익률 이상의 이윤을 획득할 수 있는 초","영업권을 발생시키는 요인은 유리한 점포위치, 충성도가 높은 고객의 확보, 우수한 인력확보 등이","영업권은 일정기간동안 상각을 통하여 원가배분을 한다.","자가 창출영업권은 무형자산으로 인정하지 않는다."],3],[9,"다음 중에서 은행계정조정표 작성 시 회사 측 조정항목이 아닌 것은?",["기 발행 미지급수표","추심어음","부도수표","은행수수료"],1],[10,"현금과부족계정과 관련한 다음의 내용 중 틀린 것은?",["특정시점을 기준으로 회사가 실제 보유하고 있는 현금과 장부상잔액이 일치하지 않는 경우 현금과부","현금과부족계정의 잔액은 차변 또는 대변에 생겨 재무제표에 표시된다.","현금과부족의 원인이 파악되지 않는 경우는 잡손실이나 잡이익으로 대체된다.","현금의 장부상잔액이 실제 보유잔액보다 50원만큼 많음이 확인되면 이 시점에 일단 (차변) 현금과부"],2],[11,"다음 중에서 금융자산과 관련한 내용 중 틀린 것은?",["금융자산으로 분류되기 위해서는 거래당사자간에 계약이 성립되어 있으며, 동 계약에 따라 현금 등","현금, 주식은 금융자산에 속한다.","선급금과 선급비용은 비금융자산에 속한다.","금융자산의 경우 최초인식시점에 원가로 측정한다."],4],[13,"회사채의 할인, 할증, 액면발행과 관련하여 다음의 설명 중에서 틀린 것은?",["할인발행은 회사채의 액면이자율보다 유효이자율이 높을 때 발생한다.","할증발행은 액면가보다 발행가가 높게 발행되는 상황을 말한다.","액면발행은 회사채의 액면이자율과 유효이자율이 일치할 때 발생한다.","할인발행의 경우 시간이 경과할수록 회사채의 장부가액이 점점 작아져 만기가 되면 장부가와 액면가"],4],[14,"12월 31일이 결산기인 기업이 2019년 12월 31일 결산수정과정에서 다음과 같은 계정을 인식하였 다면 이중 2020년 당기순이익을 증가시키는 계정은 총 몇 개인가? 선수수익/ 미지급비용/ 선급비용/",["1개","2개","3개","4개"],1],[15,"다음 중 자본잉여금으로 분류되는 항목은 어느 것인가?",["감자차익","재무구조개선적립금","임의적립금","주식할인발행차금"],1],[16,"다음 중 자본에 속하지 않는 항목은?",["자기주식처분이익","자기주식","감자차손","미지급배당금"],4],[17,"㈜한양은 1월 25일 직원들에게 급여를 지급하는 과정에서 급여 총2,500만원 중 급여에 대한 원천 징수 세액부분 200만원을 제외하고 2,300만원을 지급하였다. 그리고 2월 10일 원천징수세액 200만원 을 과세관청에 납부하였다. 1월 25일 대변에 나타나는 계정과목은 어느 것인가?",["예수금","현금, 예수금","현금","급여"],2],[19,"㈜한국기계공업의 손익계산서에서 판매비와 관리비로 분류되지 않는 항목은 어느 것인가?",["복리후생비","공장건물 감가상각비","광고선전비","접대비"],2],[20,"다음 중 손익계산서에서 나타나는 항목이 아닌 것은?",["선급비용","영업이익","법인세비용","매출원가"],1],[21,"㈜한양의 2020년도 기말수정분개전 법인세비용차감전 순이익은 3,000,000원이다. 결산시 반영할 사항이 아래와 같다면 ㈜한양의 2020년 법인세비용 차감전 순이익은 얼마인가? - 선급보혐료 300,000원 - 미지급임차료 100,000원 - 미수이자 60,000원",["3,260,000원","3,360,000원","3,460,000원","3,560,000원"],1],[22,"다음 중에서 회계추정의 변경에 대한 회계처리방법은 어느 것인가?",["전진법","소급법","당기일괄처리법","상황에 따라 위의 3가지를 선택하여 적용"],1],[23,"다음 중 회계정책의 변경이 아닌 것은?(변경전의 방법과 변경후의 방법이 모두 일반적으로 인정되 는 회계원칙에 속한다고 가정한다.)",["재고자산평가방법의 변경","유가증권 가격의 원가흐름에 대한 가정의 변경","유형자산의 감가상각방법 변경","투자부동산을 원가모형에서 공정가치모형으로 변경하는 경우"],3]],"원가관리회계":[[1,"㈜한국의 기초원재료는 \\20,000이며, 기말원재료는 \\30,000이다. 아래의 자료를 이용하여 직접재료원가 를 구하면 얼마인가? 당기원재료 : \\150,000 보 운 수 입 관 세 : \\5,000 송 료 : \\50,000 [㈜한국 부담] 험",["\\185,000","\\195,000","\\205,000","\\215,000"],3],[2,"㈜한국의 기본원가는 \\200이고, 가공원가는 \\350인 경우 ㈜한국의 직접노무원가는 얼마인가? 단, ㈜한 국의 제조간접원가는 직접재료원가의 2배이다.",["\\50","\\100","\\150","\\200"],1],[3,"㈜한국의 당기 직접재료원가는 \\80,000이며, 가공원가는 \\300,000이다. 기초재공품과 기말재공품이 \\50,000으로 같을 때, ㈜한국의 당기총제조원가와 당기제품제조원가의 차이는 얼마인가?",["\\0","\\30,000","\\120,000","\\170,000"],1],[4,"다음 중 복수의 보조부문이 존재하는 경우의 원가배분방법에 대한 설명으로 옳지 않은 것은?",["직접배분법은 보조부문 상호 간의 용역수수 관계를 고려하는 방법이다.","단계배분법은 보조부문 상호 간의 용역수수 관계를 부분적으로 고려하는 방법이다.","상호배분법은 보조부문 간의 용역수수 관계를 전부 고려하는 방법이다.","복수의 보조부문이 있는 경우 상호 간에 용역을 주고받는 경우 이를 적절하게 고려하면서 보조부문"],1],[5,"다음은 ㈜한국의 당기제조원가에 관한 자료이다. 다음 자료를 이용하여 계산한 ㈜한국의 당기총제조원가는 얼마인가? 기 원재료 초 당기발생액 \\200 기 말 \\150 원재료 매입액 \\300 기본원가 \\400 가공원가 \\300 - 56 -",["\\350","\\450","\\550","\\650"],4],[6,"다음은 ㈜한국의 당기 제조원가에 관한 자료이다. 다음 자료를 이용하여 계산한 ㈜한국의 당기제품제조원 가는 얼마인가? 원재료 재공품 원재료 매입액 기 초 \\150 당기발생액 기 말 \\200 \\130 \\150 \\170 직접노무원가 \\50 제조간접원가 \\80",["\\120","\\230","\\250","\\300"],2],[7,"㈜한국은 #01, #02 두 가지 작업을 착수해서 진행하고 있으며, 동 작업에 관한 작업원가표는 아래 표와 같다. 구 분 직접재료원가 #01 \\100,000 #02 \\100,000 직접노무원가 \\200,000 \\600,000 직접노동시간 300시간 500시간 ㈜한국은 직접노동시간을 통해 제조간접원가를 배부하고 있는 경우, 제시된 자료를 통해 산출된 제조간접",["\\200","\\500","\\1,000","\\2,000"],2],[8,"㈜한국의 매출총이익률은 매출액의 20%인 경우 다음 자료를 이용하여 기초재공품을 구하면 얼마인가? 단, ㈜한국은 당기에 생산한 제품을 전부 판매하였으며, 기초 및 기말 제품재고는 없다고 가정한다. 직접재료원가 : \\40,000 기말재공품 : \\15,000 직접노무원가 : \\20,000 매 출 액 : \\102,000 제조간접원가 : \\30,000",["\\6,600","\\10,000","\\12,500","\\15,000"],1],[9,"다음은 ㈜한국의 당기 제조원가에 관한 자료이다. 기 원재료 초 기 \\150,000 말 \\135,000 - 57 - 재공품 \\270,000 \\230,000 제 \\180,000 \\195,000 품 ㈜한국의 당기원재료 매입액은 \\160,000이며, 직접노무원가와 제조간접원가는 각각 \\125,000과 \\180,000이다. ㈜한국의 매출액이 \\650,000인 경우 ",["\\115,000","\\125,000","\\120,000","\\145,000"],4],[10,"㈜한국은 #01, #02, #03 세 가지 작업을 착수해서 진행하고 있으며, 동 작업에 관한 작업원가표는 아래 표와 같다. 구분 #01 #02 #03 합 계 기초재공품원가 \\132,500 \\175,000 \\143,000 \\450,500 직접재료원가 \\130,000 \\127,460 \\166,700 \\424,160 직접노무원가 \\127,000 \\132,400 ",["\\818,360","\\1,227,540","\\1,268,860","\\1,678,040"],2],[11,"제조부문과 보조부문의 원가가 동시에 발생하는 제조기업에서 보조부문원가의 배분에 관한 설명으로 가 장 옳은 것은 무엇인가?",["보조부문은 제조활동에 직접 관여하지 않는 부문을 의미하기 때문에 제조활동을 촉진하거나 보조하","보조부문에서 발생된 제조간접원가는 제품별 집계만 하고, 제조부문별 집계는 할 필요가 없다.","단일배분율법의 경우 발생된 제조간접원가에 대하여 변동원가와 고정원가를 구분하지 않고, 실제 사","이중배분율법의 경우 변동원가는 최대 사용가능량을 기준으로 하고, 고정원가는 실제 사용량을 기준"],3],[12,"㈜한국은 제조부문으로 #101, #102 두 가지 부문이 있고, 보조부문으로 전력부문이 있다. 전력부문에서 발생된 원가는 \\1,000,000이며, 동 원가의 변동원가와 고정원가 비율은 동일하다. ㈜한국이 동 보조부문에 대한 원가를 단일배분율법을 적용하는 경우 #101에 배부될 보조부문 원가는 얼마인가? (단, 전력부문에 대한 전력사용 정보는 다음과 같다.)",["\\300,000","\\400,000","\\500,000","\\600,000"],4],[13,"다음 중 정상개별원가계산에 대한 내용으로 옳지 않은 것은 무엇인가?",["정상개별원가계산의 원가계산시점은 제품생산 완료시점이다.","정상개별원가계산은 예정배부율에 예정조업도를 곱하여 제조간접원가를 배부한다.","정상개별원가계산의 주요 정보이용자는 외부정보이용자가 아닌 내부정보이용자이다.","정상개별원가계산은 직접재료원가와 직접노무원가를 실제발생액을 기준으로 배부한다."],2],[16,"㈜한국은 A부문과 B부문을 통해 제품을 생산하고 있으며, 각 부문에 대한 자료는 다음과 같다. 제조간접원가 A 부 문 \\800,000 B 부 문 \\600,000 합 계 \\1,400,000 노 동 시 간 400시간 600시간 1,000시간 기 계 시 간 200시간 500시간 700시간 ㈜한국은 제품 Z를 생산하면서 A부문은 기계시간, B부문은 노동시간을 기준",["\\100,000","\\200,000","\\300,000","\\400,000"],3],[17,"다음 중 공손에 대한 설명으로 가장 옳지 않은 것은 무엇인가?",["공손품은 품질표준에 미달해서 품질검사에서 불합격한 불량품을 말한다.","공손품에 대한 원가는 어떻게 배분할 것인지에 따라 정상공손과 비정상공손으로 구분되며, 생산과","정상공손은 효율적 작업환경에서 나타나는 공손으로 정상제품을 생산하는 과정에서 피할 수 없이 발","비정상공손은 효율적 작업환경에서는 나타나지 않았어야 하는 공손으로 회피할 수 있는 공손을 말한"],2],[18,"㈜한국은 A부문과 B부문을 통해 제품을 생산하고 있으며, A부문은 노동시간, B부문은 기계시간을 기준 으로 제조간접원가를 배부하고 있다. 제조간접원가 A 부 문 \\800,000 B 부 문 \\700,000 합 계 \\1,500,000 노 동 시 간 200시간 600시간 800시간 기 계 시 간 350시간 350시간 700시간 ㈜한국은 甲제품과 乙제품을 생산하고",["\\950,000","\\1,000,000","\\1,900,000","\\2,200,000"],4],[21,"다음 중 종합원가계산에 대한 설명으로 옳지 않은 것은?",["종합원가계산은 한 가지 제품을 대량생산하는 제조환경에서 원가계산을 효과적으로 하기 위한 원가","종합원가계산은 일정기간 동안 발생한 제조원가를 일정기간 동안 생산된 산출량으로 나누어 평균화","종합원가계산은 공정에 투입된 원가를 당기제품제조원가와 기말재공품에 배분시 배분기준을 완성품","일반적으로 종합원가계산에서는 원가요소를 재료원가와 가공원가로 구분해서 완성품환산량을 계산한"],2],[22,"20×1년 설립된 ㈜한국은 혼합공정을 통해 의약품을 생산한다. ㈜한국은 20×1년 1,000개의 의약품을 생 산할 수 있는 원료를 투입하여 800개의 의약품을 생산하였으며, 200개는 80%가 완성된 상태로 기말재공품 으로 남아 있다. ㈜한국의 가공원가의 완성품환산량은 얼마인가? (단, 원료를 공정의 착수시 전부 투입되었으 며, 가공원가는 공정 전반에 걸쳐",["160개","200개","800개","960개"],4],[23,"다음 중 결합원가에 대한 설명으로 가장 옳지 않은 것은 무엇인가? - 61 -",["결합원가의 계산을 위해 분리점 이후에도 각 결합제품은 동일한 제품으로 인식한다.","결합제품이 일정한 생산단계에 도달하여 개별제품으로 분리되는 시점을 분리점이라고 한다.","결합원가는 분리점에 도달하기까지 결합제품을 생산하는 과정에서 발생한 모든 제조원가를 말한다.","분리점 이후에 추가적인 가공 등을 위하여 발생된 원가를 분리원가 또는 추가가공원가라고 한다."],1],[24,"㈜한국은 원유 10,000배럴(bbl)을 정제공정을 거쳐 휘발유, 경유, 중유를 생산하였으며, 휘발유, 경유, 중 유의 생산비율은 5:3:2의 비율이다. 분리점 이전 발생한 제조원가가 다음과 같을 경우 물량기준법에 따라 결 합원가를 결합제품에 배부하는 경우 휘발유의 단위당 제조원가는 얼마인가? 직접재료원가 직접노무원가 제조간접원가 합 계 \\600,000 \\",["\\300,000","\\400,000","\\500,000","\\1,200,000"],4]],"제조원가실무":[[1,"다음 원가에 관한 설명 중에서 틀린 것은 어느 것인가?",["재공품이란 공장에서 생산과정 중에 있는 물품 중 현재상태로 팔 수 있는 것을 말한다.","가공원가란 직접재료비와 직접노무비를 합한 금액을 말한다.","공장의 기계장치를 가동하는데 소비되는 전력비는 혼합원가에 해당한다.","개별원가계산은 서로 다른 종류의 제품을 주문 생산하는 경우에 적합하다."],1],[2,"㈜한국의 생산직 근로자 급여는 월 20일 근무기준으로 지급되는데, 월 20일을 초과하여 근무하면 기본급 2,000,000원에 추가적으로 시간당 15,000원이 지급된다. 이 경우 생산직 근로자 급여의 원가행 태는 무엇인가?",["고정원가","변동원가","준고정원가","혼합원가"],4],[3,"㈜기업의 기초원가는 300,000원이고 가공원가는 400,000원이다. ㈜기업의 제조간접비가 200,000원 일 때 직접재료비는 얼마인가?",["100,000원","150,000원","200,000원","250,000원"],1],[4,"원가계산은 제조형태별 원가계산방식에 따라 개별원가계산과 종합원가계산으로 분류할 수 있다. 다 음 개별원가계산과 종합원가계산을 비교한 내용 중 틀린 것은 어느 것인가? 구 분 개별원가계산 종합원가계산",["생산형태","원가집계방법","주요원가자료","원가계산핵심"],4],[5,"㈜한국의 재고자산계정의 기말재공품 금액이 기초재공품 금액보다 감소하였을 경우 다음 중 설명이 옳은 것은 어느 것인가?",["당기총제조원가가 제품제조원가보다 작다.","당기총제조원가가 제품 서상 단가가 예정가격조서 단가보다 높은 경우 감액 조치하겠다고 하는 경우","예정가격 작성 시 원가계산의 착오로 공사비를 과다 계상한 사실이 계약체결 후 발견된 경우 계약"],3],[4,"추정가격, 추정금액과 예정가격에 관한 설명 사항 중 바르게 설명된 것은 어느 것인가?",["추정가격은 예정가격 결정 이후에 산정된다.","예정가격은 입찰이나 계약체결 후에 낙찰자 및 계약금액의 결정기준으로 삼기 위하여 미리 작성하","예정가격은 국제입찰 대상, PQ 대상 및 수의계약 대상 등의 기준으로 삼기 위하여 예산에 계상된","추정금액은 부가가치세와 관급자재로 공급될 부분의 가격을 합한 금액이다."],4],[5,"국제입찰의 대상인지를 판단하는 기준 등으로 삼기 위하여 산정된 가격과 입찰이나 계약체결 전에 낙찰자 및 계약금액의 결정기준으로 삼기 위하여 미리 작성하여 갖춰 두는 가액을 순서대로 바르게 나 열한 것을 고르시오.",["추정가격, 예정가격","추정금액, 예정가격","고시금액, 추정가격","추정가격, 고시금액"],1],[7,"다음 중 경쟁입찰에 의한 낙찰자 결정방식이 아닌 것을 고르시오.",["협상에 의한 계약체결","적격심사에 의한 계약","2인 이상 전자견적에 의한 계약","설계공모에 의한 낙찰자 결정"],4],[8,"지방계약법령에 따라 재산의 매각 등 수입이 원인이 되는 입찰에서의 낙찰자 결정방법은?",["예정가격 이상 최저가격 입찰자","예정가격 이상 최고가격 입찰자","예정가격 이하 최저가격 입찰자","예정가격 이하 최고가격 입찰자"],2],[9,"다음 중 입찰공고 전에 계약담당공무원이 결정해야 할 사항이 아닌 것은 어느 것인가?",["일반경쟁입찰 등 계약의 방법에 관한 사항","적격심사 대상 등 낙찰자 결정에 관한 사항","선금, 기성급, 개산급 지급대상에 관한 사항","지역제한 등 입찰 참가자격에 관한 사항"],4],[10,"다음은 공사원가 계산 시 공사손해보험의 가입 및 보험료의 산정에 관한 내용이다. 잘못 기술된 것 은 어느 것인가?",["공사손해보험은 계약상대자 뿐만 아니라 발주기관도 가입할 수 있다.","관급자재가 있을 경우에는 총공사원가에 관급자재를 포함한 금액에 보험료율을 곱하여 산정한다.","계약담당자는 일괄·대안입찰 대상공사 및 특정공사에 대해서는 의무적으로 공사손해보험에 가입토","계약담당자는 추정가격 200억원 이상인 도로공사는 공사손해보험에 의무적으로 가입토록 하여야"],2],[11,"지방자치단체가 긴급한 재해복구계약 또는 입차·운송·보관 계약 등 그 성질상 중단할 수 없을 때에 적용하기 적합한 계약은 어느 것인가?",["협상에 의한 계약","회계연도 시작 전 계약","개산계약","수의계약"],1],[12,"다음 중 공동계약의 형태로 볼 수 없는 것은 어느 것인가?",["혼합방식","주계약자관리방식","공동·분담이행방식","계속비 계약방식"],4],[14,"입찰과 관련하여 설명한 것 중 틀리게 설명한 것은 어느 것인가?",["경쟁입찰은 2인 이상의 유효한 입찰로 성립한다.","입찰자나 낙찰자가 없는 경우 또는 낙찰자가 계약을 체결하지 않는 경우 다시 공고하여 입찰에","재공고 입찰은 반드시 재입찰을 실시한 후에 실시하여야 한다.","재공고 입찰 시에는 보증금과 기한을 제외하고는 최초에 입찰에 부칠 때 정한 가격, 기타의 조건"],2],[15,"다음 중 부정당업자의 입찰 참가자격을 갈음하는 과징금 부과 대상의 사유에 해당되지 않는 것은 어느 것인가?",["사기 등으로 입찰 등에 자치단체에 손해를 끼친 경우","급격한 경제 여건 변화로 계약 체결을 못한 경우","발주자에 의해 계약의 주요 내용 변경으로 계약을 불이행한 경우","금액단위의 오기 등 명백한 단순착오로 가격을 잘못 제시하여 계약을 체결하지 못한 경우"],3],[16,"다음 중 1인으로부터 받은 견적서에 따라 수의계약을 할 수 없는 경우는 어느 것인가?",["추정가격 5천만원 중소기업","추정가격 5천만원 여성기업","추정가격 5천만원 자활기업","추정가격 5천만원 사회적기업"],2],[17,"다음은 정부계약의 종류에 관하여 설명해 놓았다. 그 중 틀리게 설명한 것은 어느 것인가?",["계약목적물에 따라 공사계약, 물품계약 및 용역계약 등으로 나눌 수 있다.","계약금액의 사전 확정여부에 따라 확정계약과 개산계약으로 나눌 수 있다.","협상에 의한 계약은 경쟁방법과 협상절차가 혼합된 계약방법이라 할 수 있다.","2단계 경쟁입찰은 공사계약에도 적용되고 있다."],4],[19,"정부계약에서 계약체결과 관련하여 설명한 것 중 바르게 설명한 것은 어느 것인가?",["정부계약은 서면으로 계약서를 작성하는 것을 원칙으로 하고 있지 않다.","계약은 계약서를 작성하는 경우 계약당사자가 계약서에 기명하고 날인 또는 서명함으로써 확정된","계약체결은 낙찰통지를 받은 후 즉시 체결하여야 한다.","정부계약에는 아직 전자계약제도가 도입되어 있지 않다."],4],[20,"다음은 국가계약에서 부정당업자의 입찰참가자격 제한조치(제재)와 관련하여 설명해 놓았다. 그 중 맞지 않게 설명한 것은 어느 것인가 ?",["부정당업자 제재조치에 대한 제척기간이 없다.","각 중앙관서의 장이 제재주체가 된다.","장기계속계약의 경우 계약이행 중 부정당업자 제재조치를 받아도 다음 차수계약을 체결할 수 있","부정당업자 제재조치에 대한 불복 시에는 행정소송 절차에 따른다."],3],[21,"국가계약에서 분쟁해결제도와 관련하여 설명한 것 중 틀린 것은 어느 것인가?",["일반적인 분쟁해결 방법으로는 조정과 중재뿐이다.","중재절차는 당사자 간의 중재합의가 있어야 가능하다.","국가계약에 대한 분쟁조정기구로 기획재정부에 국가계약분쟁조정위원회가 설치되어 있다.","국가계약분쟁조정위원회의 조정안에 대해 당사자가 이의를 제기하지 않으면 재판상의 화해와 같은"],1],[22,"정부계약에서 선금지급에 관하여 설명한 것 중 틀린 것은 어느 것인가?",["선금지급은 임의사항으로서 의무적으로 지급할 필요가 없다.","선금은 노임이나 자재구입비 등에 우선 충당토록 하기 위해 지급하는 것이다.","물품구매계약의 경우는 선금지급 대상이 아니다.","입찰참가자격 제한조치 중에 있는 자는 선금지급 대상에서 제외된다."],4],[23,"정부계약에서 계약의 해제 또는 해지 사유와 관련하여 바르지 않게 설명한 것은 어느 것인가? - 82 -",["청렴계약 체결 후 계약상대자가 이를 위반한 때","계약상대자의 책임 없는 사유로 준공기한까지 공사를 완성하지 못한 때","객관적으로 명백한 발주기관의 불가피한 사정이 발생한 때","설계변경에 따른 공사내용 변경으로 계약금액이 100분의 40 이상 감소되었을 때"],4]]},"15회":{"재무회계":[[1,"다음 거래 중 자산의 증가를 발생시킬 수 없는 거래로 옳은 것은 어느 것인가?",["은행차입금으로 토지를 구입하다.","대표이사에게 현금을 대여하다.","외상으로 매출이 발생되다.","유상증자를 실시하다."],2],[2,"다음은 회계의 순환과정 중 일부를 기술한 것이다. 회계의 순환과정을 순서대로 기술한 것으로 옳은 것은? A. 전기 B. 분개 C. 수정전시산표 작성 D. 수정분개 E. 재무제표 작성 F. 거래와 사건의 식별",["A, B, C, E, D, F","A, B, D, C, E, F","F, A, B, C, D, E","F, B, A, C, D, E"],4],[3,"다음 자료에 의하여 이우제조(주)의 매출원가를 산출하면 얼마인가? (1) 기초재고 160,000원 (2) 당기매입액 480,000원 (3) 매입관련 비용: 매입운임 20,000원, 보험료 10,000원, 관세 4,000원 (4) 매입할인액 1,000원 (5) 관세환급금 2,000원 (6) 기말재고 280,000원 다만, 미착상품 20,000원은 선적지 인도",["361,000원","371,000원","373,000원","391,000원"],2],[4,"미래제조(주)는 재고자산평가방법의 적용에 대해 고민을 하고 있다. 후입선출법을 적용할 때 기말재 고자산금액은 얼마인가? 다만, 회사는 실지재고조사법을 적용하고 있다. 일자 입고 - 66 - 출고 기초(1월 1일) 100개×10원 1,000원 4월 1일 100개×15원 1,500원 7월 1일 150개 10월 1일 100개 ×20원 2,000원 12월 1일 3",["1,200원","1,300원","1,800원","2,300원"],2],[5,"다음은 전환사채와 신주인수권부사채에 대한 설명이다. 옳지 않은 것은?",["신주인수권부사채권자가 신주인수를 행사하여도 만기에 해당 사채에 대한 상환의무가 있다.","전환사채를 전환하면 전환 후 더 이상 전환한 부분에 대한 전환사채이자비용은 발생하지 않는다.","신주인수권부사채권자가 신주인수를 행사하여도 이자비용은 소멸되지 않는다.","전환사채는 전환 시 별도의 주금 납입이 필요하다."],4],[6,"미래건설(주)는 2013년 7월 1일 계약금액 80,000원인 용역계약을 수주하였다. 해당 용역은 2015년 6월 30일까지는 전부 제공될 예정이며, 원가는 48,000원으로 추정된다. 실제로 발생한 누적원가는 다 음과 같다. 2014년도 회사가 인식하는 당기수익은 얼마인가? 구분 2013년 2014년 2015년 누적원가 9,600원 28,800원 48,0",["12,800원","16,000원","24,000원","32,000원"],4],[7,"일우제조(주)는 사무직 직원을 위해 사무용 컴퓨터를 20xx년 7월 1일 구입하였다. 회계담당자가 해 당 컴퓨터를 장부에 기록하기 위한 계정과목으로 옳은 것은?",["기계장치","차량운반구","비품","구축물"],3],[8,"다음 중 유동부채에 해당되지 않는 것은 어느 것인가?",["선급비용","미지급비용","미지급금","선수금"],1],[9,"유형자산의 취득 초기에는 많은 감가상각비를 인식하다가 시간의 경과와 더불어 점점 적은 감가상 각비를 인식하는 방법은 다음 중 어느 것인가? - 67 -",["정액법","정률법","생산량비례법","시가법"],2],[10,"다음 중 무형자산으로 구분되지 않는 것은 어느 것인가?",["창업비","개발비","광고선전비","영업권"],3],[11,"사채를 현금으로 액면발행 할 때의 회계처리는 다음 중 어느 것인가?",["<차변> 현","<차변> 현","<차변> 사","<차변> 이자비용"],1],[12,"다음 자료를 이용하여 수익을 계산하면 얼마인가? 매출액: ￦5,000",["￦14,000","￦12,000","￦9,000","￦5,000"],3],[13,"삼진제조(주)는 신규투자를 위해 유상증자를 통해 주주들로부터 자본을 조달하기로 하였다. 2014 년 7월 10일 액면금액 1억 원에 대해 발행금액은 150,000,000원이다. 발행에 따르는 주식발행비용으 로 1,000,000원이 지출되었다. 주식발행초과금으로 옳은 것은?",["1,000,000원","49,000,000원","50,000,000원","51,000,000원"],2],[14,"다음 중 유형자산(Tangible assets)은 어느 것인가?",["상품","광업권","비품","산업재산권"],3],[15,"농수산물을 중개하고 있는 유통(주)는 20xx년 8월 1일 AA과수원으로부터 사과를 10,000,000원 어치 구입하였다. 회계상 사과의 인식방법으로 옳은 것은 어느 것인가?",["상품으로 재고자산으로 분류된다.","상품으로 투자자산으로 분류된다.","제품으로 재고자산으로 분류된다.","제품으로 투자자산으로 분류된다."],1],[17,"다음은 전자상거래업을 영위하는 ㈜신라의 2020년 퇴직급여와 관련한 회계정보이다. 2020년에 ㈜ 신라가 손익계산서에 비용으로 계상할 퇴직급여액은 얼마인가? 구 분 2019년 2020년 12월말 퇴직급여충당부채잔액 30,000,000원 55,000,000원 퇴직금 현금지급액 0원 17,000,000원",["17,000,000원","42,000,000원","48,000,000원","52,000,000원"],2],[18,"다음은 계속기록법에 의해 기록된 (주)한국의 6월 매입과 매출자료이다. 평균법을 적용하여 6월 말 의 재고자산금액을 결정하면 얼마인가? (단, 재고자산 감모손실과 평가손실은 없다) 입출고 일자 구분 수량 단가 6.01 월초재고 100개 \\100 6.07 매 입 100개 \\120 6.15 매 출 100개 6.23 매 입 200개",["\\36,000","\\39,000","\\37,500","\\40,000"],2],[19,"기업 외부의 불특정다수로 구성되어 있는 이해관계자의 경제적 의사결정에 유용한 정보를 제공하 기 위한 회계는?",["세무회계","재무회계","원가회계","관리회계"],2],[20,"다음 보기의 자료 중 현금 및 현금성자산으로 계상해야 할 금액은 얼마인가? - 69 - ·지폐 \\30,000 ·우표 \\20,000 ·수입인지 \\30,000 ·임차보증금 \\50,000",["\\32,000","\\82,000","\\110,000","\\130,000"],1],[21,"자산, 부채 및 자본과 관련한 내용 중 올바르지 않은 것은 어느 것인가?",["자산이 갖는 미래 경제적효익이란 직접으로 또는 간접으로 미래 현금 및 현금성자산의 기업에의","주식회사의 경우 소유주가 출연한 자본, 이익잉여금, 이익잉여금 처분에 의한 적립금, 자본유지조","자본은 기업의 자산에서 모든 부채를 차감한 후의 잔여지분이다.","부채는 과거 사건에 의하여 발생하였으며 경제적 효익을 갖는 자원이 기업으로부터 유출됨으로써"],4]],"원가관리회계":[[1,"다음은 원가-조업도-이익(CVP)분석에 대한 설명이다. 이중 옳지 않은 것은?",["손익분기점에서 영업이익이 0이므로 법인세가 발생하지 않는다.","손익분기점에서 공헌이익과 고정원가가 일치한다.","손익분기점에서 공헌이익과 변동원가가 일치한다.","손익분기점 판매량은 고정원가를 단위당 공헌이익으로 나눈 값이다."],1],[2,"다음은 원가구조 및 영업레버지리에 관한 설명이다. 이중 옳지 않은 것은?",["변동원가의 비중이 큰 기업은 공헌이익률이 낮다.","고정원가의 비중이 큰 기업은 공헌이익률이 높다.","고정원가의 비중이 큰 기업은 매출액의 변화에 민감하다.","고정원가의 비중이 큰 기업은 영업레버리지가 낮다."],3],[3,"(주)서초전자는 영업이익이 ￦15,000이고 영업레버리지가 2.5이다. 만약 매출액이 40% 증가하였다 면 (주)서초전자의 영업이익은 얼마인가?",["20,000원","25,000원","30,000원","35,000원"],4],[4,"다음 중 표준원가의 한계점은 어느 것인가?",["제품원가계산이 쉽고 회계처리가 신속하다.","표준원가를 이용하여 제품 가격을 신속하게 결정한다.","표준원가는 책임회계제도의 실행을 촉진한다.","생산기술이 안정화되고 기업업무의 변화가 적은 상황에 유용하다."],4],[5,"다음 중 사업부분의 구조조정 시 고려해야할 원가는 어느 것인가?",["통제불가능원가","회피불가능원가","관련원가","기회원가"],3],[6,"다음은 제조예산에 관한 것이다. 이 중 제조예산이 아닌 것은?",["예상판매량과 기말제품재고량을 충족시키기 위한 제품생산량을 나타내는 예산","제품생산량 = 제품판매량 - 기말제품재고량 + 기초제품재고량","제품생산량 = 제품판매량 + 기말제품재고량 - 기초제품재고량","제조예산은 판매계획과 재고계획에 의하여 수립한다."],2],[7,"다음 중 의사결정 시 고려하지 않는 원가는 어느 것인가? - 62 -",["기회원가","매몰원가","관련원가","차액원가"],1],[8,"다음 중 자본예산기법에 대한 설명에 해당하는 것은 어느 것인가?",["자본예산은 긴급한 상황에 이루지는 의사결정 기법이다.","자본예산은 장기의사결정이다.","자본예산은 단기의사결정이다.","자본예산은 현재의 현금유출액을 대상으로 한다."],2],[9,"다음 중 자본예산 분석절차는?",["투자기회 탐색→정보수집→자금조달→투자안선택→투자안의 수행 및 사후관리","투자기회 탐색→정보수집→투자안선택→자금조달→투자안의 수행 및 사후관리","정보수집→투자기회 탐색→자금조달→투자안선택→투자안의 수행 및 사후관리","정보수집→자금조달→투자기회 탐색→투자안선택→투자안의 수행 및 사후관리"],2],[10,"다음은 순현재가치법이 내부수익률법보다 우월한 점이다. 이 중 옳지 않은 것은?",["가치의 가산원칙이 성립한다.","위험에 대한 조정이 용이하다.","자본비용이 변하는 경우에는 내부수익률법의 적용이 용이하다.","내부수익률이 존재하지 않거나 여러 개가 존재할 수 있다."],4],[11,"다음 중 투자수익률(ROI)을 정확히 나타낸 것은 어느 것인가?",["매출액순이익율×총자산회전율","매출액순이익율+총자산회전율","매출액순이익율-총자산회전율","매출액순이익율÷총자산회전율"],3],[12,"다음은 내부수익률법에 대한 설명이다. 이중 옳은 것은?",["화폐의 시간가치를 무시한다.","사업대상에 대한 투자로 발생되는 현금유출액과 사업대상으로부터 산출되는 현금유입액이 일치하","사업대상에 대한 투자로 발생되는 현금유출액과 사업대상으로부터 지출되는 비용과 일치하는 금액","사업대상에 대한 투자로 발생되는 현금유출액의 현재가치와 사업대상으로부터 산출되는 현금유입"],1],[13,"김갑순은 친척으로부터 상속을 받게 되었다. 그런데 김갑순은 앞으로 10년 말에 200,000천원을 받 거나, 혹은 앞으로 10년 동안 매년 연말에 14,000천원을 받는 안 중에서 현재가치가 높은 방법을 선택 하려고 한다. 김갑순은 최저 필요수익률은 12%를 고려하고 있다. 두 가지 방법의 현재가치 차이는 얼 마인가? - 63 - - 필요수익률 연 12% ",["14,000천원","14,400천원","14,700천원","15,000천원"],4],[14,"(주)서초의 원가관련 자료는 다음과 같다. 변동제조원가는 ￦700, 변동 판매 및 일반관리비 ￦200, 고정제조간접원가 ￦300 및 고정 판매 및 일반관리비 ￦150이다. 만약 회사가 전부원가에 의한 원가보 상율이 120%라면 회사가 부가하는 가격은 얼마인가?",["￦650","￦840","￦1,200","￦2,200"],1],[15,"다음 중 손익분기점 분석의 가정이라고 볼 수 없는 것은 어느 것인가?",["단위당 판매가격은 일정하다.","원가는 고정원가와 변동원가로 구분된다.","생산된 것이 모두 판매되는 것은 아니다.","원가에 영향을 미치는 요인은 조업도이다."],1],[16,"다음 중 종합예산에 포함되지 않는 것은 어느 것인가?",["판매예산","제조원가예산","자본지출예산","매출원가예산"],1],[17,"다음 중 생산과정에서 원재료를 효율적으로 사용하지 못하여 발생하는 차이는 무엇인가?",["직접노무원가 능률차이","직접재료원가 능률차이","직접노무원가 가격차이","직접재료원가 가격차이"],3],[18,"다음은 직접노무비에 대한 불리한 임률차이와 유리한 능률차이에 대한 내용이다. 올바르게 나타낸 것은?",["단순작업에 고임금 숙련공이 많이 투입되었다.","생산계획의 변동으로 타부서의 미숙련공이 투입되었다.","불량원재료의 사용으로 생산성이 감소되었다.","높은 기술이 필요한 작업에 낮은 인금의 미숙련공이 투입되었다."],3],[19,"다음은 ㈜서울의 8월 중 원가내역이다. - 제품단위당 원재료 표준투입량 2㎏ - 원재료 실제투입량 3,000㎏ - 원재료 단위당 실제구입가격 \\1,200 - 제품완성량 1,400개 - 재료비 능률차이 \\250,000 불리 - 64 - 원재료의 가격차이는 얼마인가?",["\\100,000 유리","\\150,000 유리","\\100,000 불리","\\150,000 불리"],2],[20,"다른 조건이 같다면 전부원가계산에 의한 당기순이익보다 변동원가계산에 의한 당기순이익이 더 큰 경우는 다음 중 어느 것인가?",["판매량이 생산량을 초과한 경우","생산량이 판매량을 초과한 경우","생산량과 판매량이 같을 경우","고정제조원가가 증가한 경우"],2]],"제조원가실무":[[1,"당기 중 원재료 매입액은 450,000원, 직접노무원가는 200,000원, 제조간접원가는 직접노무원가의 150%이다. 재고 현황이 다음과 같을 때 옳지 않은 것은? 구 분 기 초 기 말 원재료 150,000원 220,000원 재공품 160,000원 250,000원 제 300,000원 180,000원 품",["직접재료원가는 원재료 계정에서 380,000원으로 계산할 수 있다.","당기총제조원가는 880,000원이며, 당기의 자원 소비액이다.","당기제품제조원가는 재공품 계정 대변에 790,000원으로 표시된다.","매출원가는 890,000원이며, 제조원가명세서에 표시된다."],4],[2,"㈜기업이 특정 제품 생산을 위하여 소비한 원가와 판매 관련 자료가 다음과 같을 때 틀린 것은? 단, 본사는 기획 및 마케팅, 공장은 제품 생산 기능을 담당하고 있으며, 제시된 자료는 모두 단위당 기준이다. • 직접재료 소비 10,000원 • 직접노무인력 임금 25,000원 • 공장장 및 공장 관리인력 급여 5,000원 • 공장 설비 감가상각비 12,000원",["노무원가는 30,000원, 경비원가는 12,000원이다.","총원가는 77,000원이다.","기본원가는 35,000원, 전환원가(가공원가)는 42,000원이다.","제품의 판매가격은 89,200원이다."],4],[3,"회사의 원가관련 자료가 다음과 같을 때 선입선출법과 평균법에 의한 직접재료원가의 완성품환산량 차이는? 단, 공손은 없다. - 85 - • 기초재공품 : 300개(완성도 60%) • 완성품 수량 : 3,000개 • 기말재공품 : 500개(완성도 50%) • 원재료는 공정 초에 전량 투입되며, 가공원가는 공정 전반에 걸쳐 균등하게 발생한다.",["100개","200개","300개","400개"],3],[4,"㈜강원은 표준원가계산제도를 채택하고 있다. ㈜강원의 다음 5월의 자료를 이용하여 5월 실제 생산 량을 구하면? • 정상조업도 : 1,000단위 • 고정제조간접원가 예산 : 27,000원 • 예산차이 : 2,500원 유리 • 조업도차이 : 2,700원 유리",["800단위","900단위","1,000단위","1,100단위"],4],[5,"㈜경기는 A부문과 B부문을 운영하고 있으며, 부문공통원가로 건물 감가상각비 900,000원과 공장장 급여 2,000,000원, 전력비 500,000원이 있다. 다음의 자료를 이용하여 부문공통원가를 배부할 경우 A 부문에 배부될 금액은? 구 분 A부문 B부문 합 건물 면적 2,000㎡ 1,000㎡ 3,000㎡ 전력소비량 350kw/h 650kw/h 1,000",["1,430,000원","1,575,000원","1,740,000원","1,760,000원"],2],[6,"다음 사항 중 정부원가계산 기준에 있어 재료소요량 산출 시에 포함되어야 할 대상이 아닌 것은?",["정미량","불량량(보수 또는 재가공 가능한 불량품)","손실량","시료량(규격서에 명시)"],2],[7,"다음 중「국가를 당사자로 하는 계약에 관한 법률」시행령 제9조에 의한 예정가격의 결정기준으로 옳지 않은 것은?",["적정한 거래가 형성된 경우 거래실례가격","계약의 특수성으로 인해 적정한 거래실례가격이 없는 경우 일반적으로 인정되는 회계원칙에 의해","공사의 경우 공사의 종류별로 산정한 표준시장단가로서 중앙관서의 장이 인정한 가격","기타의 경우 감정가격, 유사한 물품․공사 등의 거래실례가격 또는 견적가격"],2],[8,"변동원가계산에 대한 설명 중 옳은 것은? (가) 원가를 행태별로 분류하는 공헌이익손익계산서를 사용한다. (나) 고정제조간접원가 중 판매수량 해당분만을 매출원가에 포함된다. (다) 기말재고자산은 변동원가계산보다 전부원가계산의 영업이익을 더 작게 하는 효과가 있다. (라) 제품 생산량은 영업이익에 영향을 미치지 않는다. (마) 판매비 및 관리비에 대한 처리는 ",["가, 나, 라, 마","가, 라, 마, 바","나, 다, 라, 바","나, 다, 마, 바"],2],[9,"다음은 (주)세운의 201x년 기말 현재 원가자료이다. 제조간접원가 과대배부액 80,000원을 매출원 가조정법과 원가요소 비례배분법에 의해 각각 배부할 경우 이익에 미치는 차이 금액은 얼마인가? 구 분 재 공 품 제 품 매 출 원 가 직접재료원가 50,000원 80,000원 100,000원 직접노무원가 60,000원 160,000원 170,000원 제조간접",["원가요소비례배분법에 의해 배부하는 경우가 이익이 50,000원 더 크다.","원가요소비례배분법에 의해 배부하는 경우가 이익이 48,000원 더 작다.","매출원가조정법에 의해 배부하는 경우가 이익이 50,000원 더 작다.","매출원가조정법에 의해 배부하는 경우가 이익이 48,000원 더 크다."],2],[10,"(주)조선은 5월 중 #101, #102, #103을 작업하였다. 이 중 #101은 5월에 완성 후 주문자에게 인 도하였고, #102은 5월에 작업 완료하였으나 아직 미인도 상태이며, #103은 6월에 작업 완료 예정이 다. 5월 중 제조간접원가는 총 2,000원이며, 직접노무시간에 따라 배부한다. (주)조선의 실제원가 자료 가 다음과 같을 경우 틀린 것은",["5월 매출원가는 2,030원이다.","#102에 배부되는 제조간접원가는 300원이다.","5월 당기총제조원가는 4,110원이다.","5월 당기제품제조원가는 1,140원이다."],4],[11,"다음은 ㈜경기의 생산 및 판매 관련 자료이다. ㈜경기는 당기에 동일한 공정에 600,000원을 투입 하여 제품 X, Y를 생산했는데, X는 추가 가공하지 않고 판매 가능하지만, Y는 모든 물량을 추가 가공한 후에 판매 가능하다. X와 Y는 생산된 전량이 판매된다. ㈜경기가 순실현가치법에 따라 결합원가를 배부 할 경우, 제품 Y에 배부되는 결합원가는 얼마인가",["100,000원","200,000원","300,000원","400,000원"],2],[12,"아래와 같은 최근 생산실적(생산량과 생산기간)을 기준으로 제품단위당 노무공수를 산출하면(소수 점이하 둘째자리 절사) 얼마인가? 【최근 생산실적자료】 ○ 당기제품 생산량 : 1,000개 ○ 기초재공품 수량 : 100개(공정율 50%) ○ 기말재공품 수량 : 200개(공정율 50%) ○ 당기 작업시간 : 11,500hr",["10.52hr","11.50hr","10.45hr","10.95hr"],4],[13,"정부원가계산 기준에 생산실적을 토대로 제조부문 노무비단가를 계산할 때 별도로 인정하면 안 되 는 수당은 무엇인가?",["연장근로 수당","휴일근로 수당","심야근로 수당","자격수당"],4],[14,"반제품은 다음 중 어느 원가계산에서 발생하는가? - 88 -",["연산품원가계산","개별원가계산","공정별원가계산","조별원가계산"],3],[15,"정부원가계산기준에 의해 원가계산 할 때 단위당가격은 우선순위를 정하고 있다. 다음의 가격 중에 서 마지막 순위에 있는 가격은 무엇인가?",["견적가격","거래실례가격","유사한 거래실례가격","감정가격"],1],[16,"제품 당 표준재료 소비량을 미리 정하고 이것에 생산량을 곱하여 소비량을 구하는 방법은?",["이동평균법","계속기록법","역계산법","실사계산법"],3],[17,"정부원가계산 시 원가계산에 의한 예정가격 결정기준 중 잘못된 것은?",["재료비는 계약목적물의 제조. 시공 또는 용역 등에 소요되는 규격별 소요량에 그 단위가격을 곱한","노무비는 계약목적물의 제조. 시공 또는 용역 등에 소요되는 공정별 노무량에 그 노임단가를 곱한","일반관리비는 계약목적물의 제조에 소요되는 제조직접원가의 합계액에 일반관리비율을 곱한 금액","이윤은 제조원가에서 재료비, 외주가공비, 기술료 등을 제외하고 일반관리비를 합산한 금액에 규정"],3],[18,"다음 중 제조원가명세서에 대한 설명이다. 틀린 것은?",["제조원가명세서상의 원재료와 재공품재고액은 재무상태표와 일치한다.","제조원가명세서의 당기제품제조원가는 손익계산서의 제품매출원가 계산에 반영된다.","재무상태표의 제품 재고액은 제조원가명세서 작성과 관련 있다.","기초재료 재고액과 기말재료 재고액이 표시된다."],3],[19,"(주)한국은 5월 중 50,000원의 직접재료를 구입하였다. 5월 제조간접비 발생액은 37,000원이었고, 월간 제조원가는 114,000원이었다. 직접재료재고가 월초에는 10,000원, 월말에는 8,000원이었다. 5월 중 직접노무원가는 얼마인가?",["10,000원","20,000원","25,000원","52,000원"],3],[20,"(주)세운은 원유를 가공하여 주산물인 크림과 우유, 부산물인 연유를 생산하고 있다. 기초재고는 없 었으며 각 제품들은 추가공을 거친 후 판매된다. 결합원가의 발생액은 25,000원이고 분리점에서의 순실현가치에 의해 배부한다. 다음 자료를 이용하여 생산기준법 및 판매기준법에 의하여 부산물의 회계 처리를 한다고 가정할 경우 연산품에 배부해야 할 결합원가의 차이",["2,000원","3,000원","4,000원","5,000원"],2]],"공사기타원가":[[1,"공사원가계산서 상의 경비 비목 일부를 묶어 ‘기타경비’로 공사원가계산 할 수 있는데, 이 경우에 기 타경비 항목으로 포함되지 않는 비목을 고르시오.",["복리후생비","소모품비","산업안전보건관리비","도서인쇄비"],4],[2,"공사원가 항목 중 준공 시 정산할 수 없는 비목을 고르시오.",["간접노무비","품질관리비","산업안전보건관리비","퇴직공제부금비"],1],[3,"다음 중에서 표준품셈에 관한 설명이 틀린 것을 고르시오.",["표준품셈에서 제시된 품은 일일 작업시간 8시간을 기준한 것이다.","정부발주공사를 위해 예정가격을 산정함에 있어 표준품셈을 활용할 수 있다.","설계변경 시 새로운 품목(신규비목)의 단가에 표준품셈을 적용할 수 있다.","정부발주공사에서 공사 이행 도중 표준품셈이 변경되었을 때 설계변경을 통하여 계약금액을 조정할"],3],[5,"다음 중에서 기계경비의 시간당 손료 계수에 포함되지 않는 비용을 고르시오.",["운반비(기계장비를 운반하는 데 소요되는 비용)","상각비(기계사용에 따르는 가치의 감가액)","정비비(기계사용에 따라 발생하는 고장 또는 성능 회복을 목적으로 정비와 기계 기능을 유지하기","관리비(보유한 기계를 관리하는데 필요로 하는 이자 및 보관 격납비용)"],3],[6,"다음 중 설계서에 포함되지 않는 문서를 고르시오.",["설계도면","공사계약일반조건","현장설명서","공사시방서"],2],[7,"국가 또는 지방자치단체가 발주하는 공사(민간투자사업 제외)에서 물가변동으로 인한 계약금액 조정 을 지수조정률에 의한 방법으로 산출하여야 하는 경우 재료비에 적용하여야 하는 지수를 고르시오.",["통계청 공표 소비자물가지수(CPI)","한국은행 공표 GDP디플레이터","한국건설기술연구원 공표 건설공사비 지수","한국은행 공표 생산자물가지수(PPI)"],3],[8,"다음은 품목조정률 방식에 의한 물가변동 조정률을 산출할 때 사용되는 용어들이다. 다음 중 계산식 또는 설명이 틀린 것을 고르시오.",["등락폭은 소비자물가지수를 적용하여 산정한다.","등락률 = (물가변동당시가격 – 입찰당시가격)/입찰당시가격","입찰당시가격이라 함은 입찰서 제출마감일 당시 산정한 가격을 말한다.","물가변동당시가격이 입찰당시가격보다 높고 계약단가보다 낮을 경우의 등락폭은 0원으로 한다."],3],[9,"다음 중「주택법」에 따라 분양가격을 제한하는 주택사업(분양가상한제 대상 사업)이 어느 것인지 선택하시오.",["도시형 생활주택 사업","단독주택 사업","공공택지에서 건설하는 주택사업","한국토지주택공사 또는 지방공사가 「빈집 및 소규모주택 정비에 관한 특례법」에 따른 소규모 주택"],2],[10,"다음 중에서 예정가격 결정기준이 아닌 것을 고르시오.",["거래실례가격","실적공사비 단가","표준시장단가","원가계산에 의한 가격"],4],[11,"정부발주공사에서 설계변경으로 인한 계약금액 조정 시 신규비목으로 계상할 수 있는 품목 또는 경 우가 아닌 것을 고르시오.",["산출내역서에 없는 품목","산출내역서에 동일한 품목에 존재하지만 규격이 다른 품목","산출내역서에 있는 품목이지만 발주기관이 설계변경을 요구하여 물량이 증가","산출내역서에 있는 품목이지만 발주기관이 설계변경을 요구하여 물량이 감소"],3],[12,"정부발주공사에서 가설사무실을 짓는데, 재료비 50원, 노무비 30원, 경비 20원의 공사원가가 발생 한다고 가정했을 때, 해당 금액을 예정가격의 비목에 어떻게 구성하여야 맞는 것인지 아래의 보기에서 선택하시오.",["경비 100원","재료비 50원, 노무비 50원","재료비 50원, 노무비 30원, 경비 20원","재료비 100원"],1],[13,"정부 또는 지방자치단체와 공사계약을 체결하여 공사를 진행하던 도중, 발주기관의 사정 변경에 의 해 공사계약이 해제 또는 해지되었을 경우, 계약자가 타절비용으로 청구할 수 없거나 지급받지 못하는 비용을 고르시오.",["이미 시공이 완료된 부분 중 대가 지급을 하지 아니한 금액","계약의 해제 또는 해지일 이전에 투입된 계약자의 인력 및 자재의 철수 비용","계약의 해제 또는 해지일 이전에 투입된 계약자 장비의 철수 비용","계약자는 선금에 대한 미정산 잔액이 있는 경우 미정산 잔액과 그 선금 잔액에 대한 이자 비용"],4],[14,"미래에 발생 될 원가 또는 진행 중인 사업의 원가를 관리하고 평가하는 기법 중 사업의 실행예산이 초과되는 것을 방지하기 위하여 사업비용과 일정의 ”계획 대비 실적“을 통합된 기준으로 관리하여, 이 를 통해 현재의 문제를 분석하고, 만회 대책을 수립하며, 향후 예측을 가능하게 하는 원가관리 기법이 무엇인지 아래의 보기에서 고르시오.",["EVMS(Earned Value Management System)","LCC(Life Cycle Cost)","VE(Value Engineering)","CBS(Cost Breakdown Structure)"],3],[15,"조합 등 민간택지(공공택지 외의 택지)에서 분양가상한제 적용주택을 공급하기 위해 시행하는 주택 사업의 경우, 다음 중 택지비로 적용할 수 없는 것을 고르시오.",["「감정평가 및 감정평가사에 관한 법률」에 따라 감정 평가한 가액","「민사집행법」, 「국세징수법」 또는 「지방세징수법」에 따른 경매ㆍ공매 낙찰가격","국가ㆍ지방자치단체 등 공공기관으로부터 매입한 가격","「부동산 가격공시에 관한 법률」에 따른 개별공시지가의 300퍼센트에 상당하는 금액"],2],[16,"공사원가계산 시 이윤 산출방법은?",["(노무비+경비+일반관리비) × 이윤율","(재료비+노무비+경비) × 이윤율","(재료비+경비+일반관리비) × 이윤율","(재료비+노무비+일반관리비) × 이윤율"],3],[17,"다음 중 설계변경 사유에 해당하지 않는 것은?",["현장상태의 상이","단가산출근거의 과소계상","설계도면과 물량의 상이","도면의 누락"],1],[18,"표준품셈에 의한 원가계산 산정 기준으로 올바르지 않은 것은 ?",["품에서 포함된 것으로 규정된 소운반 거리는 20m 이내의 거리를 말한다.","경제적 내용년수란 경제적 내용시간을 연간 표준가동시간으로 나눈 값을 말한다.","기계손료는 상각비, 정비비, 관리비의 합계로 하며, 1일 8시간을 초과할 경우 각각 별도 계산하여야","기계경비는 기계손료, 운전경비 및 수송비의 합계로 하되 특히 필요하다고 인정되는 경우 조립 및"],2],[19,"조달청 등 공공발주기관이 주로 선택하는 보완적 계상방법을 적용하여 간접노무비율을 산출하는 내 용으로 적정하지 않은 것은?",["발주기관별","공사종류별","공사규모별","공사기간별"],3],[20,"다음은 정부공사를 발주할 경우 예정가격을 작성하는 방법에 관한 사항이다. 타당하지 않은 것은?",["원가계산방식이 주된 방법이며 표준시장단가방식도 활용되고 있다.","표준시장단가방식은 표준품셈과는 관련이 없다.","원가계산방식은 품셈을 기초하여 산정한다.","표준시장단가방식은 계약단가만을 고려하여 산출하는 방식을 말한다."],4],[21,"발주기관의 사업계획변경에 따라 설계변경으로 인한 계약금액 조정을 하고자 한다. 다음과 같은 조 건에서 설계변경 시 증가된 물량 X의 단가를 산출하시오. (단, 계약당사자간에 협의가 안 되는 상황임) ▪ 예정가격 100억 원 ▪ 계약금액 85억 원 ▪ 물량 X의 계약단가 10,000원 ▪ 물량 X의 설계변경당시 단가 12,000원",["11,000원","11,100원","10,200원","10,000원"],1]],"제도및법규":[[1,"다음 중 세계무역기구(WTO)의 정부조달협정 상 국제입찰 개방 대상기관이 아닌 것은?",["서울특별시","세종특별자치시","부산광역시","대구광역시"],3],[2," 다."],1],[17,"정부계약에서 부당한 특약이나 조건으로 볼 수 있는 것은?",["예산이 없으면 물가변동으로 인한 계약금액 조정을 하지 않는다는 내용의 특약","설계변경에 따른 계약금액을 조정할 수 있다는 내용의 특약","청렴계약을 위반하게 되면 해당 계약을 해지할 수 있다는 내용의 특약","하도급 조건을 위반하면 입찰참가자격제한조치를 할 수 있다는 내용의 특약"],2],[18,"입찰보증금에 관한 설명 중 틀린 것은?",["입찰을 실시한 후 계약체결 시 계약이행을 담보하기 위하여 받는 보증금이다.","입찰금액의 100분의 5 이상을 받도록 하고 있다.","입찰에서 낙찰된 자의 계약체결을 담보하기 위해 입찰자로부터 입찰 실시 전에 현금 또는 보증서 등","입찰보증금은 면제사유에 해당하면 그 납부를 면제할 수 있다."],3],[19,"그 밖에 계약내용의 변경에 관하여 설명한 것 중 타당하지 않은 것은?",["그 밖에 계약내용의 변경도 설계변경의 경우와 같이 공사물량의 증감이 있는 경우를 전제로 한다.","공사기간의 변경 및 운반거리의 변경이 그 대표적인 사례이다.","그 밖에 계약내용의 변경으로 인한 계약금액 조정은 실비를 한도로 한다.","운반거리가 증·감되는 경우에도 계약당사자간의 협의가 이루어지지 아니하는 경우에는 그 중간금액"],1],[20,"공사계약에서 하자보수와 관련하여 설명한 것 중 틀리게 설명한 것은?",["하자보수책임은 시공 상의 하자에 대한 책임을 말한다.","장기계속공사는 연차계약별로 하자보수보증금을 납부하는 것을 원칙으로 한다.","하자담보책임기간은 1년 이상 10년 이하의 범위에서 정한다.","하자보수보증금은 하자담보책임기간이 종료한 후라도 반환하여서는 아니 된다."],4]]},"16회":{"재무회계":[[1,"다음과 같은 결합관계로 이루어진 거래로 옳은 것은? (차) 자산의 증가 (대) 자산의 감소",["상품 5,000,000원을 현금으로 매입하다.","단기대여금 2,000,000원을 현금으로 받다.","은행으로부터 단기차입금 10,000,000원을 보통예금통장으로 이체 받다.","자동차세 150,000원을 현금으로 납부하다."],2],[2,"다음 중 상품 매입액에서 차감하는 계정과목이 아닌 것은?",["매입할인","매입환출","매입에누리","매입수수료"],4],[3,"다음의 계정과목 중 당좌자산에 해당되지 않는 것은?",["당좌예금","외상매출금","보통예금","임대보증금"],4],[5,"다음 계정 중 그 잔액이 대변 또는 차변에도 발생할 수 있는 계정과목은?",["가지급금","가수금","상품권","현금과부족"],4],[6,"주식배당을 실시한 경우, 배당 후 재무상태표 및 발행주식수 등의 상태변화로 옳은 것은?",["이익잉여금은 증가한다.","자본금은 감소한다.","총자본은 감소한다.","발행주식수는 증가한다."],4],[8,"다음 거래에서 계정의 증감 내용이 기입될 곳으로 바른 것은? [거래] 이자비용 1,000,000원을 당사 보통예금 계좌에서 이체하여 지급하다. 자산계정 가",["가, 다","가, 라","나, 다","다, 라"],3],[9,"소유기간이 1년 이상인 자산 중 영업활동에 사용할 목적으로 보유하는 형태가 있는 자산에 해당하 는 것으로만 묶인 것은? 가. 상품운반용 차랑운반구 나. 판매용 휴대폰 다. 투자목적용 건물 라. 사무실 업무용 복사기",["가, 나","가, 라","나, 다","나, 라"],2],[10,"다음 중 유가증권에 대한 설명으로 틀린 것은?",["단기매매증권에 대한 미실현보유손익은 기타포괄누계액으로 처리한다.","단기매매증권이 시장성을 상실한 경우에는 매도가능증권으로 분류하여야 한다.","채무증권은 취득한 후에 만기보유증권, 단기매매증권, 매도가능증권 중의 하나로 분류한다.","지분증권과 만기보유증권으로 분류되지 않는 채무증권은 단기매매증권 또는 매도가능증권으로 분류"],1],[11,"영업용 차량의 엔진오일을 교체하고 다음과 같이 회계처리 한 경우, 재무제표에 미치는 영향으로 옳은 것은? (차변) 차량운반구 500,000원 (대변) 현 금",["영업이익의 과 부담금은 현금에 의한 납부를 원칙으로 한다.","납부의무자가 개발부담금의 납부기일의 연기 및 분할납부를 인정받고자 하는 때에는 해당 지방자치","개발부담금의 납부의무자가 지정된 기간 내에 완납하지 않으면 가산금과 중가산금이 부과된다."],4]],"제도및법규":[[1,"다음은 예정가격에 관하여 설명해 놓았다. 그 중 틀리게 설명한 것은?",["예정가격은 부가가치세를 포함하고 있다.","예정가격은 예산 범위 내에서 작성하여야 한다.","예정가격은 부가가치세를 포함하고 있지 않다.","예정가격은 통상 추정가격을 작성한 후에 산정한다."],1],[2,"정부계약에서 입찰 시에는 입찰서를 제출하도록 하고 있다. 이와 관련하여 설명한 것 중 틀린 것 은?",["입찰서 제출 시에는 원칙적으로 전자조달시스템을 이용토록 하고 있다.","입찰서를 예외적으로 직접 또는 우편으로 제출하는 것을 허용하고 있다.","계약담당자는 입찰서를 접수하면 개찰 시까지 개봉하지 아니하고 보관하여야 한다.","입찰서는 예외 없이 전자조달시스템을 이용하여 제출되도록 하여야 한다."],2],[3,"국가계약법령상 재입찰 및 재공고입찰에 관한 설명 중 옳은 것은?",["낙찰자가 계약을 체결하지 않는 경우에는 재공고입찰에 부칠 수 있다.","경쟁 입찰을 할 때 낙찰자가 없을 경우 재입찰에 부칠 수 있다. 이 경우 재입찰은 새로운 입찰로 보","재입찰시에는 최초의 입찰에 부칠 때에 정한 기한, 가격 및 기타 조건을 변경할 수 없다.","입찰자나 낙찰자가 없는 경우 재입찰에 부칠 수 있다."],1],[4,"다음은 국가분쟁조정위원회에 관한 설명이다. 옳지 않은 것은?",["위원회의 위원은 그 위원과 직접 이해관계가 있는 안건의 심사ㆍ조정에 참여할 수 없다.","국가를 당사자로 하는 계약에서 발생하는 분쟁을 심사ㆍ조정하게 하기 위하여 행정안전부에 국가계","위촉위원의 임기는 2년으로 하되, 연임할 수 있다.","위원회는 위원장 1명을 포함하여 15명 이내의 위원으로 구성한다."],2],[6,"다음 중 정부계약에서 개찰 및 낙찰자 결정과 관련하여 틀리게 설명한 것은?",["전자입찰의 경우에는 입찰공고에 표시한 절차와 방법에 따라 개찰한다.","개찰 결과 2인 이상의 유효한 입찰이 있을 때 적격자를 낙찰자로 결정한다.","개찰 시에는 예외 없이 입찰자가 참석한 자리에서 개찰하여야 한다.","세입의 원인이 되는 경쟁입찰에서는 예정가격 이상으로서 최고가격으로 입찰한 자를 낙찰자로 한다."],2],[7,"계약의 이행을 지체하면 지체상금(지연배상금)을 징수하게 된다. 이와 관련하여 설명해 놓은 것 중 틀린 것은?",["계약상대자가 정당한 이유 없이 계약상의 의무를 기한 내에 이행하지 못한 것을 이행지체라 한다.","지체일수를 산정할 때에는 원칙적으로 계약이행기한의 다음 날부터 기산한다.","장기계속계약의 경우 지체상금은 총 계약금액을 대상으로 산정한다.","계약기간 내에 불가항력의 사유에 따른 지체인 경우는 지체일수에 포함하지 않는다."],3],[8,"입찰참가자격 제한조치(부정당업자제재)의 제한기준에 관하여 바르지 않게 설명한 것은?",["1개월 이상 2년 이하의 범위에서 제재조치를 한다.","위반행위의 동기ㆍ내용·횟수 등을 참작하여 제한기간의 1/2의 범위에서 가중 또는 감경할 수 있다.","위반행위에 대한 가중 시에는 2년을 초과하여도 무방하다.","위반행위를 하여 제재사유가 2 이상에 해당하는 경우에는 그 중 무거운 기준에 의한다."],1],[9,"학술연구용역원가계산과 관련한 내용 중 옳지 않은 것은?",["인건비는 당해 계약목적에 직접 종사하는 연구요원의 급료를 말하며, 「근로기준법」에서 규정하고","경비는 계약목적을 달성하기 위하여 필요한 다음 내용의 여비, 유인물비, 전산처리비, 시약 및 연구","일반관리비는 시행규칙에 규정된 일반관리비율 5％를 초과하여 계상할 수 없다.","이윤은 영업이익을 말한다."],1],[11,"다음은 입찰 및 낙찰절차와 관련된 내용이다. 옳지 않은 것은?",["각 중앙관서의 장 또는 계약담당공무원은 입찰자가 입찰서를 제출하는 경우 전자조달시스템을 이용","국제입찰대상 계약인 경우 입찰서를 입찰공고에 명시한 장소와 일시에 직접 또는 우편으로 제출하게","입찰자는 제출한 입찰서를 교환ㆍ변경할 수는 없지만 취소는 가능하다.","경쟁참가의 자격이 없는 자가 행한 입찰 기타 기획재정부령이 정하는 사유에 해당하는 입찰은 무효"],4],[12,"다음 중 정부계약에서 낙찰제도와 관련하여 바르지 않게 설명한 것은?",["공사계약에서 낙찰자 결정방법은 적격심사낙찰제와 종합심사낙찰제 등이 있다.","적격심사낙찰제는 공사, 물품 및 용역계약에서 계약이행능력과 입찰가격을 종합 심사하여 낙찰자를","2단계 경쟁입찰의 경우는 1단계 통과자를 대상으로 최저가낙찰제를 적용한다.","2단계 경쟁입찰의 경우는 1단계 통과자를 대상으로 적격심사낙찰제를 적용한다."],4],[13,"다음 중 공동수급체 구성 및 운용과 관련하여 틀리게 설명한 것은?",["공동수급체가 정당한 이유 없이 계약을 불이행한 때에는 구성원 모두의 계약보증금을 국고에 귀속한","동일 입찰 건에 대해 이중으로 공동수급협정을 체결하여 참가하여도 무방하다.","공동수급약정서는 발주기관에 입찰참가신청서 제출 시 이를 함께 제출하여야 한다.","공동수급체 구성원 간에는 하도급이 허용되지 않는다."],1],[14,"경쟁적 대화에 의한 계약 체결방법에 관한 설명으로 옳지 않은 것은?",["각 중앙관서의 장 또는 계약담당공무원은 전문성ㆍ기술성이 요구되는 물품 또는 용역계약으로서 상","각 중앙관서의 장 또는 계약담당공무원은","각 중앙관서의 장 또는 계약담당공무원은 경쟁적 대화를 하기 전에 입찰대상자의 제안 내용 등을 심","각 중앙관서의 장 또는 계약담당공무원은 경쟁적 대화에 참여하고 제안서를 제출한 자 중 낙찰자로"],1],[15,"다음은 청렴계약과 관련한 내용이다. 옳지 않은 것은?",["청렴계약은 입찰자 또는 계약상대자로 하여금 입찰ㆍ낙찰, 계약체결 또는 계약이행 등의 과정(준공","만약 입찰자가 청렴계약의 내용을 지키지 아니한 경우에는 해당 입찰ㆍ낙찰을 반드시 취소하거나 계","청렴계약이 담고 있는 내용 중에는","청렴계약서는 입찰자가 입찰서를 제출할 때 반드시 제출해야 한다."],1],[16,"입찰형태(방법) 별 분류에 따른 설명 중 맞지 않는 것은?",["우리나라는 내역입찰 및 통상의 입찰형태인 설계․시공 분리입찰만을 시행하고 있다.","내역입찰은 발주관서가 미리 공종별 목적물 물량을 표시하여 배부한 내역서(물량내역서)에 입찰자가","설계․시공 분리입찰은 설계와 시공을 나누어 각각 입찰에 부치는 방법이고, 설계․시공 일괄입찰은 설","총액입찰은 입찰시 산출내역서는 제출하지 않고 입찰총액을 기재한 입찰서만을 제출하는 입찰방식이"],4],[17,"다음 중 검사조서의 작성을 생략할 수 있는 경우로 틀린 것은?",["용역계약","매각계약","가스공급계약","수도공급계약"],1],[18,"추정가격과 예정가격에 관하여 설명한 것 중 틀리게 설명한 것은?",["예정가격은 낙찰자 또는 계약자의 결정기준으로 삼기 위하여 입찰 또는 계약체결 전에 미리 작성․비","추정가격은 국제입찰 대상, 입찰참가자격사전심사(PQ) 대상 및 수의계약 대상 등의 기준으로 삼기","예정가격 결정방법으로 거래실례가격이나 원가계산에 의한 방법 등이 있다.","예정가격은 모든 입찰에 대해 작성하여야 한다."],4],[20,"국가계약법령상 하자보수보증금율과 관련하여 틀리게 서술한 것은?",["철도ㆍ댐ㆍ터널 : 100분의 5","공항ㆍ항만ㆍ방파제 : 100분의 4","관개수로ㆍ도로 : 100분의 3","일반건축ㆍ조경공사 : 100분의 2"],3],[22,"계속비 계약에 해당되는 것은 ?",["총예산이 국회의결을 거쳐 확보된 경우","총예산이 아닌 발주년도 예산이 확보된 경우","각 회계연도의 예산범위 내에서 계약하는 경우","전기, 가스, 수도 등의 공급계약을 하는 경우"],3],[23,"다음 중 계약목적물별 계약의 종류가 바르게 연결되지 아니한 것은?",["청소용역 - 건설기술용역","설계용역 - 건설기술용역","경비용역 – 일반용역","감리용역 - 일반용역"],2],[24,"공기업은 물품ㆍ용역계약추진 시 정부조달협정 양허 추정가격은?",["2.3억 원 이상","3.5억 원 이상","7.7억 원 이상","88억 원 이상"],2]]},"17회":{"재무회계":[[1,"재고자산의 매입단가가 계속 상승할 경우 매출원가의 크기가 가장 크게 계상되는 재고자산의 원가 흐름의 가정은?",["가중평균법","선입선출법","후입선출법","상황에 따라 다름"],1],[2,"다음 중 무형자산의 인식 요건으로 틀린 것은?",["판매가능성","통제가능성","미래경제적 효익","식별가능성"],3],[3,"다음 중 당기손익 공정가치측정 금융자산에 대한 설명으로 틀린 것은?",["단기 시세차익을 목적으로 보유한 시장성이 있는 주식이나 채권을 말한다.","기말평가 시 당기손익 공정가치측정 금융자산평가손익은 손익계산서의 영업외수익 또는 영업외비용","처분 시 당기손익 공정가치측정 금융자산처분손익은 손익계산서의 영업외수익 또는 영업외비용으로","당기손익 공정가치측정 금융자산은 투자자산으로 분류된다."],4],[4,"아래의 자료에서 (가)와 (나)가 설명하는 자산의 분류로 올바른 것은? (가) 컴퓨터 제조업을 운영하는 회사가 상품 운반용으로 사용하는 화물차 (나) 건물을 신축하여 판매하는 부동산 개발 회사가 판매용으로 보유하고 있는 건물",["(가) 재고자산 (나) 투자자산","(가) 투자자산 (나) 유형자산","(가) 유형자산 (나) 투자자산","(가) 유형자산 (나) 재고자산"],1],[5,"다음 중 시산표에서 발견할 수 있는 오류로 옳은 것은?",["분개를 누락한 경우","이중으로 전기한 경우","분개 시 차변과 대변 계정과목이 바뀐 경우","원장 전기 시 차변 계정과목의 금액을 틀리게 기입한 경우"],1],[6,"(주)대한이 보유 중인 건물의 수리를 위하여 지출한 비용 중 수익적 지출에 해당하지 않는 것은?",["건물증축비용","유리교체비용","도색비용","조명교체비용"],3],[7,"다음 중 부채계정으로만 짝지어진 것은?",["선수수익, 미수수익","선수금, 외상매입금","선수수익, 미수금","선급금, 미수수익"],1],[8,"다음 자료에 의하여 기말자본을 계산하면 얼마인가? - 기초자산 : 1,000,000원 - 기초부채 : 300,000 - 총수익 : 300,000 - 총비용 : 100,000",["400,000원","700,000원","900,000원","1,300,000원"],4],[9,"다음 중 잔액이 대변에 발생하는 계정은?",["단기차입금","외상매출금","선급금","미수금"],3],[10,"다음 재무정보의 질적 특성 중 ‘충실한 표현’과 관련 있는 것은?",["예측가치","중립적 서술","확인가치","중요성"],2],[12,"다음 중 판매비와 관리비에 해당하는 계정과목의 합은? 가. 접대비 800,000원 나. 이자비용 200,000원 다. 직원급여 2,200,000원 라. 복리후생비 300,000원",["정액법","3,300,000원","3,400,000원","3,500,000원"],4],[13,"원가모형을 적용하는 유형자산에 손상이 발생한 경우 다음 중 어느 범위까지 손상을 인식하여야 하는가?",["회수가능액","사용가치","순공정가치","손상차손누계액"],2],[14,"(주)재무는 상품을 매입하여 개당 1,500원에 판매하고 있다. 계속기록법에 의하여 재고자산의 수량 을 평가하는 경우 매출원가를 구하시오.(단, 단가결정은 이동평균법에 의하며, 소수점 첫째자리에서 반 올림 할 것) 일 자 구 분 수 량 단 가 01월 01일 기초상품 1,000 \\1,000 03월 11일 상품매입 110 \\1,100 08월 06일 상품매출 5",["\\672,000","\\505,000","\\874,600","\\1,245,000"],4],[15,"다음의 회계변경 중 추정변경에 해당하지 않는 것을 고르시오.",["유형자산의 후속측정을 원가모형에서 재평가모형으로 변경하는 것.","대손 추정액을 변경하는 것.","감가상각의 내용연수를 변경하는 것.","금융자산의 공정가치 추정액을 변경하는 것."],4],[16,"다음 중 재무제표에 해당하지 않는 것은?",["주석","시산표","재무상태표","현금흐름표"],1],[17,"고객과의 계약을 식별함에 있어서 계약의 존재여부를 판단하기 위한 기준으로 옳지 않은 것을 고 르시오.",["당사자들이 계약을 승인하고 각자의 의무를 수행하기로 확약할 것.","이전할 재화나 용역의 지급조건이 식별 가능할 것.","계약에 상업적 실질이 존재하지 않을 것.","대가의 회수 가능성이 높을 것."],4],[18,"(주)재무의 2022년의 매출액은 11,220,000원이며 매출총이익률은 24%라고 한다. 2023년의 매출 총이익률이 동일하다면 매출액이 22,110,000원으로 증가하였을 때 매출원가는 얼마인가?",["\\5,306,400","\\17,054,400","\\8,527,200","\\16,803,600"],4],[19,"다음 중 재무상태표의 자본항목에 해당하지 않는 것은?",["이익잉여금","자본잉여금","감가상각누계액","자본조정"],4],[20,"(주)재무는 직원에 대한 급여 11,000,000원에서 소득세 예수금 300,000원과 4대 보험 예수금 650,000원을 공제한 후에 다음달 5일에 지급하고 있다. (주)재무의 12월 말에 부채로 계상되어있는 금 액은 얼마인가?(예수금은 차월에 납부한다.)",["\\11,000,000","\\950,000","\\10,050,000","\\625,000"],4],[21,"(주)재무의 손익계산서가 다음과 같은 경우 영업이익과 당기순이익으로 옳은 것을 고르시오. 구 분 금 액 구 분 금 액 매출액 \\81,600,000 접대비 \\1,500,000 기초상품재고액 \\3,500,000 통신비 \\200,000 당기상품매입액 \\12,000,000 감가상각비 \\1,270,000 기말상품재고액 \\1,800,000 임차료 \\10,000,000",["잠재적 투자자","채권자","주주","경영자"],2]],"원가관리회계":[[1,"다음 그림 중 틀린 것을 고르시오. (a) 총원가 (b) 조업도",["(a)는 조업도 증가에 따라 총원가가 비례적으로 증가하는 변동원가 그래프이다.","(b)는 조업도 변화와 상관없이 총원가가 일정한 고정원가 그래프이다.","(a)는 조업도 변화와 상관없이 단위당 원가가 일정한 변동원가 그래프이다.","(b)는 조업도 증가에 따라 단위당 원가가 비례적으로 증가하는 고정원가 그래프이다."],2],[2,"다음 중 추적가능성에 따른 원가분류로 가장 옳은 것은?",["고정원가, 변동원가","직접원가, 간접원가","사전원가, 사후원가","발생원가, 추정원가"],1],[3,"종합원가계산에 대한 설명으로 가장 올바르지 않은 것은?",["종합적으로 계산하여 개별원가계산보다 정확하게 계산할 수 있으나, 시간과 비용이 과다하게 발생한","단일 종류의 제품을 연속적으로 생산하는 기업에 적정한 원가계산 방법이다.","철강업, 정유업, 섬유업, 제분업, 제화업, 등의 업종에 적합하다.","각 제조공정에서 발생한 제조원가를 집계하고 집계된 총제조원가를 일정기간 동안 그 공정에서 완성"],1],[4,"다음은 ㈜원가의 제조원가와 관련한 일부 자료이다. 기말재공품재고액은 얼마인가? ㆍ기초제품 \\300,000 ㆍ기말제품 \\400,000 ㆍ직접재료원가 \\1,200,000 ㆍ기초재공품 \\200,000 ㆍ가공원가 \\2,000,000 ㆍ간접재료원가 \\400,000 ㆍ직접노무원가 \\1,200,000 ㆍ매출원가 \\2,800,000 ㆍ간접노무원가 \\200,000",["\\400,000","\\500,000","\\600,000","\\800,000"],2],[6,"다음 중 결합원가를 분배하는 방법으로 옳지 않은 것은?",["가치기준법","상대적 판매가치법","순실현가치법","균등매출총이익률법"],4],[7,"제조간접비를 직접노무시간을 기준으로 배부하는 경우 당기 말 제조간접비가 \\5,000,000이고, 실 제 발생한 직접노무시간은 50,000 시간이며, 당기 제조간접비 배부차이가 \\150,000 과다 배부되었다 면 제조간접비 예정배부율은 직접노무시간당 얼마인가?",["\\97/시간","\\100/시간","\\103/시간","\\145/시간"],4],[8,"다음 중 결합원가와 관련된 설명으로 틀린 것은?",["추가가공원가는 분리점 이후에 개별제품에 발생하는 원가로 개별제품에 추적이 가능한 원가다.","동일한 원재료에서 출발하여 서로 다른 개별제품으로 인식되는 시점을 분리점이라 한다.","어떤 제품에 대하여 추가가공원가가 발생하는 경우, 분리점 이후의 모든 제품에 다시 이를 분배한","동일공정에서 두 개 이상의 연산품을 생산할 때, 하나의 제품이 다른 연산품에 비해 상대적으로 판"],1],[9,"다음은 정유회사 ㈜대한의 생산자료 및 기타자료다. 상대적 판매가치법에 의해 결합원가를 배분할 경우, ㈜대한에서 생산한 휘발유에 배분될 결합원가는 얼마인가? (단, 당기에 발생한 결합원가는 \\6,000이다.) 부 분 중 량 (L) L당 판매가격 등유 100 \\10 경유 200 \\20 휘발유 250 \\40",["\\400","\\1,600","\\2,000","\\4,000"],4],[10,"다음 중 원가회계 용어에 대한 설명으로 가장 옳지 않은 것은?",["원가동인(cost driver)은 원가를 유발하는 요인으로 매출액, 생산량 등을 의미한다.","원가대상(cost object)은 원가가 집계되는 활동이나 항목을 의미한다.","원가집합(cost pool)이란 원가대상에 직접적으로 추적할 수 없어 배분이 필요한 원가를 모아둔 것을","원가배분(cost allocation)이란 직접원가를 일정한 배분기준에 따라 원가대상에 배분하는 과정을 의"],1],[11,"다음은 고정원가(fixed cost)에 대한 설명이다. 가장 옳지 않은 것은?",["조업도가 증가하면 관련범위내에서 조업도 단위당 고정원가는 감소한다.","조업도가 감소해도 관련범위 내에서 총고정원가는 일정하다.","조업도가 0 이라도 일정한 비용이 발생한다.","조업도가 감소하면 관련범위내에서 조업도 단위당 고정원가는 일정하다."],1],[12,"㈜대한은 다양한 제품을 생산하는 회사라 할 때 제조원가에 포함될 수 있는 항목으로 가장 옳은 것 은?",["제품 판매를 담당하고 있는 영업사원의 급여","본사건물에 대한 감가상각비","인터넷을 이용한 제품의 광고선전비","생산직 사원의 복리후생비"],2],[14,"다음 중 개별원가계산제도를 이용하는 것이 가장 적합한 업종은?",["동일한 재료로 동일한 공정처리를 거치는 식품가공업","자동화된 생산설비에 의한 석유화학제조업","특정 디자인을 대량생산하는 섬유의류업","특별 주문에 의해 제작하는 조선업"],4],[15,"다음은 ㈜대한의 5월 중 총원가(Full Cost) 자료이다. 5월 당기제품제조원가는 얼마인가? (단, 기초 재료와 기초재공품 재고액은 \\0이며, 당기 재료매입액은 \\10,000이다.) 당월 공장 생산직 사원의 임금 \\10,000 감가상각비-공장건물 \\3,000 당원 본사직원의 급여 \\8,000 감가상각비-기계장치 \\2,000 감가상각비-본사 사옥 \\5,0",["\\24,000","\\24,500","\\25,000","\\25,500"],4],[16,"다음에서 설명하는 보조부문의 원가를 배분하는 방법은 무엇인가? ∘ 보조부문 원가의 배분순서를 정하여 그 순서에 따라 보조부문원가를 다른 보조부문과 제조부문에 배분하는 방법이다. ∘ 보조부문 간의 용역수수관계를 일부 인식하기는 하지만 배분순서가 적절하지 않은 경우에는 원가 배분결과가 오히려 왜곡될 수 있다.",["직접배분법","상호배분법","단계배분법","이중배분법"],2],[17,"다음은 개별원가계산(job-order costing)에 대한 설명이다. 가장 옳지 않은 것은?",["단일종류의 제품을 연속적으로 대량생산하는 업종에 적합한 원가계산방법이다.","조선업, 기계제작업, 플랜트건설업 등과 같이 수요자의 주문에 기초하여 제품을 생산하는 업종에서","개별제품별 또는 개별 작업별로 원가가 집계되기 때문에 직접원가와 간접원가 구분이 중요하다.","제품 또는 프로젝트를 개별적으로 생산 혹은 제작하는 형태에 적용하는 원가계산이다."],3],[19,"다음은 ㈜대한의 원가자료이다. 원재료는 공정의 초기에 전량 투입되고 가공원가는 공정 전반에 걸 쳐 균등하게 발생한다. 종합원가계산에 의한 가공원가 완성품환산량이 가장 올바르게 연결된 것은?",["평균법 2,090개","선입선출법 2,190개","평균법 2,390개","선입선출법 2,540개"],3],[20,"㈜대한은 종합원가계산을 채택하고 있다. 원재료는 공정시작시점에서 전량투입되며 가공원가는 공 정전반에 걸쳐서 균등하게 발생한다. 기말재공품 수량은 300개이며, 가공원가의 완성도는 40%이다. 완 성품환산량 단위당 직접재료원가와 가공원가가 각각 150원, 100원이라면 기말재공품원가는 얼마인가?",["48,000원","51,000원","54,000원","57,000원"],4],[21,"다음은 부문별 원가계산 방법인 상호배부법에 대한 설명이다. 가장 옳은 것은?",["보조부문 상호간의 용역수수 관계를 일부 고려하는 방법이다.","보조부문 상호간의 용역수수 관계를 전혀 고려하지 않는 방법이다.","다른 배부법에 비해서 보조부문 상호간의 용역수수가 중요하지 않은 경우에 적용된다.","보조부문 상호간의 용역수수 관계를 모두 고려하는 방법이다."],2],[22,"㈜대한은 정상개별원가계산을 사용하고 있으며, 설비가동시간을 기준으로 제조간접원가를 배부하고 있다. 20×1년 연간 제조간접원가 예정액은 \\1,500,000이며, 20×1년 실제 발생한 제조간접원가는 \\1,000,000이고, 실제 설비가동시간은 2,000시간이다. 20×1년 중 제조간접원가 과대배부액이 \\200,000원이라고 할 때 연간 예정설비가동시간은?",["1,500시간","2,000시간","2,500시간","3,000시간"],1],[23,"다음은 정상개별원가계산에 의한 것으로 배부차이를 조정하기 위한 기초자료이다. 제조간접원가 과 소배부액 \\1,000,000을 총원가비례법을 적용하여 배부한 경우와 원가요소비례법을 적용하여 배부한 경우 각각의 방법에 의해 산정한 기말제품의 가액의 차이는 얼마인가? 구분 재공품 제품 직접재료원가 \\1,000,000 \\1,000,000 \\500,000 \\2,500",["\\15,000","\\20,000","\\25,000","\\30,000"],3]],"제조원가실무":[[1,"다음 중 제조원가명세서에 표시되지 않는 것은?",["재료소비액, 노무비소비액, 경비소비액","매출원가, 당기제품제조원가","기초재료 재고액, 기말재료 재고액","기초재공품 재고액, 기말재공품 재고액"],2],[2,"다음 중 직접원가를 구하는 식으로 가장 옳은 것은?",["직접재료비 + 직접노무비 + 직접경비","직접재료비 + 직접노무비","직접노무비 + 제조간접비","직접재료비 + 직접노무비 + 제조간접비"],1],[3,"재료소비단가의 결정방법 중 매입일자가 빠른 재료단가를 먼저 출고한 것으로 간주하여 재료의 소비 단가를 결정하는 방법은?",["선입선출법","후입선출법","개별법","평균법"],1],[4,"다음 중 직접노무비와 제조간접원가의 합계액은 어느 것인가?",["기초원가","직접원가","간접원가","가공원가"],4],[5,"다음 중 조업도의 수준과 관계없이 일정하게 발생하는 원가요소로 임차료, 재산세, 감가상각비 등이 이에 속하는 비용은?",["고정비","비례비","체감비","체증비"],1],[6,"다음 중 발주자 주문에 따라 종류, 규격, 형태 등이 다른 특정의 제품을 생산하는 경우에 적용할 수 있는 원가계산방법은 어느 것인가?",["등급별 원가계산","개별원가계산","조별원가계산","단순종합원가계산"],2],[7,"정부원가계산 시 제조공정에 직접 투입되지 않는 공장관리자의 급료는 일반적으로 다음 중 어느 항 목으로 분류될 수 있는가?",["경비","직접노무비","간접노무비","일반관리비"],3],[8,"㈜원가의 제품제조원가를 산출하시오. - 직접재료비 35,000원 - 기초재공품 40,000원 - 직접노무비 40,000원 - 기말재공품 95,000원 - 제조간접비 80,000원",["90,000원","100,000원","110.000원","120,000원"],2],[9,"다음 중 변동원가계산 하의 괄호에 들어갈 용어로 적절한 것은? 매출액 – 변동원가 – 변동판매비와 관리비 = ( )",["고정제조간접원가","영업이익","공헌이익","매출총이익"],3],[10,"다음 중 간접노무비 대상으로 옳지 않은 것은?",["공장 경비부문 종사자","판매관리부문 종사자","공장 사무직 종사자","품질관리부문 종사자"],2],[11,"다음 중 비원가항목이 아닌 것은?",["고정자산의 처분손","우발채무손실","유가증권 처분손실","상각완료자산의 감가상각비"],4],[12,"다음 설명 중에서 가장 옳은 것은 어느 것인가?",["변동원가계산은 고정제조간접원가를 제품원가계산에 포함한다.","전부원가계산은 고정제조간접원가를 제품원가계산에서 제외한다.","변동원가계산은 모든 발생원가를 변동원가와 고정원가로 분리한다.","전부원가계산은 고정제조간접원가를 기간원가로 구분한다."],3],[14,"다음 중 정부원가계산 시 사후정산방식의 원가계산을 실시할 때 당해계약 이행에서 발생한 작업시 간에서 적용할 노무공수 계산 시 제외해야 할 시간은?",["작업준비시간","금형교체시간","작업정리시간","기계고장수리시간"],4],[15,"실제임률이 ￦100, 실제작업시간이 1,000시간이고, 표준임률이 ￦80, 표준작업시간이 900시간일 때 직접노무비의 차이는?",["￦2,800 불리한 차이","￦2,800 유리한 차이","￦1,000 불리한 차이","￦1,000 유리한 차이"],1],[16,"보조부문원가의 배분방법 중 상호배분법에 관한 설명으로 가장 올바른 것은?",["상호배분법은 보조부문원가의 배부순서를 고려해야 한다.","단계배분법에 비해서 적용이 간편하고 정확성이 높은 장점이 있다.","직접배분법에 비해 순이익을 높게 계상하도록 하는 방법이다.","보조부문 상호간에 용역의 수수를 인정하여 원가를 배부하는 방법이다."],4],[17,"과일 과즙을 생산하는 P사의 최근 회계연도기준 원료투입량은 3,700,000kg이고，과즙생산량은 3,300,000kg이다. 당해 제품의 이윤율이 3.5%라고 하면 원가계산에서 적용하여야 할 과즙 생산수율은 몇%(소수점이하 절사)인가?",["86%","89%","92%","95%"],2],[18,"아래의 원가회계에 대한 설명에서 옳지 않은 것은 ?",["원가는 경영 조업도에 따라 고정비와 변동비로 구분한다.","조업의 수준과 관계없이 일정하게 발생하는 원가요소는 고정비이다.","조업의 증감에 따라 원가총액이 비례적으로 증감하는 원가요소는 변동비이다.","조업도가 0인 경우 고정비는 발생하지 않는다."],4],[19,"다음 중 준변동원가 또는 혼합원가의 원가형태를 나타내고 있는 것은? (단, X축은 조업도를 Y축은 원가를 나타낸다.",["Y","Y","Y","Y"],3],[20,"다음은 제품원가계산에 대한 설명이다. 옳지 않은 것은?",["개별원가계산은 종류가 다양한 제품을 개별적으로 주문생산하는 업종에 적합하다.","종합원가계산은 단일종류의 제품을 연속적으로 대량생산하는 업종에 적합하다.","정상원가계산은 직접재료비와 제조간접비는 실제발생액을 이용하고, 직접노무비는 예정배부율을 기","표준원가계산은 직접재료비, 직접노무비 및 제조간접비에 대해 표준원가를 적용한다."],3],[21,"다음 중 원가계산에 관련된 설명 중 타당하지 않은 것은?",["원가회계는 일반적으로 회사내부 정보이용자에게도 유용한 정보를 제공한다.","제조원가명세서가 작성되었더라도 제품매출원가를 알 수 있는 것은 아니다.","제조과정에 있는 모든 제조기업의 원가계산은 기업회계기준에서 정한 동일한 원가계산방식에 의해","제조원가에 해당하는 금액을 발생 즉시 비용처리 하였다면 당기총제조원가를 과소계상하게 된다."],3]],"공사기타원가":[[1,"다음 중 공사원가계산에서 기계경비 중 직접경비에 해당하지 않는 것은?",["감가상각비","정비비","관리비","조립 및 해체비"],4],[2,"건설공사 원가계산 시 순공사원가에 해
